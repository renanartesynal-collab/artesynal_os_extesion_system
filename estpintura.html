<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setor de Pintura - Artesynal</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1f2937;
      --panel-soft: #243447;
      --accent: #ed1c24;
      --text: #fff;
      --muted: #cbd5e1;
      --yellow: #f1c40f;
      --line: #3a4a60;
      --danger: #ef4444;
      --label-bg: #ffffff;
      --label-fg: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Montserrat', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 16px 36px;
    }

    .back {
      color: var(--yellow);
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
    }

    .header {
      margin-top: 14px;
      background: linear-gradient(180deg, #1c2633, #131b26);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      text-transform: uppercase;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .categorias {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .categoria-btn {
      background: #1a2330;
      color: #cfd8e3;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .categoria-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: #ff7a80;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: #1b2431;
      color: #fff;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }

    .btn:hover { filter: brightness(1.08); }

    .btn-primary {
      background: var(--accent);
      border-color: #ff7a80;
    }

    .btn-danger {
      background: #2b1516;
      border-color: #4f1d1f;
      color: #ffd1d3;
    }

    .panel {
      margin-top: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .muted { color: var(--muted); font-size: 12px; }

    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
    }

    .slot {
      background: var(--panel-soft);
      border: 1px dashed #576983;
      border-radius: 10px;
      min-height: 200px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 8px;
    }

    .slot.filled {
      border-style: solid;
      align-items: stretch;
      text-align: left;
      justify-content: flex-start;
      gap: 6px;
    }

    .slot-title { font-weight: 800; font-size: 14px; }
    .slot-meta { color: var(--muted); font-size: 12px; }

    .slot-actions {
      margin-top: auto;
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 30;
    }

    .modal {
      width: min(1100px, 100%);
      background: #161e29;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
    }

    .modal-layout {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .full { grid-column: 1 / -1; }

    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }

    input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #3d4f67;
      background: #0f141c;
      color: #fff;
      padding: 8px;
      font-family: inherit;
      font-size: 13px;
    }

    .modal-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .etiqueta-wrap {
      background: #0f141c;
      border: 1px solid #32455e;
      border-radius: 10px;
      padding: 10px;
    }

    .etiqueta-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .etiqueta {
      width: 6cm;
      height: 3cm;
      max-width: 100%;
      background: var(--label-bg);
      color: var(--label-fg);
      border: 2px solid #111827;
      border-radius: 10px;
      padding: 8px 10px;
      display: grid;
      grid-template-columns: 1fr 1.7cm;
      grid-template-rows: auto auto auto auto 1fr;
      gap: 4px 8px;
      margin: 0 auto;
    }

    .linha {
      border-bottom: 1.5px solid #111827;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .linha strong { font-size: 10px; }
    .linha.span2 { grid-column: 1 / 2; }

    .descricao {
      grid-column: 1 / 2;
      border-bottom: 1.5px solid #111827;
      font-size: 10px;
      display: flex;
      align-items: center;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .qr-box {
      grid-column: 2 / 3;
      grid-row: 3 / 6;
      align-self: end;
      justify-self: end;
      width: 1.45cm;
      height: 1.45cm;
      border: 1px solid #111827;
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }

    .preview-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    @media print {
      body * { visibility: hidden; }
      .print-target, .print-target * { visibility: visible; }
      .print-target {
        position: absolute;
        left: 0;
        top: 0;
        margin: 0;
      }
    }

    @media (max-width: 960px) {
      .modal-layout { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="index.html">⬅ Voltar ao painel</a>

    <section class="header">
      <h1>🎨 Pintura</h1>
      <div class="subtitle">Gerencie categorias, slots e etiquetas 6cm x 3cm para latas de tinta.</div>
    </section>

    <section class="toolbar">
      <div id="categorias" class="categorias"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn" id="btn-nova-categoria">+ Nova categoria</button>
        <button class="btn btn-primary" id="btn-adicionar-slot">+ Adicionar slot</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <strong id="titulo-categoria">Categoria</strong>
        <span class="muted" id="contador-slots"></span>
      </div>
      <div id="slots-grid" class="slots-grid"></div>
    </section>
  </div>

  <div class="modal-bg" id="modal-tinta-bg">
    <div class="modal">
      <h3 style="margin-top:0">Cadastrar tinta no slot</h3>
      <div class="modal-layout">
        <div>
          <div class="grid">
            <div>
              <label for="tinta-cor">Cor</label>
              <input id="tinta-cor" type="text" placeholder="Ex.: Azul Royal" />
            </div>
            <div>
              <label for="tinta-os">Ordem de Serviço (5 dígitos)</label>
              <input id="tinta-os" type="text" inputmode="numeric" maxlength="5" placeholder="00000" />
            </div>
            <div class="full">
              <label for="tinta-descricao">Descrição (1 linha)</label>
              <input id="tinta-descricao" type="text" maxlength="90" placeholder="Descrição livre" />
            </div>
            <div>
              <label for="tinta-quantidade">Quantidade (ml)</label>
              <input id="tinta-quantidade" type="number" min="0" step="1" placeholder="0" />
            </div>
            <div>
              <label for="tinta-validade">Validade (MM/AAAA)</label>
              <input id="tinta-validade" type="text" maxlength="7" placeholder="MM/AAAA" />
            </div>
            <div class="full">
              <label for="tinta-codigo">Código</label>
              <input id="tinta-codigo" type="text" placeholder="Código do produto/lote" />
            </div>
          </div>

          <div class="modal-actions">
            <button class="btn" id="btn-cancelar-tinta">Cancelar</button>
            <button class="btn btn-primary" id="btn-salvar-tinta">Salvar tinta</button>
          </div>
        </div>

        <div class="etiqueta-wrap">
          <div class="etiqueta-head">
            <span>Pré-visualização da etiqueta</span>
            <span>6cm x 3cm</span>
          </div>

          <div class="etiqueta print-target" id="etiqueta-preview">
            <div class="linha"><strong>Cor:</strong><span id="lbl-cor">________________</span></div>
            <div class="linha"><strong>Ordem de Serviço:</strong><span id="lbl-os">_____</span></div>
            <div class="descricao" id="lbl-desc">________________________</div>
            <div class="linha"><strong>Quantidade:</strong><span id="lbl-quantidade">___ ml</span></div>
            <div class="linha"><strong>Validade:</strong><span id="lbl-validade">MM/AAAA</span></div>
            <div class="linha"><strong>Código:</strong><span id="lbl-codigo">____________</span></div>
            <div class="qr-box"><img id="lbl-qr" alt="QR Code da etiqueta" /></div>
          </div>

          <div class="preview-actions">
            <button class="btn" id="btn-imprimir-etiqueta">Imprimir etiqueta</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { protegerPagina } from './auth.js';

    const previewMode = new URLSearchParams(window.location.search).get('preview') === '1';
    if (!previewMode) {
      await protegerPagina({ paginaAtual: 'estpintura.html' });
    }

    const STORAGE_KEY = 'artesynal_pintura_v3';
    const estadoPadrao = {
      categorias: {
        tinta: { label: 'Tinta', slots: Array(8).fill(null) }
      },
      categoriaAtual: 'tinta'
    };

    const categoriasEl = document.getElementById('categorias');
    const slotsGridEl = document.getElementById('slots-grid');
    const tituloCategoriaEl = document.getElementById('titulo-categoria');
    const contadorSlotsEl = document.getElementById('contador-slots');

    const modalBg = document.getElementById('modal-tinta-bg');

    let estado = carregarEstado();
    let slotAtual = null;

    function carregarEstado() {
      try {
        const bruto = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        if (!bruto?.categorias || typeof bruto.categorias !== 'object') return structuredClone(estadoPadrao);
        if (!bruto.categorias.tinta) bruto.categorias.tinta = structuredClone(estadoPadrao.categorias.tinta);
        bruto.categoriaAtual = bruto.categoriaAtual && bruto.categorias[bruto.categoriaAtual] ? bruto.categoriaAtual : 'tinta';

        for (const key of Object.keys(bruto.categorias)) {
          if (!Array.isArray(bruto.categorias[key].slots)) bruto.categorias[key].slots = Array(4).fill(null);
        }

        return bruto;
      } catch {
        return structuredClone(estadoPadrao);
      }
    }

    function salvarEstado() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
    }

    function renderCategorias() {
      const keys = Object.keys(estado.categorias);
      categoriasEl.innerHTML = keys.map((key) => {
        const c = estado.categorias[key];
        const activeClass = key === estado.categoriaAtual ? 'active' : '';
        return `<button class="categoria-btn ${activeClass}" data-cat="${key}">${escapeHtml(c.label)}</button>`;
      }).join('');

      categoriasEl.querySelectorAll('.categoria-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          estado.categoriaAtual = btn.dataset.cat;
          salvarEstado();
          renderTudo();
        });
      });
    }

    function renderSlots() {
      const categoria = estado.categorias[estado.categoriaAtual];
      const slots = categoria.slots;

      tituloCategoriaEl.textContent = `Categoria: ${categoria.label}`;
      const preenchidos = slots.filter(Boolean).length;
      contadorSlotsEl.textContent = `${preenchidos}/${slots.length} slots preenchidos`;

      slotsGridEl.innerHTML = slots.map((item, idx) => {
        if (!item) {
          return `
            <article class="slot" data-slot="${idx}">
              <div class="slot-title">Slot ${idx + 1}</div>
              <div class="slot-meta">Vazio</div>
              <button class="btn btn-primary" data-action="add" data-slot="${idx}">+ Adicionar card</button>
            </article>
          `;
        }

        return `
          <article class="slot filled" data-slot="${idx}">
            <div class="slot-title">${escapeHtml(item.cor || 'Sem cor')}</div>
            <div class="slot-meta">Ordem de Serviço: ${escapeHtml(item.ordemServico || '_____')}</div>
            <div class="slot-meta">Quantidade: ${escapeHtml(item.quantidadeMl || '0')} ml</div>
            <div class="slot-meta">Validade: ${escapeHtml(item.validade || 'MM/AAAA')}</div>
            <div class="slot-meta">Código: ${escapeHtml(item.codigo || '-')}</div>
            <div class="slot-actions">
              <button class="btn" data-action="label" data-slot="${idx}">Etiqueta</button>
              <button class="btn" data-action="edit" data-slot="${idx}">Editar</button>
              <button class="btn btn-danger" data-action="delete" data-slot="${idx}">Remover</button>
            </div>
          </article>
        `;
      }).join('');

      slotsGridEl.querySelectorAll('button[data-action]').forEach((btn) => {
        const idx = Number(btn.dataset.slot);
        const action = btn.dataset.action;
        btn.addEventListener('click', () => {
          if (action === 'add') abrirModalTinta(idx);
          if (action === 'edit') abrirModalTinta(idx, estado.categorias[estado.categoriaAtual].slots[idx]);
          if (action === 'label') abrirModalTinta(idx, estado.categorias[estado.categoriaAtual].slots[idx]);
          if (action === 'delete') {
            if (!confirm('Deseja remover este card de tinta?')) return;
            estado.categorias[estado.categoriaAtual].slots[idx] = null;
            salvarEstado();
            renderSlots();
          }
        });
      });
    }

    function renderTudo() {
      renderCategorias();
      renderSlots();
    }

    function slugify(texto) {
      return (texto || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)+/g, '');
    }

    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function qrPayload(dados) {
      return JSON.stringify({
        cor: dados.cor || '',
        ordemServico: dados.ordemServico || '',
        descricao: dados.descricao || '',
        quantidadeMl: dados.quantidadeMl || '',
        validade: dados.validade || '',
        codigo: dados.codigo || ''
      });
    }

    function qrUrl(payload) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=0&data=${encodeURIComponent(payload)}`;
    }

    function atualizarPreviewEtiqueta() {
      const dados = {
        cor: document.getElementById('tinta-cor').value.trim(),
        ordemServico: normalizarOS(document.getElementById('tinta-os').value),
        descricao: document.getElementById('tinta-descricao').value.trim(),
        quantidadeMl: document.getElementById('tinta-quantidade').value.trim(),
        validade: normalizarValidade(document.getElementById('tinta-validade').value),
        codigo: document.getElementById('tinta-codigo').value.trim()
      };

      document.getElementById('lbl-cor').textContent = dados.cor || '________________';
      document.getElementById('lbl-os').textContent = dados.ordemServico || '_____';
      document.getElementById('lbl-desc').textContent = dados.descricao || '________________________';
      document.getElementById('lbl-quantidade').textContent = `${dados.quantidadeMl || '___'} ml`;
      document.getElementById('lbl-validade').textContent = dados.validade || 'MM/AAAA';
      document.getElementById('lbl-codigo').textContent = dados.codigo || '____________';

      const payload = qrPayload(dados);
      document.getElementById('lbl-qr').src = qrUrl(payload);
    }

    function normalizarOS(valor) {
      return (valor || '').replace(/\D/g, '').slice(0, 5);
    }

    function normalizarValidade(valor) {
      const digits = (valor || '').replace(/\D/g, '').slice(0, 6);
      if (digits.length <= 2) return digits;
      return `${digits.slice(0, 2)}/${digits.slice(2)}`;
    }

    function abrirModalTinta(slot, dados = null) {
      slotAtual = slot;
      document.getElementById('tinta-cor').value = dados?.cor || '';
      document.getElementById('tinta-os').value = dados?.ordemServico || '';
      document.getElementById('tinta-descricao').value = dados?.descricao || '';
      document.getElementById('tinta-quantidade').value = dados?.quantidadeMl || '';
      document.getElementById('tinta-validade').value = dados?.validade || '';
      document.getElementById('tinta-codigo').value = dados?.codigo || '';
      modalBg.style.display = 'flex';
      atualizarPreviewEtiqueta();
    }

    function fecharModalTinta() {
      slotAtual = null;
      modalBg.style.display = 'none';
    }

    ['tinta-cor', 'tinta-os', 'tinta-descricao', 'tinta-quantidade', 'tinta-validade', 'tinta-codigo'].forEach((id) => {
      document.getElementById(id).addEventListener('input', (ev) => {
        if (id === 'tinta-os') ev.target.value = normalizarOS(ev.target.value);
        if (id === 'tinta-validade') ev.target.value = normalizarValidade(ev.target.value);
        atualizarPreviewEtiqueta();
      });
    });

    document.getElementById('btn-cancelar-tinta').addEventListener('click', fecharModalTinta);

    document.getElementById('btn-salvar-tinta').addEventListener('click', () => {
      if (slotAtual === null) return;

      const payload = {
        cor: document.getElementById('tinta-cor').value.trim(),
        ordemServico: normalizarOS(document.getElementById('tinta-os').value),
        descricao: document.getElementById('tinta-descricao').value.trim(),
        quantidadeMl: document.getElementById('tinta-quantidade').value.trim(),
        validade: normalizarValidade(document.getElementById('tinta-validade').value),
        codigo: document.getElementById('tinta-codigo').value.trim()
      };

      if (!payload.cor) {
        alert('Informe a cor da tinta.');
        return;
      }

      if (payload.ordemServico.length !== 5) {
        alert('A Ordem de Serviço deve ter exatamente 5 dígitos.');
        return;
      }

      if (payload.validade && !/^\d{2}\/\d{4}$/.test(payload.validade)) {
        alert('A validade deve estar no formato MM/AAAA.');
        return;
      }

      estado.categorias[estado.categoriaAtual].slots[slotAtual] = payload;
      salvarEstado();
      renderSlots();
      fecharModalTinta();
    });

    document.getElementById('btn-imprimir-etiqueta').addEventListener('click', () => {
      window.print();
    });

    document.getElementById('btn-adicionar-slot').addEventListener('click', () => {
      estado.categorias[estado.categoriaAtual].slots.push(null);
      salvarEstado();
      renderSlots();
    });

    document.getElementById('btn-nova-categoria').addEventListener('click', () => {
      const nome = prompt('Nome da nova categoria (ex.: Verniz, Primer, Tinta):');
      if (!nome) return;

      const id = slugify(nome);
      if (!id) {
        alert('Nome inválido para categoria.');
        return;
      }

      if (estado.categorias[id]) {
        alert('Essa categoria já existe.');
        return;
      }

      estado.categorias[id] = { label: nome.trim(), slots: Array(6).fill(null) };
      estado.categoriaAtual = id;
      salvarEstado();
      renderTudo();
    });

    renderTudo();
  </script>
</body>
</html>
