<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Histórico Tic-Tac | Artesynal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #9d50bb;
      --primary-dark: #6e48aa;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --glass: rgba(255, 255, 255, 0.05);
      --font-main: 'Inter', sans-serif;
      --font-title: 'Outfit', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-top: 20px;
    }

    .brand h1 { font-family: var(--font-title); font-size: 20px; color: var(--text); }
    .brand h1 i { color: var(--primary); margin-right: 8px; }

    .btn-back {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--glass);
      border: 1px solid var(--border);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-back:hover { background: var(--border); transform: translateX(-5px); }

    /* Summary Card */
    .summary-card {
      background: linear-gradient(135deg, var(--card), rgba(157, 80, 187, 0.1));
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 30px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .summary-item label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1px; }
    .summary-item p { font-size: 24px; font-weight: 700; font-family: var(--font-title); }

    /* Month Selector */
    .month-selector {
      background: var(--glass);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .month-selector input {
      background: transparent;
      border: none;
      color: white;
      font-family: inherit;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }

    /* History List */
    .day-group {
      margin-bottom: 24px;
      animation: fadeInUp 0.5s ease backwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .day-header {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
    }

    .items-card {
      background: var(--card);
      border-radius: 20px;
      padding: 10px;
      border: 1px solid var(--border);
    }

    .history-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }

    .history-item:last-child { border-bottom: none; }

    .point-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .icon-entrada { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .icon-saida { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .icon-pausa { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .icon-retorno { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }

    .point-info { flex: 1; }
    .point-info h4 { font-size: 15px; font-weight: 600; }
    .point-info p { font-size: 12px; color: var(--text-muted); }

    .point-time { font-size: 18px; font-weight: 700; font-family: var(--font-title); }

    /* Loader */
    #loader { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .summary-card { padding: 20px; grid-template-columns: 1fr; }
      .point-time { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div id="loader"><div class="spinner"></div></div>

  <div class="container">
    <header>
      <a href="registrarponto.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
      <div class="brand">
        <h1><i class="fas fa-history"></i> Meu Histórico</h1>
      </div>
      <div style="width: 40px;"></div> <!-- Spacer -->
    </header>

    <div class="summary-card">
      <div class="summary-item">
        <label>Total de Horas</label>
        <p id="totalHours">--h --m</p>
      </div>
      <div class="summary-item">
        <label>Dias Trabalhados</label>
        <p id="totalDays">0</p>
      </div>
    </div>

    <div class="month-selector">
      <span>Filtrar por mês</span>
      <input type="month" id="monthFilter">
    </div>

    <div id="historyList">
      <!-- JS populate -->
    </div>
  </div>

  <script type="module">
    import { db } from './config.js';
    import { protegerPagina, emailParaId } from './auth.js';
    import { 
      collection, 
      query, 
      where, 
      orderBy, 
      getDocs 
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    let userSession = null;

    (async () => {
      userSession = await protegerPagina({ paginaAtual: 'historicoponto.html' });
      if (!userSession) return;

      const now = new Date();
      document.getElementById('monthFilter').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      document.getElementById('monthFilter').onchange = loadHistory;

      await loadHistory();

      document.getElementById('loader').style.display = 'none';
    })();

    async function loadHistory() {
      const monthVal = document.getElementById('monthFilter').value;
      const [year, month] = monthVal.split('-').map(Number);
      
      const start = new Date(year, month - 1, 1);
      const end = new Date(year, month, 1);

      const q = query(
        collection(db, "point_records"),
        where("user_id", "==", emailParaId(userSession.user.email)),
        where("timestamp", ">=", start),
        where("timestamp", "<", end),
        orderBy("timestamp", "desc")
      );

      const snap = await getDocs(q);
      const list = document.getElementById('historyList');
      list.innerHTML = '';

      let workedMs = 0;
      let daysCount = new Set();
      
      const grouped = {}; // { "14/04/2026": [points] }

      snap.forEach(d => {
        const p = d.data();
        const date = p.timestamp.toDate();
        const key = date.toLocaleDateString('pt-BR');
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push({ ...p, time: date.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) });
        daysCount.add(key);
      });

      if (Object.keys(grouped).length === 0) {
        list.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-muted);">Nenhum registro encontrado para este mês.</div>`;
      } else {
        Object.keys(grouped).forEach((day, idx) => {
          const div = document.createElement('div');
          div.className = 'day-group';
          div.style.animationDelay = `${idx * 0.1}s`;
          
          const pointsHtml = grouped[day].map(p => {
             const iconClass = `icon-${p.type}`;
             const label = { entrada: 'Entrada', saida: 'Saída', pausa: 'Pausa Almoço', retorno: 'Retorno Almoço' }[p.type] || p.type;
             return `
               <div class="history-item">
                 <div class="point-icon ${iconClass}">
                   <i class="fas fa-${getIcon(p.type)}"></i>
                 </div>
                 <div class="point-info">
                   <h4>${label}</h4>
                   <p>${p.device || 'Web'}</p>
                 </div>
                 <div class="point-time">${p.time}</div>
               </div>
             `;
          }).join('');

          div.innerHTML = `
            <div class="day-header">
              <span>${day}</span>
            </div>
            <div class="items-card">${pointsHtml}</div>
          `;
          list.appendChild(div);
        });
      }

      document.getElementById('totalDays').textContent = daysCount.size;
    }

    function getIcon(type) {
      if (type === 'entrada') return 'sign-in-alt';
      if (type === 'saida') return 'sign-out-alt';
      if (type === 'pausa') return 'utensils';
      if (type === 'retorno') return 'door-open';
      return 'clock';
    }
  </script>
</body>
</html>
