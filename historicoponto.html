<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Ponto</title>
  <style>
    :root{--bg:#f3f3f7;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--header:#231f20;--btn:#111827;--card:#fff;--purple:#6a0dad}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:Montserrat,Arial,sans-serif;color:var(--text)}
    .top{background:var(--header);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
    .actions{display:flex;gap:8px}.btn{border:0;background:var(--btn);color:#fff;border-radius:999px;padding:10px 14px;text-decoration:none;cursor:pointer}
    .wrap{max-width:980px;margin:0 auto;padding:20px}.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
    .filters{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.input{border:1px solid var(--line);border-radius:10px;padding:10px;background:#f8fafc}
    .item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}.muted{color:var(--muted);font-size:13px}
    @media(max-width:900px){.filters{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="top"><strong>Histórico de Ponto</strong><div class="actions"><a class="btn" href="registrarponto.html">🕒 Registrar</a><a class="btn" href="index.html">🏠 Painel</a></div></div>
  <div class="wrap">
    <section class="panel">
      <div class="filters">
        <input id="fDia" class="input" type="date">
        <input id="fMes" class="input" type="month">
        <input id="fHora" class="input" placeholder="HH:MM">
        <select id="fFaltas" class="input"><option value="">Faltas?</option><option value="com">Com faltas</option><option value="sem">Sem faltas</option></select>
        <button class="btn" id="aplicar">Filtrar</button>
      </div>
      <div id="resumo" class="muted" style="margin-top:8px"></div>
    </section>
    <section id="lista"></section>
  </div>

  <script type="module">
    import { protegerPagina } from './auth.js';
    const sessao = await protegerPagina({ paginaAtual: 'historicoponto.html' });
    if (!sessao) throw new Error('sem sessão');

    const email = (sessao.user.email || sessao.acesso.email).toLowerCase();
    const reg = JSON.parse(localStorage.getItem(`ponto_registros_${email}`) || '[]');
    const ign = (JSON.parse(localStorage.getItem('ponto_config_global') || '{"diasNaoContabilizados":[]}').diasNaoContabilizados) || [];

    function render(){
      const dia=fDia.value, mes=fMes.value, hora=fHora.value, faltas=fFaltas.value;
      let arr=[...reg];
      if(dia) arr=arr.filter(r=>r.date===dia);
      if(mes) arr=arr.filter(r=>r.date.startsWith(mes));
      if(hora) arr=arr.filter(r=>(r.marcacoes||[]).some(m=>m.hora.startsWith(hora)));
      if(faltas){ arr=arr.filter(r=>{const has=(r.marcacoes||[]).length===0 && !ign.includes(r.date); return faltas==='com'?has:!has;}); }
      resumo.textContent = `${arr.length} dia(s) localizado(s).`;

      lista.innerHTML='';
      arr.sort((a,b)=>b.date.localeCompare(a.date)).forEach(r=>{
        const marks=(r.marcacoes||[]).map(m=>`<li>${m.hora} - ${m.endereco}</li>`).join('');
        const div=document.createElement('div');
        div.className='item';
        div.innerHTML=`<strong>${new Date(r.date+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})}</strong><div class='muted'>${(r.marcacoes||[]).length} marcações</div><ul>${marks||'<li>Sem marcação</li>'}</ul>`;
        lista.appendChild(div);
      });
    }
    aplicar.onclick=render; render();
  </script>
</body>
</html>
