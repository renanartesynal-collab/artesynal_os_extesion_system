<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histórico de ponto</title>
  <style>
    :root {
      --bg: #ececec;
      --orange: #f68a1e;
      --green: #07ad56;
      --red: #f3273a;
      --dark: #231f20;
      --text: #2b2a30;
      --muted: #8e8d95;
      --card: #fff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Montserrat", "Segoe UI", Arial, sans-serif; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }

    .top-pill {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; border: none; border-radius: 999px; padding: 14px 22px;
      background: var(--orange); color: #fff; font-weight: 800; font-size: clamp(28px, 5vw, 42px);
      text-decoration: none;
    }

    .period-row { display: flex; justify-content: flex-end; margin: 10px 0 16px; }
    .period-btn { border: none; background: transparent; color: var(--muted); font-size: clamp(24px, 4vw, 34px); cursor: pointer; }

    .day-block { margin: 14px 0 26px; }
    .day-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .day-title { margin: 0; color: var(--orange); font-size: clamp(36px, 6vw, 52px); }
    .add-point {
      border: none; width: 44px; height: 44px; border-radius: 50%; background: var(--orange); color: #fff;
      font-size: 36px; font-weight: 700; line-height: 1; cursor: pointer;
    }

    .marks { display: grid; gap: 10px; }
    .mark { display: grid; grid-template-columns: 10px auto; gap: 16px; align-items: start; }
    .line { width: 8px; min-height: 68px; border-radius: 999px; background: var(--green); margin-top: 4px; }
    .line.manual { background: var(--red); }

    .mark-main { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    .hour { font-size: clamp(48px, 7vw, 56px); font-weight: 800; color: #000; line-height: 1; }
    .details-toggle { border: none; background: transparent; color: var(--muted); font-size: clamp(24px, 4vw, 38px); cursor: pointer; }

    .details { display: none; font-size: 18px; color: #666; max-width: 620px; margin-top: 6px; }
    .details.show { display: block; }
    .details p { margin: 6px 0; }
    .details iframe { width: 100%; max-width: 320px; height: 180px; border: 0; border-radius: 6px; }

    .empty { color: var(--muted); font-size: 20px; }

    .back { display: inline-block; margin-top: 6px; text-decoration: none; color: #444; }

    .modal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 40;
      background: rgba(0,0,0,.42); padding: 12px;
    }
    .modal.show { display: flex; }
    .card { width: min(560px, 100%); background: var(--card); border-radius: 34px; padding: 18px; }
    .pill-date { background: var(--dark); color: #fff; text-align: center; border-radius: 999px; padding: 12px; font-size: clamp(24px, 5vw, 40px); }
    .types { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .type { border: 0; border-radius: 8px; min-height: 68px; color: #fff; font-size: clamp(20px, 5vw, 38px); font-weight: 800; cursor: pointer; }
    .type.g { background: var(--green); }
    .type.o { background: var(--orange); }
    .type.active { outline: 4px solid #1f1f1f; }
    .time { margin: 12px 0 8px; font-size: clamp(28px, 6vw, 46px); }
    .time input { border: 0; background: transparent; font-size: inherit; }
    .map { width: 100%; height: 210px; border: 0; border-radius: 8px; }
    .just { width: 100%; margin-top: 12px; min-height: 112px; border: 3px solid var(--orange); border-radius: 10px; padding: 10px; font-family: inherit; }
    .confirm { width: 100%; margin-top: 12px; border: 0; border-radius: 999px; padding: 12px; background: var(--green); color: #fff; font-size: clamp(28px, 5vw, 50px); font-weight: 800; cursor: pointer; }
    .close { width: 100%; margin-top: 8px; border: 0; border-radius: 999px; padding: 9px; cursor: pointer; }

    @media (min-width: 1024px) {
      .wrap { background: #f5f5f5; border-radius: 20px; box-shadow: 0 16px 28px rgba(0,0,0,.14); margin-top: 24px; }
      .day-list { columns: 2; column-gap: 34px; }
      .day-block { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="top-pill" href="#"><span>Registros</span><span id="monthLabel">---</span></a>
    <div class="period-row"><button class="period-btn" id="otherPeriods">Outros períodos &gt;</button></div>
    <div id="dayList" class="day-list"></div>
    <a class="back" href="registrarponto.html">← Voltar para registrar ponto</a>
  </main>

  <div class="modal" id="modal">
    <div class="card">
      <div class="pill-date" id="modalDate"></div>
      <h2>Registrar como ponto de:</h2>
      <div class="types" id="types"></div>
      <div class="time">Horário: <input type="time" id="manualTime" step="60"></div>
      <iframe class="map" id="mapFrame" loading="lazy"></iframe>
      <textarea class="just" id="justification" placeholder="Escreva a justificativa:"></textarea>
      <button class="confirm" id="confirm">Confirmar registro</button>
      <button class="close" id="close">Cancelar</button>
    </div>
  </div>

  <script type="module">
    import { protegerPagina } from './auth.js';

    const session = await protegerPagina({ paginaAtual: 'historicoponto.html' });
    if (!session) throw new Error('Sessão inválida');

    const email = (session.user.email || session.acesso.email).toLowerCase();
    const storageKey = `ponto_registros_${email}`;
    const dayList = document.getElementById('dayList');
    const monthLabel = document.getElementById('monthLabel');

    const modal = document.getElementById('modal');
    const modalDate = document.getElementById('modalDate');
    const types = document.getElementById('types');
    const manualTime = document.getElementById('manualTime');
    const mapFrame = document.getElementById('mapFrame');
    const justification = document.getElementById('justification');

    const f2 = (n) => String(n).padStart(2, '0');
    const read = () => JSON.parse(localStorage.getItem(storageKey) || '[]');
    const write = (arr) => localStorage.setItem(storageKey, JSON.stringify(arr));

    let currentMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    let chosenDate = '';
    let selectedType = 'entrada';
    let latitude = -25.4297;
    let longitude = -49.2719;

    const pointTypes = [
      { key: 'entrada', label: 'ENTRADA', cls: 'g' },
      { key: 'pausa', label: 'PAUSA', cls: 'o' },
      { key: 'volta', label: 'VOLTA', cls: 'g' },
      { key: 'saida', label: 'SAÍDA', cls: 'o' },
    ];

    function ym(d) { return `${d.getFullYear()}-${f2(d.getMonth()+1)}`; }
    function labelMes(d) { return d.toLocaleDateString('pt-BR', { month: 'short' }).toUpperCase().replace('.', ''); }

    function openPeriodPicker() {
      const current = ym(currentMonth);
      const selected = prompt('Informe o mês no formato AAAA-MM', current);
      if (!selected || !/^\d{4}-\d{2}$/.test(selected)) return;
      const [y, m] = selected.split('-').map(Number);
      currentMonth = new Date(y, m - 1, 1);
      render();
    }

    function mapSrc(lat, lng) {
      return `https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed`;
    }

    function detailsHTML(mark) {
      const lat = mark.geo?.lat ?? latitude;
      const lng = mark.geo?.lng ?? longitude;
      return `
        <p><strong>Justificativa:</strong> ${mark.justificativa || 'Sem justificativa.'}</p>
        <p><strong>Período realizado o ponto:</strong> ${mark.timestamp ? new Date(mark.timestamp).toLocaleString('pt-BR') : '-'}</p>
        <p><strong>Registro:</strong> ${mark.manual ? 'Manual com justificativa' : 'Automático'}</p>
        <iframe src="${mapSrc(lat, lng)}" loading="lazy"></iframe>
      `;
    }

    function render() {
      monthLabel.textContent = labelMes(currentMonth);
      const records = read();
      const start = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
      const endOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
      const now = new Date();
      const lastDay = currentMonth.getFullYear() === now.getFullYear() && currentMonth.getMonth() === now.getMonth() ? now.getDate() : endOfMonth.getDate();

      dayList.innerHTML = '';
      for (let d = lastDay; d >= 1; d--) {
        const dateIso = `${currentMonth.getFullYear()}-${f2(currentMonth.getMonth()+1)}-${f2(d)}`;
        const day = records.find((x) => x.date === dateIso) || { date: dateIso, marcacoes: [] };
        const dateObj = new Date(`${dateIso}T00:00:00`);
        const title = `${d} ${labelMes(currentMonth).toLowerCase()} ${dateObj.toLocaleDateString('pt-BR', { weekday: 'short' })}`;

        const marks = [...(day.marcacoes || [])].sort((a,b) => a.hora.localeCompare(b.hora)).map((mark) => {
          const id = crypto.randomUUID();
          return `
            <div class="mark">
              <div class="line ${mark.justificativa ? 'manual' : ''}"></div>
              <div>
                <div class="mark-main">
                  <strong class="hour">${mark.hora}</strong>
                  <button class="details-toggle" data-target="${id}">Mostrar detalhes</button>
                </div>
                <div class="details" id="${id}">${detailsHTML(mark)}</div>
              </div>
            </div>
          `;
        }).join('') || `<p class="empty">Sem registros neste dia.</p>`;

        dayList.insertAdjacentHTML('beforeend', `
          <section class="day-block" data-date="${dateIso}">
            <div class="day-head">
              <h3 class="day-title">${title}</h3>
              <button class="add-point" data-date="${dateIso}">+</button>
            </div>
            <div class="marks">${marks}</div>
          </section>
        `);
      }

      [...document.querySelectorAll('.details-toggle')].forEach((btn) => {
        btn.onclick = () => {
          const panel = document.getElementById(btn.dataset.target);
          const showing = panel.classList.toggle('show');
          btn.textContent = showing ? 'Ocultar detalhes' : 'Mostrar detalhes';
        };
      });

      [...document.querySelectorAll('.add-point')].forEach((btn) => {
        btn.onclick = () => openModal(btn.dataset.date);
      });
    }

    function mountTypes() {
      types.innerHTML = pointTypes.map((t) => `
        <button class="type ${t.cls} ${selectedType === t.key ? 'active' : ''}" data-key="${t.key}">${t.label}</button>
      `).join('');
      [...types.querySelectorAll('.type')].forEach((b) => {
        b.onclick = () => { selectedType = b.dataset.key; mountTypes(); };
      });
    }

    async function locate() {
      mapFrame.src = mapSrc(latitude, longitude);
      if (!navigator.geolocation) return;
      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition((pos) => {
          latitude = pos.coords.latitude;
          longitude = pos.coords.longitude;
          mapFrame.src = mapSrc(latitude, longitude);
          resolve();
        }, () => resolve(), { timeout: 5000 });
      });
    }

    function openModal(date) {
      chosenDate = date;
      modalDate.textContent = new Date(`${date}T00:00:00`).toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      const n = new Date();
      manualTime.value = `${f2(n.getHours())}:${f2(n.getMinutes())}`;
      selectedType = 'entrada';
      justification.value = '';
      mountTypes();
      modal.classList.add('show');
      locate();
    }

    function closeModal() { modal.classList.remove('show'); }

    function savePoint() {
      if (!manualTime.value) return alert('Informe o horário.');
      if (!justification.value.trim()) return alert('A justificativa é obrigatória nesse lançamento.');

      const all = read();
      const idx = all.findIndex((x) => x.date === chosenDate);
      const mark = {
        hora: manualTime.value,
        timestamp: new Date(`${chosenDate}T${manualTime.value}:00`).toISOString(),
        tipo: selectedType,
        endereco: `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`,
        geo: { lat: latitude, lng: longitude },
        justificativa: justification.value.trim(),
        manual: true
      };

      if (idx === -1) all.push({ date: chosenDate, marcacoes: [mark] });
      else all[idx].marcacoes = [...(all[idx].marcacoes || []), mark];

      write(all);
      closeModal();
      render();
    }

    document.getElementById('otherPeriods').onclick = openPeriodPicker;
    document.getElementById('confirm').onclick = savePoint;
    document.getElementById('close').onclick = closeModal;
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    render();
  </script>
</body>
</html>
