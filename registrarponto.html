<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar Ponto - Artesynal</title>
  <style>
    :root { --bg:#f3f3f7; --text:#1f2937; --muted:#6b7280; --purple:#6a0dad; --card:#fff; --line:#e5e7eb; --ok:#16a34a; --warn:#dc2626; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Montserrat, Arial, sans-serif; background:var(--bg); color:var(--text); }
    header { background:#231f20; color:#fff; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; }
    .header-actions { display:flex; gap:8px; }
    .btn { border:0; border-radius:999px; background:#111827; color:#fff; padding:10px 14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
    .container { max-width:980px; margin:0 auto; padding:20px; }
    .hero { display:grid; grid-template-columns:1fr 280px; gap:16px; align-items:center; }
    .clock { font-size:38px; font-weight:700; margin:8px 0 14px; }
    .register { background:var(--purple); font-weight:700; font-size:22px; padding:14px 24px; }
    .circle { border:2px solid #d8b4fe; border-radius:50%; width:260px; height:260px; display:flex; align-items:center; justify-content:center; text-align:center; background:#fff; justify-self:end; }
    .cards { background:#fff; border-radius:14px; padding:18px; margin-top:20px; }
    .stat-grid { display:grid; grid-template-columns:repeat(4,minmax(120px,1fr)); gap:12px; margin-top:12px; }
    .stat { background:#f8fafc; border:1px solid var(--line); border-radius:12px; padding:12px; }
    .tabs { display:flex; gap:8px; margin-top:16px; }
    .tab { border:1px solid var(--line); padding:10px 14px; border-radius:10px; cursor:pointer; background:#fff; }
    .tab.active { border-color:var(--purple); color:var(--purple); font-weight:700; }
    .day { background:#fff; border-radius:12px; padding:14px; border:1px solid var(--line); margin-top:12px; }
    .day-head { display:flex; justify-content:space-between; align-items:center; }
    .plus { border:none; background:var(--purple); color:#fff; width:32px; height:32px; border-radius:50%; cursor:pointer; }
    .mark { border-left:4px solid #d946ef; padding-left:8px; margin:8px 0; }
    .mark.pending { border-color:var(--warn); color:var(--warn); }
    .small { color:var(--muted); font-size:13px; }
    .pill { padding:3px 8px; border-radius:99px; font-size:12px; background:#f3e8ff; color:var(--purple); }
    @media (max-width:800px){ .hero{grid-template-columns:1fr;} .circle{justify-self:start;} .stat-grid{grid-template-columns:repeat(2,minmax(120px,1fr));} }
  </style>
</head>
<body>
  <header>
    <strong>Registrar Ponto</strong>
    <div class="header-actions">
      <a class="btn" href="index.html">🏠 Painel</a>
      <a class="btn" href="historicoponto.html">📚 Histórico</a>
      <a class="btn" id="btn-admin" href="paineldeponto.html" style="display:none;">🛡️ Controle</a>
      <button class="btn" id="logout">Sair</button>
    </div>
  </header>
  <main class="container">
    <section class="hero">
      <div>
        <h1 id="saudacao">Bom dia!</h1>
        <div id="diaAtual" class="small"></div>
        <div class="small" style="margin-top:18px;">Horário</div>
        <div class="clock" id="horaAtual">00:00:00</div>
        <button class="btn register" id="registrarBtn">📍 Registrar ponto</button>
        <div class="small" id="statusRegistro" style="margin-top:8px;"></div>
      </div>
      <div class="circle"><div><div style="font-size:48px;" id="workedToday">00h00min</div><div>trabalhado hoje</div><div class="small" id="almocoInfo">Almoço: 00min</div></div></div>
    </section>

    <section class="cards">
      <div>Período: <strong id="periodoTxt"></strong></div>
      <div class="stat-grid">
        <div class="stat"><div class="small">Dias trabalhados</div><div id="diasTrabalhados">0</div></div>
        <div class="stat"><div class="small">Horas registradas</div><div id="horasRegistradas">00h00min</div></div>
        <div class="stat"><div class="small">Faltas</div><div id="faltas">0</div></div>
        <div class="stat"><div class="small">Atrasos</div><div id="atrasos">0</div></div>
      </div>
      <div class="tabs">
        <button class="tab active" data-period="atual">Neste período</button>
        <button class="tab" data-period="anterior">Período anterior</button>
      </div>
    </section>

    <section id="listaDias"></section>
  </main>

  <script type="module">
    import { protegerPagina, logout } from './auth.js';

    const sessao = await protegerPagina({ paginaAtual: 'registrarponto.html' });
    if (!sessao) throw new Error('sem sessão');
    document.getElementById('logout').onclick = () => logout();
    if (sessao.acesso.categoria === 'administracao') document.getElementById('btn-admin').style.display = 'inline-flex';

    const email = (sessao.user.email || sessao.acesso.email).toLowerCase();
    const storageKey = `ponto_registros_${email}`;
    const configKey = 'ponto_config_global';
    const solicitaKey = 'ponto_solicitacoes';
    const feriadosFerias = JSON.parse(localStorage.getItem(configKey) || '{"diasNaoContabilizados":[]}');

    let periodoAtual = 'atual';

    const pad = (n) => String(n).padStart(2, '0');
    const fmtDur = (mins) => `${pad(Math.floor(mins/60))}h${pad(mins%60)}min`;
    const kDate = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const parseTime = (t) => { const [h,m]=t.split(':').map(Number); return h*60+m; };
    const diffMin = (a,b) => Math.max(0, Math.round((b-a)/60000));
    const isIgnored = (dateStr) => (feriadosFerias.diasNaoContabilizados || []).includes(dateStr);

    const getReg = () => JSON.parse(localStorage.getItem(storageKey) || '[]');
    const saveReg = (v) => localStorage.setItem(storageKey, JSON.stringify(v));
    const getSolic = () => JSON.parse(localStorage.getItem(solicitaKey) || '[]');
    const saveSolic = (v) => localStorage.setItem(solicitaKey, JSON.stringify(v));

    function calcWorkedForDay(regDay){
      const arr = (regDay.marcacoes||[]).slice().sort((a,b)=>a.timestamp-b.timestamp);
      let total=0, lunch=0;
      for(let i=0;i<arr.length-1;i+=2){ total += diffMin(new Date(arr[i].timestamp), new Date(arr[i+1].timestamp)); }
      if(arr[1] && arr[2]) lunch = diffMin(new Date(arr[1].timestamp), new Date(arr[2].timestamp));
      return { total, lunch };
    }

    async function registrarPonto(){
      if (!navigator.geolocation) { alert('Geolocalização não suportada no navegador.'); return; }
      statusRegistro.textContent = 'Solicitando localização...';
      navigator.geolocation.getCurrentPosition((pos)=>{
        const lat = pos.coords.latitude.toFixed(5); const lng = pos.coords.longitude.toFixed(5);
        const now = new Date();
        const date = kDate(now);
        const lista = getReg();
        let day = lista.find(d=>d.date===date);
        if(!day){ day = { date, marcacoes:[] }; lista.push(day); }
        day.marcacoes.push({ timestamp: now.toISOString(), hora: `${pad(now.getHours())}:${pad(now.getMinutes())}`, endereco: `Lat ${lat}, Lng ${lng}`, origem: 'web-gps' });
        saveReg(lista);
        statusRegistro.textContent = `Ponto registrado às ${pad(now.getHours())}:${pad(now.getMinutes())}.`;
        render();
      }, ()=>{ statusRegistro.textContent = 'Sem permissão de localização. O ponto não foi aprovado.'; alert('Você precisa permitir localização para registrar o ponto.'); });
    }

    function periodoData(){
      const d = new Date();
      if (periodoAtual === 'anterior') d.setMonth(d.getMonth()-1);
      const ini = new Date(d.getFullYear(), d.getMonth(), 1);
      const fim = new Date(d.getFullYear(), d.getMonth()+1, 0);
      return { ini, fim, key:`${ini.getFullYear()}-${pad(ini.getMonth()+1)}` };
    }

    function render(){
      const now = new Date();
      horaAtual.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      diaAtual.textContent = now.toLocaleDateString('pt-BR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      saudacao.textContent = `Olá, ${(sessao.user.displayName || sessao.acesso.nome || 'usuário')}!`;

      const {ini,fim,key} = periodoData();
      periodoTxt.textContent = `${ini.toLocaleDateString('pt-BR')} a ${fim.toLocaleDateString('pt-BR')}`;
      const lista = getReg().filter(r=>r.date.startsWith(key));

      let totalMin=0, dias=0, atrasos=0;
      lista.forEach((d)=>{ const c=calcWorkedForDay(d); totalMin+=c.total; if(c.total>0) dias++; const first=d.marcacoes?.[0]?.hora; if(first && parseTime(first)>parseTime('08:00') && !isIgnored(d.date)) atrasos++; });
      const faltas = Math.max(0, new Date(ini.getFullYear(), ini.getMonth()+1, 0).getDate() - dias - (feriadosFerias.diasNaoContabilizados||[]).filter(x=>x.startsWith(key)).length);

      diasTrabalhados.textContent = dias;
      horasRegistradas.textContent = fmtDur(totalMin);
      faltas.textContent = faltas;
      atrasos.textContent = atrasos;

      const hoje = getReg().find(r=>r.date===kDate(now));
      const worked = hoje ? calcWorkedForDay(hoje) : {total:0,lunch:0};
      workedToday.textContent = fmtDur(worked.total);
      almocoInfo.textContent = `Almoço: ${pad(worked.lunch)}min`;

      const solic = getSolic().filter(s=>s.email===email && s.date.startsWith(key));
      const diasNoMes = new Date(ini.getFullYear(), ini.getMonth() + 1, 0).getDate();
      listaDias.innerHTML = '';
      for (let d = diasNoMes; d >= 1; d -= 1) {
        const date = `${ini.getFullYear()}-${pad(ini.getMonth()+1)}-${pad(d)}`;
        const day = lista.find(item => item.date === date) || { date, marcacoes: [] };
        const calc = calcWorkedForDay(day);
        const div = document.createElement('div');
        div.className='day';
        const marks = (day.marcacoes || []).sort((a, b) => a.hora.localeCompare(b.hora)).map(m=>`<div class='mark'>${m.hora} <span class='small'>${m.endereco}</span></div>`).join('');
        const pend = solic.filter(s=>s.date===day.date).map(s=>`<div class='mark pending'>Solicitação ${s.horaPretendida} - ${s.justificativa} <span class='pill'>${s.status}</span></div>`).join('');
        div.innerHTML = `<div class='day-head'><strong>${new Date(day.date+'T00:00:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short',weekday:'short'})}</strong><button class='plus' data-date='${day.date}'>+</button></div>
          <div class='small'>Total: ${fmtDur(calc.total)} | Almoço: ${pad(calc.lunch)}min</div>${marks || "<div class='small'>Sem marcações no dia.</div>"}${pend}`;
        listaDias.appendChild(div);
      }

      document.querySelectorAll('.plus').forEach(btn=>btn.onclick=()=>{
        const date = btn.dataset.date;
        const horaPretendida = prompt('Qual horário deseja adicionar? (HH:MM)');
        if(!horaPretendida) return;
        const justificativa = prompt('Descreva a justificativa de não ter batido o ponto:');
        if(!justificativa) return;
        const arr=getSolic();
        arr.push({ id: crypto.randomUUID(), email, date, horaPretendida, justificativa, status:'pendente', createdAt:new Date().toISOString() });
        saveSolic(arr);
        render();
      });
    }

    document.getElementById('registrarBtn').onclick = registrarPonto;
    document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');periodoAtual=t.dataset.period;render();});
    setInterval(render, 1000);
    render();
  </script>
</body>
</html>
