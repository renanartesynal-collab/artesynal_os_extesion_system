<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ponto Eletrônico | Artesynal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #9d50bb;
      --primary-dark: #6e48aa;
      --accent: #6e48aa;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --glass: rgba(255, 255, 255, 0.03);
      --font-main: 'Inter', sans-serif;
      --font-title: 'Outfit', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Loader */
    .loader-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    .loader-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Layout */
    .app-container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      padding-top: 40px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .app-container.ready { opacity: 1; }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .user-info { display: flex; align-items: center; gap: 12px; }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(157, 80, 187, 0.3);
    }

    .user-name h2 { font-size: 18px; font-family: var(--font-title); }
    .user-name p { font-size: 13px; color: var(--text-muted); }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .geo-status {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 8px;
      background: var(--glass);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
    }
    .geo-status.allowed { color: var(--success); border-color: rgba(16, 185, 129, 0.3); }
    .geo-status.denied { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }

    .btn-nav {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--glass);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .btn-nav:hover { background: var(--border); transform: scale(1.1); }

    /* Status Card */
    .status-card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 30px;
      border: 1px solid var(--border);
      text-align: center;
      margin-bottom: 24px;
    }

    .clock-time {
      font-size: 64px;
      font-weight: 700;
      font-family: var(--font-title);
      letter-spacing: -2px;
      margin-bottom: 4px;
      background: linear-gradient(to bottom, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .clock-date { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; text-transform: capitalize; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 30px;
    }
    .status-badge.working { color: var(--success); background: rgba(16, 185, 129, 0.1); }
    .status-badge.resting { color: var(--warning); background: rgba(245, 158, 11, 0.1); }
    .status-badge.off { color: var(--text-muted); background: rgba(148, 163, 184, 0.1); }

    /* Main Action Button */
    .action-button {
      width: 100%;
      height: 80px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 10px 20px rgba(157, 80, 187, 0.2);
      margin-bottom: 24px;
    }
    .action-button:active { transform: scale(0.95); }
    .action-button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Stats & Timeline */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .stat-mini-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); }
    .stat-mini-card i { font-size: 18px; margin-bottom: 12px; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 600; }

    .timeline-card { background: var(--card); border-radius: 24px; padding: 24px; border: 1px solid var(--border); }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--primary);
      padding: 12px 24px;
      border-radius: 12px;
      z-index: 10000;
      transition: transform 0.3s ease;
      font-weight: 600;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="loader-overlay" id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Conectando ao serviço de ponto...</div>
  </div>

  <script>
    // TRAVA EXTERNA: Garante que os botões funcionem mesmo se o carregamento falhar
    function setupBasics() {
        document.getElementById('backBtn').onclick = function() { window.location.href = 'index.html'; };
        
        // Timer de segurança
        setTimeout(function() {
            var l = document.getElementById('loader');
            if(l) { l.style.opacity = '0'; setTimeout(function(){ l.style.display='none'; }, 400); }
            document.getElementById('app').classList.add('ready');
        }, 3000);
    }
    window.onload = setupBasics;
  </script>

  <div class="app-container" id="app">
    <header>
      <div class="user-info">
        <div class="avatar" id="avatarInitials">..</div>
        <div class="user-name">
          <h2 id="userName">Carregando...</h2>
          <p>Seja bem-vindo!</p>
        </div>
      </div>
      <div class="header-right">
        <div class="geo-status denied" id="geoLabel"><i class="fas fa-location-dot"></i><span>Verificando local...</span></div>
        <button id="backBtn" class="btn-nav"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>

    <div class="status-card">
      <div class="clock-time" id="clock">00:00:00</div>
      <div class="clock-date" id="date">--/--/--</div>
      <div class="status-badge off" id="statusBadge">
        <span id="statusText">CARREGANDO...</span>
      </div>
    </div>

    <button class="action-button" id="mainAction">
      <i class="fas fa-fingerprint"></i>
      <span id="actionLabel">Iniciar Jornada</span>
    </button>

    <div class="stats-grid">
      <div class="stat-mini-card"><i class="fas fa-business-time"></i><div class="stat-label">Horas Hoje</div><div class="stat-value" id="hoursToday">--h --m</div></div>
      <div class="stat-mini-card"><i class="fas fa-mug-hot"></i><div class="stat-label">Almoço</div><div class="stat-value" id="lunchBreak">--m</div></div>
    </div>

    <div class="timeline-card">
      <div class="section-title">Resumo do Dia</div>
      <div class="timeline" id="timelineList"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { protegerPagina, emailParaId } from './auth.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBxG9GNxfJxWiw8hpreTeShrG009svRmPI",
      authDomain: "artesynal-os-system.firebaseapp.com",
      projectId: "artesynal-os-system",
      databaseURL: "https://artesynal-os-system-default-rtdb.firebaseio.com",
      storageBucket: "artesynal-os-system.firebasestorage.app",
      messagingSenderId: "539958005846",
      appId: "1:539958005846:web:9120505e097b56bf16ebf7"
    };

    const app = initializeApp(firebaseConfig);
    const rtDb = getDatabase(app);

    let userSession = null;
    let dailyPoints = [];
    let currentStatus = 'OFF';
    let geo = { lat: null, lon: null };

    // --- SETUP PRINCIPAL ---
    (async () => {
      // 1. Relógio inicia independente de tudo
      setInterval(updateClock, 1000);
      updateClock();

      try {
        // 2. Tentar pegar sessão
        userSession = await protegerPagina({ paginaAtual: 'registrarponto.html' });
        if (!userSession) return;

        // Mostrar nome imediatamente
        const name = userSession.user.displayName || 'Usuário';
        document.getElementById('userName').textContent = name;
        document.getElementById('avatarInitials').textContent = name.substring(0, 1).toUpperCase();

        // 3. Ativar botão de ação
        document.getElementById('mainAction').onclick = handleMainAction;

        // 4. Carregar dados do banco
        await refreshDayData();
        initGPS();

      } catch (err) {
        console.error("Erro na carga de dados:", err);
        // Fallback caso o Firebase trave: usa info da sessão local
        const saved = JSON.parse(localStorage.getItem('artesynal_session') || '{}');
        if(saved.nome) {
            document.getElementById('userName').textContent = saved.nome;
            document.getElementById('avatarInitials').textContent = saved.nome.substring(0, 1).toUpperCase();
        }
      }
    })();

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR', { hour12: false });
      document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    async function refreshDayData() {
      const emailId = emailParaId(userSession.user.email);
      const pointsRef = ref(rtDb, `ponto_registros/${emailId}`);
      try {
          const snap = await get(pointsRef);
          if (snap.exists()) {
            const data = snap.val();
            dailyPoints = Object.values(data).filter(p => new Date(p.timestamp).toLocaleDateString() === new Date().toLocaleDateString()).sort((a,b) => a.timestamp - b.timestamp);
          }
          updateUIStatus();
          renderTimeline();
          calculateHours();
      } catch(e) { console.error("Erro ao carregar registros:", e); }
    }

    function updateUIStatus() {
      const last = dailyPoints[dailyPoints.length - 1];
      const btn = document.getElementById('mainAction');
      const label = document.getElementById('actionLabel');
      const bage = document.getElementById('statusBadge');
      const statusText = document.getElementById('statusText');

      if (!last || last.type === 'saida') {
        currentStatus = 'OFF'; label.textContent = "Iniciar Jornada"; btn.className = "action-button"; bage.className = "status-badge off"; statusText.textContent = "DIA NÃO INICIADO";
      } else if (last.type === 'entrada' || last.type === 'retorno') {
        currentStatus = 'WORKING'; label.textContent = dailyPoints.some(p => p.type === 'pausa') ? "Encerrar Dia" : "Pausa Almoço"; btn.className = "action-button pause"; bage.className = "status-badge working"; statusText.textContent = "TRABALHANDO";
      } else if (last.type === 'pausa') {
        currentStatus = 'RESTING'; label.textContent = "Retornar ao Trabalho"; btn.className = "action-button return"; bage.className = "status-badge resting"; statusText.textContent = "EM PAUSA ALMOÇO";
      }
    }

    async function handleMainAction() {
      if(!userSession) return;
      let type = 'entrada';
      if (currentStatus === 'OFF') type = 'entrada';
      else if (currentStatus === 'WORKING') type = dailyPoints.some(p => p.type === 'pausa') ? 'saida' : 'pausa';
      else if (currentStatus === 'RESTING') type = 'retorno';
      
      const btn = document.getElementById('mainAction');
      btn.disabled = true;
      showToast("Salvando...");
      
      try {
        const emailId = emailParaId(userSession.user.email);
        const refNew = push(ref(rtDb, `ponto_registros/${emailId}`));
        await set(refNew, {
          user_id: emailId,
          user_name: userSession.user.displayName,
          timestamp: Date.now(),
          type: type,
          geo: geo,
          device: 'Tic-Tac Web'
        });
        showToast("✅ Ponto registrado!");
        await refreshDayData();
      } catch (e) {
        console.error(e);
        showToast("❌ Erro ao salvar");
      } finally {
        btn.disabled = false;
      }
    }

    function renderTimeline() {
      const container = document.getElementById('timelineList');
      container.innerHTML = dailyPoints.length ? dailyPoints.map((p, i) => `
        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #ffffff10">
          <span>${new Date(p.timestamp).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
          <span style="font-weight:bold">${p.type.toUpperCase()}</span>
        </div>
      `).reverse().join('') : '<div style="text-align:center; padding:20px; color:#ffffff50">Nenhum registro</div>';
    }

    function calculateHours() {
      let worked = 0; let last = null;
      dailyPoints.forEach(p => { if (p.type === 'entrada' || p.type === 'retorno') last = p.timestamp; else if (last) worked += (p.timestamp - last); });
      const h = Math.floor(worked/3600000); const m = Math.floor((worked%3600000)/60000);
      document.getElementById('hoursToday').textContent = `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m`;
    }

    function initGPS() { 
      if(navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => { 
          geo.lat=p.coords.latitude; geo.lon=p.coords.longitude; 
          document.getElementById('geoLabel').className = "geo-status allowed";
          document.getElementById('geoLabel').innerHTML = '<i class="fas fa-location-dot"></i><span>Local Permitido</span>';
        });
      }
    }
    
    function showToast(msg) { 
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000); 
    }
  </script>
</body>
</html>
