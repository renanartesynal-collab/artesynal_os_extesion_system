<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar ponto</title>
  <style>
    :root {
      --bg: #ececec;
      --orange: #f68a1e;
      --green: #07ad56;
      --red: #f3273a;
      --dark: #231f20;
      --text: #2b2a30;
      --muted: #8e8d95;
      --card: #ffffff;
      --line: #2f2c2f;
      --radius: 20px;
      --shadow: 0 18px 30px rgba(0,0,0,0.2);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", "Segoe UI", Arial, sans-serif;
    }

    .page {
      max-width: 430px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .hello { font-size: clamp(32px, 9vw, 56px); margin: 0; font-weight: 800; }
    .date { margin: 6px 0 24px; font-size: 22px; }

    .work-box {
      border: 4px solid var(--orange);
      border-radius: var(--radius);
      text-align: center;
      padding: 12px;
      background: #f6f6f6;
    }
    .work-box small { display: block; color: var(--muted); font-size: 20px; }
    .work-time { font-size: clamp(40px, 11vw, 68px); line-height: 1; font-variant-numeric: tabular-nums; }

    .now { margin: 32px 0 12px; }
    .now-label { color: var(--muted); font-size: 20px; }
    .now-time { margin: 0; font-size: clamp(48px, 13vw, 72px); font-variant-numeric: tabular-nums; }

    .action-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 16px;
      font-weight: 800;
      font-size: clamp(24px, 7vw, 52px);
      cursor: pointer;
      transition: .2s ease;
    }
    .action-btn:hover { transform: translateY(-1px); }
    .btn-orange { background: var(--orange); color: #fff; }

    .stats {
      margin-top: 22px;
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    .stat {
      border: 1px solid #444;
      border-radius: 12px;
      background: #f6f6f6;
      padding: 10px;
      text-align: center;
    }
    .stat-title { font-size: 16px; }
    .stat hr { border: 0; border-top: 2px solid var(--orange); margin: 8px 0; }
    .stat-value { font-size: clamp(36px, 8vw, 46px); line-height: 1; }

    .footer-access {
      margin-top: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      text-decoration: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 20;
    }
    .modal.show { display: flex; }

    .card {
      width: min(540px, 100%);
      border-radius: 34px;
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .pill-date {
      background: var(--dark);
      color: #fff;
      text-align: center;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: clamp(24px, 5vw, 40px);
      margin-bottom: 10px;
    }
    h2 { margin: 8px 0 12px; font-size: clamp(28px, 6vw, 46px); }

    .types { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .type {
      border: 0;
      color: #fff;
      border-radius: 8px;
      min-height: 74px;
      font-size: clamp(22px, 5vw, 42px);
      font-weight: 800;
      cursor: pointer;
    }
    .type small { display: block; font-size: 14px; font-weight: 500; }
    .type.green { background: var(--green); }
    .type.orange { background: var(--orange); }
    .type.active { outline: 4px solid var(--line); }

    .time-row { margin: 14px 0 8px; font-size: clamp(28px, 6vw, 48px); }
    .time-row span { color: var(--muted); }
    #manualTime { border: 0; background: transparent; font-size: inherit; font-weight: 500; color: inherit; }

    .map {
      width: 100%;
      height: 220px;
      border-radius: 8px;
      border: 0;
      background: #ddd;
      object-fit: cover;
    }

    .justification {
      width: 100%;
      min-height: 120px;
      margin-top: 12px;
      border: 3px solid var(--orange);
      border-radius: 10px;
      resize: vertical;
      padding: 10px;
      font-family: inherit;
      display: none;
    }

    .confirm { margin-top: 12px; background: var(--green); color: #fff; }
    .close {
      margin-top: 8px;
      width: 100%;
      border: 0;
      background: #eee;
      border-radius: 999px;
      padding: 10px;
      cursor: pointer;
    }

    @media (min-width: 900px) {
      body { display: grid; place-items: center; padding: 26px; }
      .page { max-width: 860px; background: #f5f5f5; border-radius: 24px; box-shadow: var(--shadow); display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      .main-col { grid-column: 1; }
      .stats-col { grid-column: 2; align-self: end; }
      .stats { grid-template-columns: 1fr; margin-top: 0; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="main-col">
      <h1 class="hello" id="hello">Bom dia, @usuário!</h1>
      <p class="date" id="todayDate"></p>

      <div class="work-box">
        <small>Horas trabalhadas</small>
        <div class="work-time" id="workedToday">00:00:00</div>
      </div>

      <div class="now">
        <div class="now-label">Horário atual</div>
        <p class="now-time" id="liveClock">00:00:00</p>
      </div>

      <button class="action-btn btn-orange" id="openRegister">Registrar ponto</button>
    </section>

    <section class="stats-col">
      <div class="stats">
        <div class="stat">
          <div class="stat-title">Dias trabalhados</div>
          <hr>
          <div class="stat-value" id="daysWorked">0</div>
        </div>
        <div class="stat">
          <div class="stat-title">Horas registradas</div>
          <hr>
          <div class="stat-value" id="hoursRegistered">0h00min</div>
        </div>
      </div>

      <a href="historicoponto.html" class="action-btn btn-orange footer-access">
        <span>Acessar registros</span>
        <span id="monthTag"></span>
      </a>
    </section>
  </main>

  <div class="modal" id="registerModal">
    <div class="card">
      <div class="pill-date" id="modalDate"></div>
      <h2>Registrar como ponto de:</h2>
      <div class="types" id="types"></div>

      <div class="time-row"><span>Horário atual:</span> <input id="manualTime" type="time" step="60"></div>
      <iframe class="map" id="mapFrame" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <textarea class="justification" id="justification" placeholder="Escreva a justificativa:"></textarea>

      <button class="action-btn confirm" id="confirmPoint">Confirmar registro</button>
      <button class="close" id="closeModal">Fechar</button>
    </div>
  </div>

  <script type="module">
    import { protegerPagina } from './auth.js';

    const session = await protegerPagina({ paginaAtual: 'registrarponto.html' });
    if (!session) throw new Error('Sessão inválida');

    const userName = session.user.displayName || session.acesso.nome || 'usuário';
    const email = (session.user.email || session.acesso.email).toLowerCase();
    const storageKey = `ponto_registros_${email}`;

    const fmt2 = (n) => String(n).padStart(2, '0');
    const todayISO = () => {
      const now = new Date();
      return `${now.getFullYear()}-${fmt2(now.getMonth() + 1)}-${fmt2(now.getDate())}`;
    };

    const pointTypes = [
      { key: 'entrada', label: 'ENTRADA', color: 'green' },
      { key: 'pausa', label: 'PAUSA', color: 'orange' },
      { key: 'volta', label: 'VOLTA', sub: '(PÓS PAUSA)', color: 'green' },
      { key: 'saida', label: 'SAÍDA', color: 'orange' },
    ];

    const hello = document.getElementById('hello');
    const todayDate = document.getElementById('todayDate');
    const liveClock = document.getElementById('liveClock');
    const workedToday = document.getElementById('workedToday');
    const daysWorked = document.getElementById('daysWorked');
    const hoursRegistered = document.getElementById('hoursRegistered');
    const monthTag = document.getElementById('monthTag');

    const registerModal = document.getElementById('registerModal');
    const openRegister = document.getElementById('openRegister');
    const closeModal = document.getElementById('closeModal');
    const types = document.getElementById('types');
    const manualTime = document.getElementById('manualTime');
    const mapFrame = document.getElementById('mapFrame');
    const modalDate = document.getElementById('modalDate');
    const justification = document.getElementById('justification');

    let selectedType = 'entrada';
    let forceJustification = false;
    let latitude = -25.4297;
    let longitude = -49.2719;

    hello.textContent = `Bom dia, @${userName}!`;
    todayDate.textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    monthTag.textContent = new Date().toLocaleDateString('pt-BR', { month: 'short' }).toUpperCase().replace('.', '');

    function loadData() {
      return JSON.parse(localStorage.getItem(storageKey) || '[]');
    }

    function saveData(data) {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function updateClock() {
      const now = new Date();
      liveClock.textContent = `${fmt2(now.getHours())}:${fmt2(now.getMinutes())}:${fmt2(now.getSeconds())}`;
      if (!registerModal.classList.contains('show')) {
        manualTime.value = `${fmt2(now.getHours())}:${fmt2(now.getMinutes())}`;
      }
    }

    function calcWorkedMs(marcacoes = []) {
      const ordered = [...marcacoes].sort((a,b) => a.hora.localeCompare(b.hora));
      let total = 0;
      for (let i = 0; i < ordered.length - 1; i += 2) {
        const [h1, m1] = ordered[i].hora.split(':').map(Number);
        const [h2, m2] = ordered[i+1].hora.split(':').map(Number);
        total += Math.max(0, ((h2 * 60 + m2) - (h1 * 60 + m1)) * 60000);
      }
      return total;
    }

    function formatHMS(ms) {
      const secs = Math.floor(ms / 1000);
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return `${fmt2(h)}:${fmt2(m)}:${fmt2(s)}`;
    }

    function formatHM(ms) {
      const mins = Math.floor(ms / 60000);
      return `${Math.floor(mins / 60)}h${fmt2(mins % 60)}min`;
    }

    function renderSummary() {
      const all = loadData();
      const month = new Date().toISOString().slice(0, 7);
      const monthDays = all.filter((r) => r.date.startsWith(month));

      daysWorked.textContent = monthDays.filter((r) => (r.marcacoes || []).length > 0).length;
      hoursRegistered.textContent = formatHM(monthDays.reduce((sum, day) => sum + calcWorkedMs(day.marcacoes || []), 0));

      const today = all.find((r) => r.date === todayISO());
      workedToday.textContent = formatHMS(calcWorkedMs(today?.marcacoes || []));
    }

    function mountTypes() {
      types.innerHTML = pointTypes.map((t) => `
        <button class="type ${t.color} ${t.key === selectedType ? 'active' : ''}" data-key="${t.key}">
          ${t.label}${t.sub ? `<small>${t.sub}</small>` : ''}
        </button>
      `).join('');

      [...types.querySelectorAll('.type')].forEach((button) => {
        button.addEventListener('click', () => {
          selectedType = button.dataset.key;
          mountTypes();
        });
      });
    }

    function refreshMap() {
      mapFrame.src = `https://maps.google.com/maps?q=${latitude},${longitude}&z=16&output=embed`;
    }

    async function getLocation() {
      if (!navigator.geolocation) return;
      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition((pos) => {
          latitude = pos.coords.latitude;
          longitude = pos.coords.longitude;
          refreshMap();
          resolve();
        }, () => resolve(), { enableHighAccuracy: true, timeout: 5000 });
      });
    }

    function openPanel(withJustification = false) {
      forceJustification = withJustification;
      justification.style.display = withJustification ? 'block' : 'none';
      if (!withJustification) justification.value = '';
      modalDate.textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      selectedType = 'entrada';
      mountTypes();
      refreshMap();
      registerModal.classList.add('show');
      getLocation();
    }

    function closePanel() {
      registerModal.classList.remove('show');
    }

    function registerPoint() {
      const date = todayISO();
      const hour = manualTime.value;
      if (!hour) return alert('Selecione um horário.');
      if (forceJustification && !justification.value.trim()) return alert('Informe a justificativa para este lançamento.');

      const all = loadData();
      const idx = all.findIndex((d) => d.date === date);
      const mark = {
        hora: hour,
        timestamp: new Date(`${date}T${hour}:00`).toISOString(),
        tipo: selectedType,
        endereco: `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`,
        geo: { lat: latitude, lng: longitude },
        justificativa: justification.value.trim() || null,
        manual: forceJustification
      };

      if (idx === -1) all.push({ date, marcacoes: [mark] });
      else all[idx].marcacoes = [...(all[idx].marcacoes || []), mark];

      saveData(all);
      closePanel();
      renderSummary();
    }

    openRegister.addEventListener('click', () => openPanel(false));
    closeModal.addEventListener('click', closePanel);
    registerModal.addEventListener('click', (e) => { if (e.target === registerModal) closePanel(); });
    document.getElementById('confirmPoint').addEventListener('click', registerPoint);

    window.abrirRegistroComJustificativa = () => openPanel(true);

    updateClock();
    setInterval(updateClock, 1000);
    renderSummary();
  </script>
</body>
</html>
