<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar ponto</title>
  <style>
    :root {
      --bg: #ececec;
      --surface: #f6f6f6;
      --orange: #f68a1e;
      --green: #07ad56;
      --dark: #231f20;
      --text: #2f2e39;
      --muted: #8a8993;
      --border: #3f3f46;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.14);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", "Segoe UI", Arial, sans-serif;
      line-height: 1.25;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .panel {
      background: rgba(255,255,255,0.22);
      border-radius: 24px;
      padding: 22px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2.3rem, 7vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .header p {
      margin: 8px 0 0;
      color: var(--text);
      font-size: clamp(1.2rem, 3.9vw, 2rem);
      font-weight: 500;
    }

    .layout {
      margin-top: 18px;
      display: grid;
      gap: 16px;
    }

    .worked-box {
      background: var(--surface);
      border: 4px solid var(--orange);
      border-radius: var(--radius-lg);
      text-align: center;
      padding: 14px 16px;
    }

    .worked-box .label {
      display: block;
      color: var(--muted);
      font-size: clamp(1.1rem, 3.7vw, 1.8rem);
    }

    .worked-box .value,
    .clock .value {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .worked-box .value {
      font-size: clamp(3.1rem, 11vw, 4.8rem);
      font-weight: 500;
      margin-top: 2px;
    }

    .clock { margin-top: 18px; }

    .clock .label {
      color: var(--muted);
      font-size: clamp(1.2rem, 4vw, 2rem);
      margin-bottom: 2px;
      display: block;
    }

    .clock .value {
      margin: 0;
      font-size: clamp(3.2rem, 11vw, 5rem);
      font-weight: 500;
    }

    .btn-main {
      width: 100%;
      margin-top: 16px;
      border: none;
      border-radius: 999px;
      padding: 15px 20px;
      font-size: clamp(2rem, 8vw, 3.4rem);
      font-weight: 800;
      background: var(--orange);
      color: #fff;
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease;
    }

    .btn-main:hover { transform: translateY(-1px); filter: brightness(1.04); }

    .stats {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .stat {
      background: var(--surface);
      border: 1.6px solid var(--border);
      border-radius: var(--radius-md);
      padding: 11px 12px;
      text-align: center;
    }

    .stat-title {
      margin: 0;
      font-size: clamp(0.98rem, 3vw, 1.35rem);
      font-weight: 500;
    }

    .stat hr {
      margin: 8px 0;
      border: 0;
      border-top: 2px solid var(--orange);
    }

    .stat-value {
      margin: 0;
      font-size: clamp(2.1rem, 7vw, 3rem);
      font-weight: 500;
      line-height: 1;
    }

    .records-btn {
      margin-top: 14px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .records-btn span:last-child {
      font-size: clamp(1.6rem, 5vw, 2.3rem);
      font-weight: 500;
      opacity: .95;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 14px;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: min(620px, 100%);
      background: #fff;
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .pill-date {
      margin: 0;
      background: var(--dark);
      color: #fff;
      border-radius: 999px;
      text-align: center;
      padding: 10px 14px;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 500;
    }

    .modal-card h2 {
      margin: 14px 0 10px;
      font-size: clamp(1.8rem, 5.6vw, 2.8rem);
      font-weight: 500;
    }

    .types {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .type {
      border: 0;
      min-height: 58px;
      border-radius: 8px;
      color: #fff;
      font-size: clamp(1.6rem, 4.7vw, 2.3rem);
      font-weight: 800;
      cursor: pointer;
    }

    .type small { display: block; font-size: .72rem; font-weight: 500; margin-top: -2px; }
    .type.green { background: var(--green); }
    .type.orange { background: var(--orange); }
    .type.active { outline: 3px solid #2d2d2d; }

    .time-line {
      margin-top: 12px;
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .time-line span { color: var(--muted); }

    #manualTime {
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: 500;
      min-width: 130px;
    }

    .map {
      width: 100%;
      height: 200px;
      margin-top: 8px;
      border: 0;
      border-radius: 8px;
      background: #ddd;
    }

    .justification {
      display: none;
      width: 100%;
      margin-top: 12px;
      min-height: 110px;
      border: 2px solid var(--orange);
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      resize: vertical;
    }

    .confirm {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: clamp(2rem, 6.4vw, 3rem);
      font-weight: 800;
      background: var(--green);
      color: #fff;
      cursor: pointer;
    }

    .close-modal {
      margin-top: 8px;
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 9px;
      background: #ececec;
      cursor: pointer;
      font: inherit;
    }

    @media (min-width: 900px) {
      body { display: grid; align-items: center; }
      .shell { padding-top: 28px; }
      .panel {
        padding: 28px;
        background: rgba(255,255,255,0.25);
        box-shadow: var(--shadow);
      }

      .layout {
        grid-template-columns: 1.1fr .9fr;
        column-gap: 18px;
        align-items: end;
      }

      .stats {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 0;
      }

      .btn-main {
        margin-top: 18px;
        font-size: clamp(2.1rem, 4.4vw, 3.5rem);
      }

      .records-btn { margin-top: 12px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header class="header">
        <h1 id="hello">Bom dia, @usuário!</h1>
        <p id="todayDate"></p>
      </header>

      <div class="layout">
        <section>
          <div class="worked-box">
            <span class="label">Horas trabalhadas</span>
            <div class="value" id="workedToday">00:00:00</div>
          </div>

          <div class="clock">
            <span class="label">Horário atual</span>
            <p class="value" id="liveClock">00:00:00</p>
          </div>

          <button class="btn-main" id="openRegister">Registrar ponto</button>
        </section>

        <section>
          <div class="stats">
            <article class="stat">
              <p class="stat-title">Dias trabalhados</p>
              <hr>
              <p class="stat-value" id="daysWorked">0</p>
            </article>
            <article class="stat">
              <p class="stat-title">Horas registradas</p>
              <hr>
              <p class="stat-value" id="hoursRegistered">0h00min</p>
            </article>
          </div>

          <a href="historicoponto.html" class="btn-main records-btn">
            <span>Acessar registros</span>
            <span id="monthTag"></span>
          </a>
        </section>
      </div>
    </section>
  </main>

  <div class="modal" id="registerModal">
    <div class="modal-card">
      <p class="pill-date" id="modalDate"></p>
      <h2>Registrar como ponto de:</h2>
      <div class="types" id="types"></div>

      <div class="time-line">
        <span>Horário atual:</span>
        <input id="manualTime" type="time" step="60">
      </div>

      <iframe class="map" id="mapFrame" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <textarea class="justification" id="justification" placeholder="Escreva a justificativa:"></textarea>

      <button class="confirm" id="confirmPoint">Confirmar registro</button>
      <button class="close-modal" id="closeModal">Fechar</button>
    </div>
  </div>

  <script type="module">
    import { protegerPagina } from './auth.js';

    const session = await protegerPagina({ paginaAtual: 'registrarponto.html' });
    if (!session) throw new Error('Sessão inválida');

    const userName = session.user.displayName || session.acesso.nome || 'usuário';
    const email = (session.user.email || session.acesso.email).toLowerCase();
    const storageKey = `ponto_registros_${email}`;

    const fmt2 = (n) => String(n).padStart(2, '0');
    const todayISO = () => {
      const now = new Date();
      return `${now.getFullYear()}-${fmt2(now.getMonth() + 1)}-${fmt2(now.getDate())}`;
    };

    const pointTypes = [
      { key: 'entrada', label: 'ENTRADA', color: 'green' },
      { key: 'pausa', label: 'PAUSA', color: 'orange' },
      { key: 'volta', label: 'VOLTA', sub: '(PÓS PAUSA)', color: 'green' },
      { key: 'saida', label: 'SAÍDA', color: 'orange' }
    ];

    const hello = document.getElementById('hello');
    const todayDate = document.getElementById('todayDate');
    const liveClock = document.getElementById('liveClock');
    const workedToday = document.getElementById('workedToday');
    const daysWorked = document.getElementById('daysWorked');
    const hoursRegistered = document.getElementById('hoursRegistered');
    const monthTag = document.getElementById('monthTag');

    const registerModal = document.getElementById('registerModal');
    const openRegister = document.getElementById('openRegister');
    const closeModal = document.getElementById('closeModal');
    const types = document.getElementById('types');
    const manualTime = document.getElementById('manualTime');
    const mapFrame = document.getElementById('mapFrame');
    const modalDate = document.getElementById('modalDate');
    const justification = document.getElementById('justification');

    let selectedType = 'entrada';
    let forceJustification = false;
    let latitude = -25.4297;
    let longitude = -49.2719;

    hello.textContent = `Bom dia, @${userName}!`;
    todayDate.textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    monthTag.textContent = new Date().toLocaleDateString('pt-BR', { month: 'short' }).toUpperCase().replace('.', '');

    function loadData() {
      return JSON.parse(localStorage.getItem(storageKey) || '[]');
    }

    function saveData(data) {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function updateClock() {
      const now = new Date();
      liveClock.textContent = `${fmt2(now.getHours())}:${fmt2(now.getMinutes())}:${fmt2(now.getSeconds())}`;
      if (!registerModal.classList.contains('show')) {
        manualTime.value = `${fmt2(now.getHours())}:${fmt2(now.getMinutes())}`;
      }
    }

    function calcWorkedMs(marcacoes = []) {
      const ordered = [...marcacoes].sort((a, b) => a.hora.localeCompare(b.hora));
      let total = 0;
      for (let i = 0; i < ordered.length - 1; i += 2) {
        const [h1, m1] = ordered[i].hora.split(':').map(Number);
        const [h2, m2] = ordered[i + 1].hora.split(':').map(Number);
        total += Math.max(0, ((h2 * 60 + m2) - (h1 * 60 + m1)) * 60000);
      }
      return total;
    }

    function formatHMS(ms) {
      const secs = Math.floor(ms / 1000);
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return `${fmt2(h)}:${fmt2(m)}:${fmt2(s)}`;
    }

    function formatHM(ms) {
      const mins = Math.floor(ms / 60000);
      return `${Math.floor(mins / 60)}h${fmt2(mins % 60)}min`;
    }

    function renderSummary() {
      const all = loadData();
      const month = new Date().toISOString().slice(0, 7);
      const monthDays = all.filter((r) => r.date.startsWith(month));

      daysWorked.textContent = monthDays.filter((r) => (r.marcacoes || []).length > 0).length;
      hoursRegistered.textContent = formatHM(monthDays.reduce((sum, day) => sum + calcWorkedMs(day.marcacoes || []), 0));

      const today = all.find((r) => r.date === todayISO());
      workedToday.textContent = formatHMS(calcWorkedMs(today?.marcacoes || []));
    }

    function mountTypes() {
      types.innerHTML = pointTypes.map((t) => `
        <button class="type ${t.color} ${t.key === selectedType ? 'active' : ''}" data-key="${t.key}">
          ${t.label}${t.sub ? `<small>${t.sub}</small>` : ''}
        </button>
      `).join('');

      [...types.querySelectorAll('.type')].forEach((button) => {
        button.addEventListener('click', () => {
          selectedType = button.dataset.key;
          mountTypes();
        });
      });
    }

    function refreshMap() {
      mapFrame.src = `https://maps.google.com/maps?q=${latitude},${longitude}&z=16&output=embed`;
    }

    async function getLocation() {
      if (!navigator.geolocation) return;
      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition((pos) => {
          latitude = pos.coords.latitude;
          longitude = pos.coords.longitude;
          refreshMap();
          resolve();
        }, () => resolve(), { enableHighAccuracy: true, timeout: 5000 });
      });
    }

    function openPanel(withJustification = false) {
      forceJustification = withJustification;
      justification.style.display = withJustification ? 'block' : 'none';
      if (!withJustification) justification.value = '';
      modalDate.textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      selectedType = 'entrada';
      mountTypes();
      refreshMap();
      registerModal.classList.add('show');
      getLocation();
    }

    function closePanel() {
      registerModal.classList.remove('show');
    }

    function registerPoint() {
      const date = todayISO();
      const hour = manualTime.value;
      if (!hour) return alert('Selecione um horário.');
      if (forceJustification && !justification.value.trim()) return alert('Informe a justificativa para este lançamento.');

      const all = loadData();
      const idx = all.findIndex((d) => d.date === date);
      const mark = {
        hora: hour,
        timestamp: new Date(`${date}T${hour}:00`).toISOString(),
        tipo: selectedType,
        endereco: `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`,
        geo: { lat: latitude, lng: longitude },
        justificativa: justification.value.trim() || null,
        manual: forceJustification
      };

      if (idx === -1) all.push({ date, marcacoes: [mark] });
      else all[idx].marcacoes = [...(all[idx].marcacoes || []), mark];

      saveData(all);
      closePanel();
      renderSummary();
    }

    openRegister.addEventListener('click', () => openPanel(false));
    closeModal.addEventListener('click', closePanel);
    registerModal.addEventListener('click', (e) => { if (e.target === registerModal) closePanel(); });
    document.getElementById('confirmPoint').addEventListener('click', registerPoint);

    window.abrirRegistroComJustificativa = () => openPanel(true);

    updateClock();
    setInterval(updateClock, 1000);
    renderSummary();
  </script>
</body>
</html>
