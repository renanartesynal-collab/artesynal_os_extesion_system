<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Controle de Ponto</title>
  <style>
    :root {
      --purple: #6a0dad;
      --purple-light: #f3e8ff;
      --purple-dark: #581c87;
      --bg: #f9fafb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray: #9ca3af;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 25px -5px rgb(0 0 0 / 0.1);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-lg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-nav {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-nav:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--purple);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: var(--purple-dark);
      box-shadow: 0 0 20px rgba(106, 10, 173, 0.3);
    }

    .btn-success {
      background: var(--success);
      color: white;
      border: none;
      padding: 8px 12px;
      font-size: 12px;
    }

    .btn-success:hover {
      background: #059669;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
      border: none;
      padding: 8px 12px;
      font-size: 12px;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-warning {
      background: var(--warning);
      color: white;
      border: none;
      padding: 8px 12px;
      font-size: 12px;
    }

    .btn-warning:hover {
      background: #d97706;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Seleção de Usuário */
    .user-selector {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      border: 2px solid var(--border);
    }

    .user-selector h2 {
      font-size: 18px;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .user-select-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .user-option {
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--bg);
      font-weight: 500;
      text-align: center;
    }

    .user-option:hover {
      border-color: var(--purple);
      background: var(--purple-light);
    }

    .user-option.selected {
      background: var(--purple);
      color: white;
      border-color: var(--purple);
    }

    /* Estatísticas */
    .stats-section {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--purple-light), #f5e6ff);
      border: 1px solid #e9d5ff;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--purple);
      font-variant-numeric: tabular-nums;
    }

    /* Filtros de Período */
    .period-selector {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .period-selector label {
      font-weight: 600;
      font-size: 14px;
    }

    .period-selector select,
    .period-selector input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .period-selector select:focus,
    .period-selector input:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-light);
    }

    /* Pontos Lista */
    .points-section {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .points-section h3 {
      font-size: 18px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .month-group {
      margin-bottom: 24px;
    }

    .month-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: linear-gradient(135deg, var(--purple-light), #f5e6ff);
      border-radius: 8px;
      margin-bottom: 12px;
      font-weight: 600;
      color: var(--purple);
    }

    .day-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .day-card:hover {
      border-color: var(--purple);
      box-shadow: 0 2px 8px rgba(106, 10, 173, 0.1);
    }

    .day-header {
      background: var(--bg);
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .day-header:hover {
      background: var(--purple-light);
    }

    .day-title {
      font-weight: 600;
      color: var(--text);
    }

    .day-toggle {
      color: var(--muted);
      transition: transform 0.3s ease;
    }

    .day-card.expanded .day-toggle {
      transform: rotate(180deg);
    }

    .day-points {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .day-card.expanded .day-points {
      max-height: 1000px;
    }

    .point-row {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      justify-content: space-between;
    }

    .point-row:last-child {
      border-bottom: none;
    }

    .point-info {
      flex: 1;
    }

    .point-time {
      font-weight: 600;
      color: var(--purple);
      font-size: 15px;
    }

    .point-type {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .point-address {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      word-break: break-word;
    }

    .point-address a {
      color: var(--purple);
      text-decoration: none;
      font-weight: 500;
    }

    .point-address a:hover {
      text-decoration: underline;
    }

    .point-actions {
      display: flex;
      gap: 8px;
    }

    .point-canceled {
      opacity: 0.5;
      background: #f3f4f6;
    }

    .point-canceled .point-time,
    .point-canceled .point-type,
    .point-canceled .point-address {
      color: var(--gray);
      text-decoration: line-through;
    }

    /* Solicitações */
    .submission-item {
      border: 2px solid var(--warning);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      background: #fffbeb;
    }

    .submission-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .submission-info {
      flex: 1;
    }

    .submission-title {
      font-weight: 600;
      color: var(--text);
    }

    .submission-details {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .submission-justificativa {
      font-size: 13px;
      color: var(--text);
      background: white;
      padding: 8px;
      border-radius: 6px;
      margin: 8px 0;
      font-style: italic;
    }

    .submission-actions {
      display: flex;
      gap: 8px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      border-radius: 12px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--muted);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-light);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .user-select-grid {
        grid-template-columns: 1fr;
      }

      .period-selector {
        flex-direction: column;
        align-items: flex-start;
      }

      .point-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .point-actions {
        width: 100%;
      }

      .point-actions button {
        flex: 1;
      }

      .submission-actions {
        flex-wrap: wrap;
      }

      .submission-actions button {
        flex: 1;
        min-width: 100px;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 12px 16px;
      }

      header h1 {
        font-size: 18px;
      }

      .container {
        padding: 12px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .stat-value {
        font-size: 24px;
      }

      .user-select-grid {
        grid-template-columns: 1fr;
      }

      .point-row {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🛡️ Painel de Controle</h1>
    <div class="header-actions">
      <a href="historicoponto.html" class="btn btn-nav">📚 Histórico</a>
      <a href="registrarponto.html" class="btn btn-nav">📍 Registrar</a>
      <a href="index.html" class="btn btn-nav">🏠 Painel</a>
    </div>
  </header>

  <div class="container">
    <!-- Seleção de Usuário -->
    <div class="user-selector">
      <h2>👤 Selecione um usuário</h2>
      <div class="user-select-grid" id="userGrid"></div>
    </div>

    <!-- Estatísticas (atualiza com seleção de usuário e período) -->
    <div class="stats-section" id="statsSection" style="display: none;">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Dias trabalhados</div>
          <div class="stat-value" id="diasTrabalhados">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Horas registradas</div>
          <div class="stat-value" id="horasRegistradas" style="font-size: 20px;">00h00min</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Faltas</div>
          <div class="stat-value" id="faltas">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Atrasos</div>
          <div class="stat-value" id="atrasos">0</div>
        </div>
      </div>
    </div>

    <!-- Seleção de Período -->
    <div class="period-selector" id="periodSelector" style="display: none;">
      <label>Período:</label>
      <select id="periodSelect">
        <option value="atual">Mês atual</option>
        <option value="anterior">Mês anterior</option>
        <option value="custom">Personalizado</option>
      </select>
      <select id="customMonth" style="display: none;">
        <option value="">Selecione um mês...</option>
      </select>
      <button class="btn btn-primary btn-sm" id="resetPeriodBtn">Mês atual</button>
    </div>

    <!-- Pontos do Usuário -->
    <div class="points-section" id="pointsSection" style="display: none;">
      <h3>📍 Registros de Ponto</h3>
      <div id="pointsList"></div>
    </div>
  </div>

  <!-- Modal de Edição -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Corrigir Ponto</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="form-group">
        <label for="editTime">Novo horário</label>
        <input type="time" id="editTime" required>
      </div>
      <div class="modal-actions">
        <button onclick="closeModal()" style="background: var(--border); color: var(--text);">Cancelar</button>
        <button onclick="saveEdit()" class="btn btn-primary" style="border: none; width: 100%; padding: 12px;">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { protegerPagina } from './auth.js';

    let sessao = null;
    let selectedUser = null;
    let selectedMonth = null;
    let editingPoint = null;

    (async () => {
      sessao = await protegerPagina({ paginaAtual: 'paineldeponto.html', exigirAdmin: true });
      if (!sessao) throw new Error('sem sessão');
      
      renderUsers();
      setupPeriodSelector();
    })();

    const pad = (n) => String(n).padStart(2, '0');
    const fmt = (mins) => `${pad(Math.floor(mins/60))}h${pad(mins%60)}min`;
    const kDate = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

    function getUsers() {
      return Object.keys(localStorage)
        .filter(k => k.startsWith('ponto_registros_'))
        .map(k => k.replace('ponto_registros_', ''))
        .sort();
    }

    function renderUsers() {
      const users = getUsers();
      const grid = document.getElementById('userGrid');
      grid.innerHTML = '';

      if (users.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--muted);">Nenhum usuário registrado</div>';
        return;
      }

      users.forEach(user => {
        const btn = document.createElement('div');
        btn.className = 'user-option';
        btn.textContent = user;
        btn.onclick = () => selectUser(user);
        grid.appendChild(btn);
      });
    }

    function selectUser(user) {
      selectedUser = user;
      selectedMonth = null;
      
      document.querySelectorAll('.user-option').forEach(btn => btn.classList.remove('selected'));
      event.target.classList.add('selected');
      
      document.getElementById('statsSection').style.display = 'block';
      document.getElementById('periodSelector').style.display = 'flex';
      document.getElementById('pointsSection').style.display = 'block';
      
      renderPoints();
    }

    function setupPeriodSelector() {
      const select = document.getElementById('customMonth');
      const now = new Date();
      
      for (let i = 0; i < 24; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const key = `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
        const label = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = label;
        select.appendChild(opt);
      }

      document.getElementById('periodSelect').onchange = () => {
        const val = document.getElementById('periodSelect').value;
        document.getElementById('customMonth').style.display = val === 'custom' ? 'block' : 'none';
        if (val !== 'custom') renderPoints();
      };

      document.getElementById('customMonth').onchange = () => renderPoints();
      
      document.getElementById('resetPeriodBtn').onclick = () => {
        document.getElementById('periodSelect').value = 'atual';
        document.getElementById('customMonth').style.display = 'none';
        renderPoints();
      };
    }

    function renderPoints() {
      if (!selectedUser) return;

      const periodSelect = document.getElementById('periodSelect').value;
      const now = new Date();
      let targetMonth;

      if (periodSelect === 'atual') {
        targetMonth = `${now.getFullYear()}-${pad(now.getMonth() + 1)}`;
      } else if (periodSelect === 'anterior') {
        const prev = new Date(now.getFullYear(), now.getMonth() - 1);
        targetMonth = `${prev.getFullYear()}-${pad(prev.getMonth() + 1)}`;
      } else {
        targetMonth = document.getElementById('customMonth').value;
      }

      selectedMonth = targetMonth;

      const regs = JSON.parse(localStorage.getItem(`ponto_registros_${selectedUser}`) || '[]')
        .filter(r => r.date.startsWith(targetMonth))
        .sort((a, b) => b.date.localeCompare(a.date));

      const solic = JSON.parse(localStorage.getItem('ponto_solicitacoes') || '[]')
        .filter(s => s.email === selectedUser && s.date.startsWith(targetMonth));

      updateStats(regs);
      renderPointsList(regs, solic);
    }

    function updateStats(regs) {
      let totalMins = 0;
      let dias = 0;
      let atrasos = 0;

      regs.forEach(r => {
        const marks = (r.marcacoes || []).sort((a, b) => a.timestamp - b.timestamp);
        let dayTotal = 0;
        for (let i = 0; i < marks.length - 1; i += 2) {
          dayTotal += Math.max(0, Math.round((new Date(marks[i+1].timestamp) - new Date(marks[i].timestamp)) / 60000));
        }
        totalMins += dayTotal;
        if (dayTotal > 0) dias++;

        const first = marks[0]?.hora;
        if (first && parseInt(first) > 8) atrasos++;
      });

      const [year, month] = selectedMonth.split('-');
      const fim = new Date(parseInt(year), parseInt(month), 0);
      const faltas = Math.max(0, fim.getDate() - dias);

      document.getElementById('diasTrabalhados').textContent = dias;
      document.getElementById('horasRegistradas').textContent = fmt(totalMins);
      document.getElementById('faltas').textContent = faltas;
      document.getElementById('atrasos').textContent = atrasos;
    }

    function renderPointsList(regs, solic) {
      const list = document.getElementById('pointsList');
      list.innerHTML = '';

      const months = {};
      regs.forEach(r => {
        const monthKey = r.date.substring(0, 7);
        if (!months[monthKey]) months[monthKey] = [];
        months[monthKey].push(r);
      });

      if (regs.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div>Nenhum registro neste período</div></div>';
        return;
      }

      Object.keys(months).sort().reverse().forEach(monthKey => {
        const monthGroup = document.createElement('div');
        monthGroup.className = 'month-group';

        const [year, month] = monthKey.split('-');
        const monthLabel = new Date(parseInt(year), parseInt(month) - 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

        const monthHeader = document.createElement('div');
        monthHeader.className = 'month-header';
        monthHeader.textContent = `📅 ${monthLabel}`;
        monthGroup.appendChild(monthHeader);

        months[monthKey].forEach(dayReg => {
          const dayCard = document.createElement('div');
          dayCard.className = 'day-card';

          const dateObj = new Date(dayReg.date + 'T00:00:00');
          const dateLabel = dateObj.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit' });

          const header = document.createElement('div');
          header.className = 'day-header';
          header.onclick = () => dayCard.classList.toggle('expanded');
          header.innerHTML = `
            <div class="day-title">${dateLabel}</div>
            <div class="day-toggle">▼</div>
          `;
          dayCard.appendChild(header);

          const pointsDiv = document.createElement('div');
          pointsDiv.className = 'day-points';

          const marks = (dayReg.marcacoes || []).sort((a, b) => a.hora.localeCompare(b.hora));
          marks.forEach((mark, idx) => {
            const row = document.createElement('div');
            row.className = 'point-row';
            row.innerHTML = `
              <div class="point-info">
                <div class="point-time">${mark.hora}</div>
                <div class="point-type">${mark.tipo || 'Normal'}</div>
                <div class="point-address">
                  <a href="https://maps.google.com/?q=${mark.endereco.split(',')[0]},${mark.endereco.split(',')[1]}" target="_blank">
                    📍 ${mark.endereco}
                  </a>
                </div>
              </div>
              <div class="point-actions">
                <button class="btn btn-warning" onclick="openEditModal('${dayReg.date}', ${idx}, '${mark.hora}')">Corrigir</button>
                <button class="btn btn-danger" onclick="cancelPoint('${dayReg.date}', ${idx})">Anular</button>
              </div>
            `;
            pointsDiv.appendChild(row);
          });

          dayCard.appendChild(pointsDiv);
          monthGroup.appendChild(dayCard);
        });

        // Solicitações deste dia
        const solicitacoes = solic.filter(s => s.date === dayReg.date);
        if (solicitacoes.length > 0) {
          solicitacoes.forEach(sol => {
            const solDiv = document.createElement('div');
            solDiv.className = 'submission-item';
            solDiv.innerHTML = `
              <div class="submission-header">
                <div class="submission-info">
                  <div class="submission-title">Solicitação de Ponto</div>
                  <div class="submission-details">${sol.horaPretendida}</div>
                  <div class="submission-justificativa">"${sol.justificativa}"</div>
                </div>
              </div>
              <div class="submission-actions">
                <button class="btn btn-success" onclick="approveSub('${sol.id}')">✓ Aprovar</button>
                <button class="btn btn-danger" onclick="rejectSub('${sol.id}')">✕ Recusar</button>
              </div>
            `;
            pointsDiv.appendChild(solDiv);
          });
        }

        list.appendChild(monthGroup);
      });
    }

    window.openEditModal = (date, idx, time) => {
      editingPoint = { date, idx };
      document.getElementById('editTime').value = time;
      document.getElementById('editModal').classList.add('show');
    };

    window.closeModal = () => {
      document.getElementById('editModal').classList.remove('show');
    };

    window.saveEdit = () => {
      const newTime = document.getElementById('editTime').value;
      const regs = JSON.parse(localStorage.getItem(`ponto_registros_${selectedUser}`) || '[]');
      const day = regs.find(r => r.date === editingPoint.date);
      if (day) {
        day.marcacoes[editingPoint.idx].hora = newTime;
        day.marcacoes[editingPoint.idx].timestamp = new Date(`${editingPoint.date}T${newTime}:00`).toISOString();
        localStorage.setItem(`ponto_registros_${selectedUser}`, JSON.stringify(regs));
      }
      closeModal();
      renderPoints();
    };

    window.cancelPoint = (date, idx) => {
      const regs = JSON.parse(localStorage.getItem(`ponto_registros_${selectedUser}`) || '[]');
      const day = regs.find(r => r.date === date);
      if (day) {
        day.marcacoes[idx].cancelado = true;
        localStorage.setItem(`ponto_registros_${selectedUser}`, JSON.stringify(regs));
      }
      renderPoints();
    };

    window.approveSub = (id) => {
      const solic = JSON.parse(localStorage.getItem('ponto_solicitacoes') || '[]');
      const sol = solic.find(s => s.id === id);
      if (sol) {
        sol.status = 'aprovado';
        // Adicionar ao registro
        const regs = JSON.parse(localStorage.getItem(`ponto_registros_${sol.email}`) || '[]');
        let day = regs.find(r => r.date === sol.date);
        if (!day) {
          day = { date: sol.date, marcacoes: [] };
          regs.push(day);
        }
        day.marcacoes.push({
          timestamp: new Date(`${sol.date}T${sol.horaPretendida}:00`).toISOString(),
          hora: sol.horaPretendida,
          tipo: 'solicitacao',
          endereco: 'Aprovado via solicitação',
          origem: 'solicitacao'
        });
        localStorage.setItem(`ponto_registros_${sol.email}`, JSON.stringify(regs));
        localStorage.setItem('ponto_solicitacoes', JSON.stringify(solic));
      }
      renderPoints();
    };

    window.rejectSub = (id) => {
      const solic = JSON.parse(localStorage.getItem('ponto_solicitacoes') || '[]');
      const sol = solic.find(s => s.id === id);
      if (sol) {
        sol.status = 'recusado';
        localStorage.setItem('ponto_solicitacoes', JSON.stringify(solic));
      }
      renderPoints();
    };
  </script>
</body>
</html>
