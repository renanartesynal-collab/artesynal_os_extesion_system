<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registros de Ponto - Artesynal</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f3f3f7; --card:#fff; --line:#e7e7ef; --text:#2f2f39; --muted:#888896; --primary:#6f14b3;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:22px 16px 30px}
    .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .back{color:#fff;text-decoration:none;background:#31313b;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:700}
    .tabs{display:inline-flex;gap:4px;background:#ececf1;border-radius:10px;padding:4px}
    .tab{text-decoration:none;color:#7d7d89;padding:10px 14px;border-radius:8px;font-weight:600}
    .tab.active{background:#fff;color:var(--primary)}
    .card{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 10px 24px rgba(26,26,44,.06);margin-bottom:12px}
    h1{margin:0 0 14px;font-size:26px}
    .sum{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
    .box{border:1px solid var(--line);border-radius:10px;padding:10px}
    .box small{color:var(--muted)}
    .box strong{display:block;font-size:24px;margin-top:6px}
    .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
    .filters input,.filters select{width:100%;border:1px solid #d8d8e3;border-radius:8px;padding:10px;font-family:inherit}
    .month{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px}
    .month button{width:100%;border:0;background:#f8f8fb;padding:14px;text-align:left;display:flex;justify-content:space-between;align-items:center;font-weight:800;cursor:pointer}
    .month .content{padding:8px 14px 14px}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{border-bottom:1px solid var(--line);padding:10px 6px;text-align:left}
    th{font-size:12px;text-transform:uppercase;color:#5e5e6c}
    .tag{padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700}
    .ok{background:#e8f8f0;color:#1f9d62}.warn{background:#fff3e3;color:#b77708}.miss{background:#ffe9e9;color:#dc3d3d}
    .empty{color:#8a8a98;text-align:center;padding:20px}
    @media (max-width:760px){ .hide-mobile{display:none;} table{font-size:12px;} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="ponto.html">⬅ Voltar ao controle</a>
      <div class="tabs">
        <a class="tab" href="ponto.html">Controle de ponto</a>
        <a class="tab active" href="registrosponto.html">Registros de ponto</a>
      </div>
    </div>

    <section class="card">
      <h1>Resumo de horas do colaborador</h1>
      <div class="sum" id="sumario"></div>
    </section>

    <section class="card filters">
      <input id="q" type="text" placeholder="Pesquisar por justificativa, dia, observação">
      <select id="status">
        <option value="todos">Todos os status</option>
        <option value="ok">Registrado</option>
        <option value="warn">Extra / Ajuste</option>
        <option value="miss">Falta / Incompleto</option>
      </select>
      <select id="tipo">
        <option value="todos">Todos os tipos</option>
        <option value="normal">Normal</option>
        <option value="extra">Extra</option>
        <option value="falta">Falta</option>
        <option value="justificado">Justificado</option>
      </select>
      <input id="periodo" type="month">
    </section>

    <section class="card" id="meses"></section>
  </div>

  <script>
    const STORE_KEY = 'artesynal_ponto_registros_v2';
    const MAX_NORMAL_MIN = 8 * 60;

    const q = document.getElementById('q');
    const status = document.getElementById('status');
    const tipo = document.getElementById('tipo');
    const periodo = document.getElementById('periodo');
    const meses = document.getElementById('meses');
    const sumario = document.getElementById('sumario');

    function loadRegistros() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }

    function toMin(hhmm) {
      const [h,m] = hhmm.split(':').map(Number);
      return h * 60 + m;
    }

    function fmt(min) {
      const safe = Math.max(0, Math.floor(min || 0));
      const h = String(Math.floor(safe / 60)).padStart(2, '0');
      const m = String(safe % 60).padStart(2, '0');
      return `${h}h${m}min`;
    }

    function weekdayShort(dateIso) {
      const d = new Date(dateIso + 'T00:00:00');
      return ['dom','seg','ter','qua','qui','sex','sáb'][d.getDay()];
    }

    function monthLabel(dateIso) {
      const d = new Date(dateIso + 'T00:00:00');
      const m = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][d.getMonth()];
      return `${m} ${d.getFullYear()}`;
    }

    function groupedByDay(list) {
      return list.reduce((acc, rec) => {
        acc[rec.date] = acc[rec.date] || [];
        acc[rec.date].push(rec);
        return acc;
      }, {});
    }

    function workedMinutes(dayList) {
      const ordered = [...dayList].sort((a,b) => a.time.localeCompare(b.time));
      let total = 0;
      for (let i = 0; i + 1 < ordered.length; i += 2) {
        total += Math.max(0, toMin(ordered[i + 1].time) - toMin(ordered[i].time));
      }
      return total;
    }

    function monthlyRows(records) {
      const byDay = groupedByDay(records);
      const dates = Object.keys(byDay).sort((a,b) => b.localeCompare(a));
      const rows = [];

      dates.forEach((dateIso) => {
        const list = byDay[dateIso];
        const total = workedMinutes(list);
        const ordered = [...list].sort((a,b) => a.time.localeCompare(b.time));

        let tipoRow = 'normal';
        let st = 'ok';
        if (total > MAX_NORMAL_MIN) { tipoRow = 'extra'; st = 'warn'; }
        if (ordered.length % 2 !== 0) { tipoRow = 'falta'; st = 'miss'; }
        if (ordered.some((r) => r.posterior)) { tipoRow = 'justificado'; st = 'warn'; }

        rows.push({
          month: monthLabel(dateIso),
          dateIso,
          dia: `${dateIso.split('-').reverse().join('/')} (${weekdayShort(dateIso)})`,
          entrada: ordered[0]?.time || '-',
          saida: ordered[ordered.length - 1]?.time || '-',
          total: total ? fmt(total) : '-',
          justificativa: ordered.filter((r) => r.posterior).map((r) => r.justification).join(' | ') || 'Sem observações',
          tipo: tipoRow,
          status: st
        });
      });

      return rows;
    }

    function monthFromLabel(label) {
      const p = periodo.value;
      if (!p) return true;
      const [y,m] = p.split('-');
      const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      return label === `${meses[Number(m)-1]} ${y}`;
    }

    function render() {
      const rowsAll = monthlyRows(loadRegistros());

      // Sumário
      let total = 0, extra = 0, faltas = 0, atraso = 0;
      rowsAll.forEach((r) => {
        if (r.total !== '-') {
          const mins = toMin(r.total.replace('h', ':').replace('min', ''));
          total += mins;
          if (r.tipo === 'extra') extra += Math.max(0, mins - MAX_NORMAL_MIN);
          if (r.dateIso < new Date().toISOString().slice(0,10)) atraso += Math.max(0, MAX_NORMAL_MIN - mins);
        }
        if (r.status === 'miss') faltas += 1;
      });

      sumario.innerHTML = `
        <div class="box"><small>Total trabalhado</small><strong>${fmt(total)}</strong></div>
        <div class="box"><small>Horas extras</small><strong>${fmt(extra)}</strong></div>
        <div class="box"><small>Faltas / incompletos</small><strong>${faltas}</strong></div>
        <div class="box"><small>Atrasos</small><strong>${fmt(atraso)}</strong></div>
      `;

      const txt = q.value.toLowerCase().trim();
      const filtered = rowsAll.filter((r) => {
        const textOk = txt ? (r.justificativa.toLowerCase().includes(txt) || r.dia.toLowerCase().includes(txt)) : true;
        const stOk = status.value === 'todos' ? true : r.status === status.value;
        const tipoOk = tipo.value === 'todos' ? true : r.tipo === tipo.value;
        const perOk = monthFromLabel(r.month);
        return textOk && stOk && tipoOk && perOk;
      });

      if (!filtered.length) {
        meses.innerHTML = '<div class="empty">Nenhum registro encontrado para os filtros selecionados.</div>';
        return;
      }

      const byMonth = filtered.reduce((acc, r) => {
        acc[r.month] = acc[r.month] || [];
        acc[r.month].push(r);
        return acc;
      }, {});

      meses.innerHTML = Object.entries(byMonth).map(([mes, itens], i) => `
        <article class="month">
          <button type="button" onclick="toggleMes('mc${i}', this)">
            <span>${mes} • ${itens.length} registros</span>
            <span>▼</span>
          </button>
          <div class="content" id="mc${i}">
            <table>
              <thead>
                <tr>
                  <th>Dia</th><th>Entrada</th><th>Saída</th><th>Total</th><th class="hide-mobile">Justificativa</th><th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${itens.map((r) => `
                  <tr>
                    <td>${r.dia}</td>
                    <td>${r.entrada}</td>
                    <td>${r.saida}</td>
                    <td>${r.total}</td>
                    <td class="hide-mobile">${r.justificativa}</td>
                    <td><span class="tag ${r.status}">${r.status === 'ok' ? 'Registrado' : r.status === 'warn' ? 'Ajuste/Extra' : 'Falta/Incompleto'}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </article>
      `).join('');
    }

    function toggleMes(id, el) {
      const c = document.getElementById(id);
      const open = c.style.display !== 'none';
      c.style.display = open ? 'none' : 'block';
      el.lastElementChild.textContent = open ? '▶' : '▼';
    }

    [q, status, tipo, periodo].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    periodo.value = new Date().toISOString().slice(0, 7);
    window.toggleMes = toggleMes;
    render();
  </script>
</body>
</html>
