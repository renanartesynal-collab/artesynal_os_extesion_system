<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registros de Ponto - Artesynal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f4f7;
            --card: #fff;
            --line: #e7e7ef;
            --text: #2f2f38;
            --muted: #838392;
            --primary: #6f14b3;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 18px 36px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .top a {
            text-decoration: none;
            color: #fff;
            background: #31313b;
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 700;
        }

        .tabs {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            border-radius: 10px;
            background: #ececf0;
        }

        .tab {
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            color: #7d7d8a;
            font-weight: 600;
        }

        .tab.active {
            background: #fff;
            color: var(--primary);
        }

        .summary {
            background: var(--card);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(24, 24, 44, 0.06);
            padding: 20px;
            margin-bottom: 18px;
        }

        .summary h1 {
            margin: 0 0 16px;
            font-size: 26px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 10px 16px;
        }

        .sum-item {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sum-item small { color: var(--muted); }
        .sum-item strong { font-size: 24px; }

        .filters {
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 8px 22px rgba(24, 24, 44, 0.06);
            margin-bottom: 18px;
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }

        .filters input,
        .filters select {
            width: 100%;
            border: 1px solid #d8d8e3;
            border-radius: 8px;
            padding: 10px;
            font-family: inherit;
        }

        .month {
            background: var(--card);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(25, 25, 47, 0.06);
            margin-bottom: 14px;
            overflow: hidden;
        }

        .month-btn {
            width: 100%;
            border: none;
            background: #f8f8fb;
            border-bottom: 1px solid var(--line);
            padding: 16px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            color: #3a3a45;
            cursor: pointer;
        }

        .month-content { padding: 10px 16px 16px; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            text-align: left;
            border-bottom: 1px solid var(--line);
            padding: 11px 6px;
        }

        th {
            color: #5d5d68;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .tag {
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }

        .ok { background: #e8f8f0; color: #1e9f66; }
        .warn { background: #fff4e2; color: #bd7d09; }
        .miss { background: #ffe9e9; color: #dd3b3b; }

        @media (max-width: 780px) {
            table { font-size: 12px; }
            .hide-mobile { display: none; }
            .summary h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="top">
            <a href="ponto.html">⬅ Voltar ao controle</a>
            <div class="tabs">
                <a class="tab" href="ponto.html">Controle de ponto</a>
                <a class="tab active" href="registrosponto.html">Registros de ponto</a>
            </div>
        </div>

        <section class="summary">
            <h1>Resumo geral do colaborador</h1>
            <div class="summary-grid">
                <div class="sum-item"><small>Total trabalhado (mar/2026)</small><strong>181h14min</strong></div>
                <div class="sum-item"><small>Horas extras</small><strong>08h30min</strong></div>
                <div class="sum-item"><small>Faltas</small><strong>1</strong></div>
                <div class="sum-item"><small>Atrasos</small><strong>05h46min</strong></div>
                <div class="sum-item"><small>Banco atual</small><strong>+02h10min</strong></div>
            </div>
        </section>

        <section class="filters">
            <input id="filterText" type="text" placeholder="Buscar por justificativa, dia ou observação">
            <select id="filterStatus">
                <option value="todos">Todos os status</option>
                <option value="ok">Registrado</option>
                <option value="warn">Extra / Ajuste</option>
                <option value="miss">Falta / Incompleto</option>
            </select>
            <select id="filterType">
                <option value="todos">Todos os tipos</option>
                <option value="normal">Normal</option>
                <option value="extra">Extra</option>
                <option value="falta">Falta</option>
                <option value="justificado">Justificado</option>
            </select>
            <input id="filterPeriod" type="month" value="2026-03">
        </section>

        <section id="monthsContainer"></section>
    </div>

    <script>
        const registros = [
            { mes: 'Março 2026', data: '30/03/2026 (seg)', entrada: '08:00', saida: '17:12', total: '08h12min', tipo: 'normal', status: 'ok', justificativa: 'Registro padrão do dia' },
            { mes: 'Março 2026', data: '29/03/2026 (dom)', entrada: '-', saida: '-', total: '-', tipo: 'falta', status: 'miss', justificativa: 'Descanso semanal remunerado' },
            { mes: 'Março 2026', data: '27/03/2026 (sex)', entrada: '08:00', saida: '18:41', total: '09h11min', tipo: 'extra', status: 'warn', justificativa: 'Hora extra no fechamento de produção' },
            { mes: 'Março 2026', data: '22/03/2026 (seg)', entrada: '08:11', saida: '17:00', total: '07h59min', tipo: 'justificado', status: 'warn', justificativa: 'Ajuste com justificativa: trânsito' },
            { mes: 'Fevereiro 2026', data: '26/02/2026 (qui)', entrada: '07:59', saida: '17:01', total: '08h02min', tipo: 'normal', status: 'ok', justificativa: 'Sem observações' },
            { mes: 'Fevereiro 2026', data: '15/02/2026 (dom)', entrada: '-', saida: '-', total: '-', tipo: 'falta', status: 'miss', justificativa: 'Falta sem justificativa' }
        ];

        const monthsContainer = document.getElementById('monthsContainer');
        const filterText = document.getElementById('filterText');
        const filterStatus = document.getElementById('filterStatus');
        const filterType = document.getElementById('filterType');
        const filterPeriod = document.getElementById('filterPeriod');

        function render() {
            const text = filterText.value.toLowerCase().trim();
            const status = filterStatus.value;
            const type = filterType.value;
            const period = filterPeriod.value;

            const filtrados = registros.filter((r) => {
                const mesMatch = period ? r.data.includes(period.split('-')[1] + '/' + period.split('-')[0]) : true;
                const textMatch = text ? (r.justificativa.toLowerCase().includes(text) || r.data.toLowerCase().includes(text)) : true;
                const statusMatch = status === 'todos' ? true : r.status === status;
                const typeMatch = type === 'todos' ? true : r.tipo === type;
                return mesMatch && textMatch && statusMatch && typeMatch;
            });

            const groups = filtrados.reduce((acc, item) => {
                acc[item.mes] = acc[item.mes] || [];
                acc[item.mes].push(item);
                return acc;
            }, {});

            if (!Object.keys(groups).length) {
                monthsContainer.innerHTML = '<div class="month"><div class="month-content">Nenhum registro encontrado para os filtros selecionados.</div></div>';
                return;
            }

            monthsContainer.innerHTML = Object.entries(groups).map(([mes, itens], idx) => `
                <article class="month">
                    <button class="month-btn" type="button" onclick="toggleMonth('m${idx}', this)">
                        <span>${mes} • ${itens.length} registros</span>
                        <span>▼</span>
                    </button>
                    <div class="month-content" id="m${idx}">
                        <table>
                            <thead>
                                <tr>
                                    <th>Dia</th>
                                    <th>Entrada</th>
                                    <th>Saída</th>
                                    <th>Total</th>
                                    <th class="hide-mobile">Justificativa</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${itens.map(item => `
                                    <tr>
                                        <td>${item.data}</td>
                                        <td>${item.entrada}</td>
                                        <td>${item.saida}</td>
                                        <td>${item.total}</td>
                                        <td class="hide-mobile">${item.justificativa}</td>
                                        <td><span class="tag ${item.status}">${labelStatus(item.status)}</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </article>
            `).join('');
        }

        function labelStatus(status) {
            if (status === 'ok') return 'Registrado';
            if (status === 'warn') return 'Ajuste/Extra';
            return 'Falta/Incompleto';
        }

        function toggleMonth(id, btn) {
            const content = document.getElementById(id);
            const isVisible = content.style.display !== 'none';
            content.style.display = isVisible ? 'none' : 'block';
            btn.lastElementChild.textContent = isVisible ? '▶' : '▼';
        }

        [filterText, filterStatus, filterType, filterPeriod].forEach((el) => {
            el.addEventListener('input', render);
            el.addEventListener('change', render);
        });

        window.toggleMonth = toggleMonth;
        render();
    </script>
</body>
</html>
