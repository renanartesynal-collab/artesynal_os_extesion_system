<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0b;
      --card: #161616;
      --muted: #a3a3a3;
      --line: #2b2b2b;
      --accent: #ff6b00;
      --ok: #22c55e;
      --pending: #f59e0b;
      --danger: #ef4444;
      --blue: #38bdf8;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; }
    .topbar { position: sticky; top: 0; z-index: 20; background: #111; border-bottom: 1px solid var(--line); padding: 14px 18px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .topbar h1 { margin: 0; font-size: 20px; }
    .topbar small { color: var(--muted); }
    .actions-top { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { border: 1px solid #3a3a3a; background: #1d1d1d; color: #fff; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; }
    .btn:hover { filter: brightness(1.15); }
    .btn.primary { background: var(--accent); border-color: var(--accent); }
    .btn.ok { background: var(--ok); border-color: var(--ok); color: #041007; }

    .wrap { padding: 18px; max-width: 1400px; margin: 0 auto; }
    .status { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .board-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
    .board-tools { display:flex; gap:8px; flex-wrap:wrap; }
    .board-scroll { overflow-x:auto; padding-bottom:10px; }
    .board { display:flex; gap:14px; align-items:flex-start; min-height:220px; }
    .list-column { background: linear-gradient(180deg, #161616, #111111); border:1px solid #2d2d2d; border-radius:14px; width:320px; min-width:320px; max-width:320px; padding:12px; box-shadow: 0 10px 24px rgba(0,0,0,.28); }
    .list-column.following { border-color:#60a5fa; box-shadow: 0 0 0 1px rgba(96,165,250,.35), 0 10px 24px rgba(0,0,0,.28); }
    .list-column.archived { opacity:.55; }
    .list-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
    .list-title { font-weight:800; font-size:16px; line-height:1.15; }
    .list-sub { color:var(--muted); font-size:11px; margin-top:4px; }
    .list-menu-btn { width:34px; height:34px; border-radius:10px; border:1px solid #3b3b3b; background:#1d1d1d; color:#fff; cursor:pointer; font-weight:900; }
    .list-body { display:flex; flex-direction:column; gap:10px; min-height:90px; }
    .list-body.drop-target { border:1px dashed rgba(56,189,248,.55); border-radius:12px; background:rgba(56,189,248,.08); padding:8px; }
    .list-add-card { width:100%; margin-top:10px; background:#1f2937; border-color:#374151; }
    .add-list-card { width:280px; min-width:280px; border-radius:14px; border:1px dashed rgba(255,255,255,.18); background:rgba(255,255,255,.08); color:#fff; min-height:64px; padding:0; overflow:hidden; }
    .add-list-card button { width:100%; min-height:64px; border:none; background:transparent; color:#fff; text-align:left; padding:18px 16px; font-size:14px; font-weight:800; cursor:pointer; }
    .list-empty { color:#757575; border:1px dashed #353535; border-radius:10px; padding:16px 12px; text-align:center; font-size:12px; }

    .task-card { background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--pending); border-radius: 10px; padding: 12px; cursor: grab; transition: opacity .16s ease, transform .16s ease, box-shadow .16s ease; }
    .task-card.done { border-left-color: var(--ok); opacity: .8; }
    .task-card.dragging { opacity:.45; transform: rotate(1deg) scale(.98); box-shadow:0 14px 30px rgba(0,0,0,.35); cursor:grabbing; }
    .task-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .task-card-title-wrap { display:flex; align-items:center; gap:10px; min-width:0; flex:1; }
    .task-card-tools { display:flex; align-items:center; gap:8px; opacity:0; pointer-events:none; transition:opacity .16s ease; }
    .task-card:hover .task-card-tools,
    .task-card:focus-within .task-card-tools { opacity:1; pointer-events:auto; }
    .task-card-indicator,
    .task-card-edit { width:28px; height:28px; border-radius:8px; border:1px solid #4a4a4a; background:#202020; color:#f5f5f5; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; padding:0; flex:none; }
    .task-card-indicator { border-radius:999px; font-size:0; position:relative; }
    .task-card-indicator::after { content:''; width:12px; height:12px; border-radius:999px; background:#6b7280; box-shadow:0 0 0 1px rgba(255,255,255,.12) inset; }
    .task-card-indicator.is-green::after { background:#22c55e; }
    .task-card-indicator.is-yellow::after { background:#eab308; }
    .task-card-indicator.is-red::after { background:#ef4444; }
    .task-card-edit { font-size:14px; }
    .task-card-indicator:hover,
    .task-card-edit:hover { filter:brightness(1.15); }
    .tag { display:inline-block; font-size:10px; font-weight:800; padding:2px 7px; border-radius:999px; background:#222; color:#ddd; margin-right:6px; }
    .tag.imp { background:#291a3d; color:#ca8bff; }
    .tag.serr { background:#362313; color:#ffb573; }
    .tag.orc { background:#123040; color:#7dd3fc; }
    .title { font-weight:800; margin:8px 0 6px; }
    .desc { font-size:13px; color:#ddd; white-space: pre-wrap; }
    .meta { margin-top:8px; font-size:11px; color:var(--muted); line-height:1.5; }
    .card-actions { margin-top: 10px; display:flex; gap:8px; }

    .empty { color:#777; border:1px dashed #444; border-radius:10px; padding:22px; text-align:center; }

    .modal-bg { position: fixed; inset:0; background: rgba(0,0,0,.75); display:none; align-items:center; justify-content:center; z-index:40; }
    .modal { background: #121212; border:1px solid #333; width:min(700px,94vw); max-height:90vh; overflow:auto; border-radius:12px; padding:16px; }
    .modal h2 { margin:0 0 12px; }
    .modal.list-actions-modal { width:min(520px,94vw); }
    .list-modal-title-btn { appearance:none; border:none; background:transparent; color:#fff; padding:0; margin:0; font:inherit; font-size:28px; font-weight:900; line-height:1.1; text-align:left; cursor:pointer; }
    .list-modal-title-btn:hover { color:#facc15; }
    .row { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; margin-bottom:10px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:12px; color: var(--muted); font-weight: 700; }
    input, select, textarea { background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:8px; padding:10px; font-family:inherit; }
    textarea { min-height:95px; resize:vertical; }
    .hint { font-size: 11px; color: #94a3b8; }
    .opt-panel { border:1px solid #303030; border-radius:8px; padding:10px; margin-bottom:10px; background:#101010; }
    .section-title { font-size:12px; font-weight:800; color:#a3a3a3; letter-spacing:.03em; text-transform:uppercase; margin:16px 0 10px; }
    .action-list { display:flex; flex-direction:column; gap:8px; }
    .action-item { width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; background:#1a1a1a; border:1px solid #333; border-radius:10px; padding:10px 12px; color:#fff; text-align:left; font-weight:700; cursor:pointer; }
    .action-item:hover { border-color:#555; }
    .action-item small { display:block; color:#a3a3a3; font-weight:600; margin-top:2px; }
    .automation-grid { display:grid; gap:10px; }
    .rule-box { background:#111; border:1px solid #2f2f2f; border-radius:10px; padding:10px; }
    .rule-row { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
    .pill { display:inline-flex; align-items:center; gap:6px; font-size:10px; font-weight:800; background:#1f2937; color:#bfdbfe; border-radius:999px; padding:4px 8px; }

    .side-toggle { position: fixed; top: 50%; right: 0; transform: translateY(-50%); z-index:45; }
    .side-toggle button { border-radius: 10px 0 0 10px; border: 1px solid #444; border-right: none; background: #1c1c1c; color: #fff; padding: 12px 10px; cursor: pointer; }
    .side-quick-close { position: fixed; top: 50%; right: 360px; transform: translateY(-50%); z-index:46; display:none; }
    .side-quick-close button { border-radius: 10px 0 0 10px; border: 1px solid #444; border-right: none; background:#ef4444; color:#fff; padding: 12px 10px; cursor:pointer; font-weight:800; }
    .sidebar.open + .side-quick-close { display:block; }
    .sidebar { position: fixed; top:0; right:-360px; width:360px; max-width:92vw; height:100vh; background:#111; border-left:1px solid #2c2c2c; padding:14px; transition:right .22s; z-index:44; display:flex; flex-direction:column; }
    .sidebar.open { right:0; }
    .sidebar h3 { margin:0; }
    .req-list { margin-top:10px; display:flex; flex-direction:column; gap:8px; overflow:auto; }
    .req-item { border:1px solid #333; border-radius:8px; padding:9px; }
    .req-item .st { font-size:11px; font-weight:700; }
    .st.p { color:var(--pending); }
    .st.c { color:var(--ok); }

    @media (max-width: 680px) {
      .row { grid-template-columns:1fr; }
      .rule-row { grid-template-columns:1fr; }
      .topbar { flex-direction:column; align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>✅ Painel de Tarefas</h1>
      <small id="who"></small>
    </div>
    <div class="actions-top">
      <a class="btn" href="index.html">⬅ Voltar ao painel</a>
      <button class="btn" id="btn-notify">🔔 Ativar notificação</button>
      <button class="btn" id="btn-delete-done">🗑 Excluir concluídas</button>
    </div>
  </div>

  <div class="wrap">
    <div class="status" id="status-msg">Carregando tarefas...</div>
    <div class="board-toolbar">
      <h3 style="margin:10px 0 8px;">Minhas tarefas</h3>
      <div class="board-tools">
        <button class="btn" id="btn-new-task">➕ Nova tarefa</button>
        <button class="btn" id="btn-add-list">➕ Adicionar lista</button>
      </div>
    </div>
    <div class="board-scroll">
      <div id="task-list" class="board"></div>
    </div>
  </div>

  <div class="side-toggle"><button id="btn-side">📋 Minhas solicitações</button></div>
  <aside class="sidebar" id="sidebar">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
      <h3>Solicitações que eu fiz</h3>
      <button class="btn" id="btn-close-side">Fechar</button>
    </div>
    <div class="req-list" id="req-list"></div>
  </aside>
  <div class="side-quick-close"><button id="btn-close-side-quick">✖</button></div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <h2 id="task-modal-title">Anexar tarefa</h2>
      <div class="row">
        <div class="field">
          <label>Setor</label>
          <select id="f-setor">
            <option value="impressao">Impressão</option>
            <option value="serralheria">Serralheria</option>
            <option value="orcamento">Orçamento</option>
          </select>
        </div>
        <div class="field">
          <label>Tipo de card</label>
          <select id="f-tipo"></select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Anexar para usuário</label>
          <select id="f-user"></select>
        </div>
        <div class="field">
          <label>Título/Resumo</label>
          <input id="f-resumo" placeholder="Ex: Comprar mídia adesivo brilho" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Card do setor (opcional)</label>
          <select id="f-card">
            <option value="">Sem vínculo com card</option>
          </select>
        </div>
        <div class="field">
          <label>Lista de destino</label>
          <select id="f-lista"></select>
        </div>
      </div>

      <div id="opts" class="opt-panel"></div>

      <div class="field">
        <label>Descrição detalhada</label>
        <textarea id="f-desc" placeholder="Descreva o que deve ser realizado no card..."></textarea>
      </div>

      <div class="hint" style="margin-top:8px;">As opções mudam automaticamente com base no setor/tipo de card.</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
        <button class="btn" id="btn-cancel">Cancelar</button>
        <button class="btn ok" id="btn-save">Salvar tarefa</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="modal-list-bg">
    <div class="modal list-actions-modal">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
        <div>
          <button class="list-modal-title-btn" id="list-modal-title" type="button" ></button>
          <div id="list-modal-sub" style="color:#a3a3a3;font-size:12px;"></div>
        </div>
        <button class="btn" id="btn-close-list-modal">Fechar</button>
      </div>

      <div class="section-title">Ações rápidas</div>
      <div class="action-list">
        <button class="action-item" id="act-add-card"><span>Adicionar cartão<small>Abre o formulário já apontando para esta lista.</small></span><span>➕</span></button>
        <button class="action-item" id="act-rename-list"><span>Renomear lista<small>Permite editar o nome desta lista.</small></span><span>🖊</span></button>
        <button class="action-item" id="act-copy-list"><span>Copiar lista<small>Cria uma nova lista com o mesmo nome e automações.</small></span><span>📄</span></button>
        <button class="action-item" id="act-move-list"><span>Mover lista<small>Reposiciona a coluna no painel.</small></span><span>↔</span></button>
        <button class="action-item" id="act-move-cards"><span>Mover todos os cartões nesta lista<small>Envia todos os cartões para outra lista.</small></span><span>📦</span></button>
        <button class="action-item" id="act-follow-list"><span>Seguir<small>Destaca a lista como favorita neste painel.</small></span><span>⭐</span></button>
      </div>

      <div class="section-title">Automação</div>
      <div class="automation-grid">
        <div class="rule-box">
          <div class="field">
            <label>Quando um cartão for adicionado à lista...</label>
            <select id="auto-on-add">
              <option value="">Não fazer nada</option>
              <option value="recentes">Colocar os mais recentes primeiro</option>
              <option value="antigos">Colocar os mais antigos primeiro</option>
              <option value="titulo">Ordenar por título (A-Z)</option>
              <option value="setor">Agrupar por setor</option>
            </select>
          </div>
        </div>
        <div class="rule-box">
          <div class="field">
            <label>Todo dia, ordenar a lista por...</label>
            <select id="auto-daily-sort">
              <option value="">Desativado</option>
              <option value="recentes">Mais recentes</option>
              <option value="antigos">Mais antigos</option>
              <option value="titulo">Título (A-Z)</option>
              <option value="setor">Setor</option>
            </select>
          </div>
        </div>
        <div class="rule-box">
          <div class="field">
            <label>Toda segunda-feira, ordenar a lista por...</label>
            <select id="auto-weekly-sort">
              <option value="">Desativado</option>
              <option value="recentes">Mais recentes</option>
              <option value="antigos">Mais antigos</option>
              <option value="titulo">Título (A-Z)</option>
              <option value="setor">Setor</option>
            </select>
          </div>
        </div>
        <div class="rule-box">
          <div style="font-weight:800;margin-bottom:8px;">Criar uma regra</div>
          <div class="rule-row">
            <div class="field">
              <label>Gatilho</label>
              <select id="auto-rule-trigger">
                <option value="">Sem regra</option>
                <option value="ao_concluir">Ao concluir um cartão</option>
              </select>
            </div>
            <div class="field">
              <label>Ação</label>
              <select id="auto-rule-action">
                <option value="">Nenhuma ação</option>
                <option value="mover_lista">Mover para outra lista</option>
                <option value="manter">Apenas manter concluído</option>
              </select>
            </div>
          </div>
          <div class="field" style="margin-top:10px;">
            <label>Lista de destino da regra</label>
            <select id="auto-rule-target"></select>
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px;">
        <button class="btn" id="btn-save-list-automation">Salvar automações</button>
      </div>

      <div class="section-title">Arquivamento</div>
      <div class="action-list">
        <button class="action-item" id="act-archive-list"><span>Arquivar esta lista<small>Esconde a lista do painel e move os cartões para a entrada.</small></span><span>🗃️</span></button>
        <button class="action-item" id="act-archive-cards"><span>Arquivar todos os cartões nesta lista<small>Move todos os cartões desta lista para a entrada.</small></span><span>📥</span></button>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from './config.js';
    import { protegerPagina } from './auth.js';
    import { collection, addDoc, updateDoc, deleteDoc, doc, query, where, onSnapshot, serverTimestamp, getDocs, orderBy } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    async function carregarModuloCardsTarefas() {
      const response = await fetch('./cards_tarefas.html', { cache: 'no-store' });
      if (!response.ok) throw new Error('Não foi possível carregar cards_tarefas.html');
      const html = await response.text();
      const parsed = new DOMParser().parseFromString(html, 'text/html');
      const moduleCode = parsed.querySelector('script[type="module"]')?.textContent?.trim();
      if (!moduleCode) throw new Error('cards_tarefas.html não possui módulo de cards.');

      const blobUrl = URL.createObjectURL(new Blob([moduleCode], { type: 'text/javascript' }));
      try {
        return await import(blobUrl);
      } finally {
        URL.revokeObjectURL(blobUrl);
      }
    }

    const { createCardsTarefasModule } = await carregarModuloCardsTarefas();

    const sessao = await protegerPagina({ paginaAtual: 'tarefas.html' });
    if (!sessao) throw new Error('Sessão inválida');

    const me = {
      nome: sessao.user.displayName || sessao.acesso.nome,
      email: (sessao.user.email || '').toLowerCase()
    };
    document.getElementById('who').textContent = `Logado como ${me.nome} (${me.email})`;

    const MAPA_TIPOS = {
      impressao: ['Mídia', 'Insumo', 'Ajuste de Impressão'],
      serralheria: ['Material', 'Corte', 'Montagem'],
      orcamento: ['Orçamento', 'Contato', 'Aprovação']
    };

    const refs = {
      modal: document.getElementById('modal-bg'),
      listModal: document.getElementById('modal-list-bg'),
      modalTitle: document.getElementById('task-modal-title'),
      setor: document.getElementById('f-setor'),
      tipo: document.getElementById('f-tipo'),
      user: document.getElementById('f-user'),
      card: document.getElementById('f-card'),
      lista: document.getElementById('f-lista'),
      resumo: document.getElementById('f-resumo'),
      desc: document.getElementById('f-desc'),
      opts: document.getElementById('opts'),
      saveTask: document.getElementById('btn-save'),
      taskList: document.getElementById('task-list'),
      reqList: document.getElementById('req-list'),
      status: document.getElementById('status-msg'),
      listModalTitle: document.getElementById('list-modal-title'),
      listModalSub: document.getElementById('list-modal-sub'),
      autoOnAdd: document.getElementById('auto-on-add'),
      autoDailySort: document.getElementById('auto-daily-sort'),
      autoWeeklySort: document.getElementById('auto-weekly-sort'),
      autoRuleTrigger: document.getElementById('auto-rule-trigger'),
      autoRuleAction: document.getElementById('auto-rule-action'),
      autoRuleTarget: document.getElementById('auto-rule-target')
    };

    let usuarios = [];
    let cardsSetor = [];
    let pendingCount = 0;
    let listasPainel = [];
    let tarefasRecebidas = [];
    let listaModalAtual = null;
    let tarefaArrastandoId = '';
    let tarefaEmEdicaoId = null;
    let criandoListaInicial = false;

    const CICLO_SINALIZACAO = ['', 'green', 'yellow', 'red'];
    const NOME_LISTA_INICIAL = 'Minha lista';

    function labelSetor(setor) {
      if (setor === 'impressao') return 'Impressão';
      if (setor === 'serralheria') return 'Serralheria';
      if (setor === 'orcamento') return 'Orçamento';
      return setor || 'Não informado';
    }

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizarListasPainel(listas = []) {
      return [...listas]
        .filter((lista, index, arr) => arr.findIndex((item) => item.id === lista.id) === index)
        .sort((a, b) => (Number(a.ordem) || 0) - (Number(b.ordem) || 0));
    }

    function obterListasAtivas() {
      return normalizarListasPainel(listasPainel).filter((lista) => !lista.arquivada);
    }

    function obterListaPorId(listaId = '') {
      return normalizarListasPainel(listasPainel).find((lista) => lista.id === listaId) || obterListasAtivas()[0] || null;
    }

    function preencherSelectListas(valor = '') {
      const listas = obterListasAtivas();
      if (!listas.length) {
        refs.lista.innerHTML = '<option value="">Crie uma lista primeiro</option>';
        refs.autoRuleTarget.innerHTML = '<option value="">Selecione</option>';
        refs.lista.value = '';
        return;
      }
      const options = listas.map((lista) => `<option value="${lista.id}">${escapeHtml(lista.nome)}</option>`);
      refs.lista.innerHTML = options.join('');
      refs.autoRuleTarget.innerHTML = [`<option value="">Selecione</option>`, ...listas.filter((lista) => lista.id !== (listaModalAtual?.id || '')).map((lista) => `<option value="${lista.id}">${escapeHtml(lista.nome)}</option>`)].join('');

      if (valor && listas.some((lista) => lista.id === valor)) refs.lista.value = valor;
      else refs.lista.value = listas[0]?.id || '';
    }

    function gerarSlugLista(nome = '') {
      const base = String(nome || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 36) || 'lista';
      return `${base}-${Date.now().toString(36)}`;
    }

    function getTaskListId(tarefa = {}) {
      const primeiraLista = obterListasAtivas()[0];
      const listaId = String(tarefa.listaId || '').trim();
      if (!listaId) return primeiraLista?.id || '';
      const listaExiste = normalizarListasPainel(listasPainel).some((lista) => lista.id === listaId && !lista.arquivada);
      return listaExiste ? listaId : (primeiraLista?.id || '');
    }

    function getSortModeForList(lista = {}) {
      const automacoes = lista.automacoes || {};
      const hoje = new Date();
      if (automacoes.semanal && hoje.getDay() === 1) return automacoes.semanal;
      if (automacoes.diaria) return automacoes.diaria;
      return automacoes.aoAdicionar || '';
    }

    function ordenarTarefasDaLista(lista = {}, tarefas = []) {
      const modo = getSortModeForList(lista);
      const ordenada = [...tarefas];
      if (modo === 'titulo') {
        ordenada.sort((a, b) => String(a.resumo || '').localeCompare(String(b.resumo || ''), 'pt-BR'));
      } else if (modo === 'setor') {
        ordenada.sort((a, b) => labelSetor(a.setor).localeCompare(labelSetor(b.setor), 'pt-BR'));
      } else if (modo === 'antigos') {
        ordenada.sort((a, b) => (a?.created_at?.toMillis?.() || 0) - (b?.created_at?.toMillis?.() || 0));
      } else {
        ordenada.sort((a, b) => (b?.created_at?.toMillis?.() || 0) - (a?.created_at?.toMillis?.() || 0));
      }
      return ordenada;
    }

    function montarLinkCard(setor, cardId) {
      const mapa = {
        impressao: 'estimpressao.html',
        serralheria: 'estserralheria.html',
        orcamento: 'solicitacao.html'
      };
      const page = mapa[setor];
      if (!page || !cardId) return '';
      const url = new URL(page, window.location.href);
      if (setor === 'orcamento') {
        url.searchParams.set('id', cardId);
        url.searchParams.set('mode', 'view');
        return url.toString();
      }
      url.hash = `item-${cardId}`;
      return url.toString();
    }

    function resolverLinkTarefa(tarefa = {}) {
      if (tarefa?.cardAlvo?.setor && tarefa?.cardAlvo?.id) {
        return montarLinkCard(tarefa.cardAlvo.setor, tarefa.cardAlvo.id);
      }
      return tarefa?.cardAlvo?.link || '';
    }

    function labelCardDoSetor(item = {}) {
      if (item.setor === 'orcamento') {
        const cliente = item.cliente || 'Sem cliente';
        const num = item.numeroDisplay || item.id;
        return `${num} • ${cliente}`;
      }
      return `${item.nome || item.categoria || 'Card'} (${item.id})`;
    }

    function atualizarSubtituloListaModal() {
      if (!refs.listModalSub) return;
      if (!listaModalAtual) {
        if (refs.listModalTitle) refs.listModalTitle.textContent = '';
        refs.listModalSub.textContent = '';
        return;
      }
      if (refs.listModalTitle) refs.listModalTitle.textContent = listaModalAtual.nome;
      const automacoesAtivas = [];
      if (listaModalAtual.seguindo) automacoesAtivas.push('seguindo');
      if (listaModalAtual?.automacoes?.aoAdicionar) automacoesAtivas.push('auto ao adicionar');
      if (listaModalAtual?.automacoes?.diaria) automacoesAtivas.push('ordem diária');
      if (listaModalAtual?.automacoes?.semanal) automacoesAtivas.push('ordem semanal');
      refs.listModalSub.innerHTML = automacoesAtivas.length ? `<span class="pill">${escapeHtml(automacoesAtivas.join(' • '))}</span>` : '';
    }

    function preencherAutomacoesListaModal(lista = null) {
      const listaAtual = lista || obterListasAtivas()[0] || {};
      const automacoes = listaAtual.automacoes || {};
      refs.autoOnAdd.value = automacoes.aoAdicionar || '';
      refs.autoDailySort.value = automacoes.diaria || '';
      refs.autoWeeklySort.value = automacoes.semanal || '';
      refs.autoRuleTrigger.value = automacoes.regra?.gatilho || '';
      refs.autoRuleAction.value = automacoes.regra?.acao || '';
      preencherSelectListas();
      refs.autoRuleTarget.value = automacoes.regra?.listaDestinoId || '';
      atualizarSubtituloListaModal();
    }

    function abrirModalLista(listaId) {
      const lista = listasPainel.find((item) => item.id === listaId);
      if (!lista) return alert('Lista não encontrada.');
      listaModalAtual = lista;
      preencherAutomacoesListaModal(lista);
      refs.listModal.style.display = 'flex';
    }

    function fecharModalLista() {
      refs.listModal.style.display = 'none';
      listaModalAtual = null;
      atualizarSubtituloListaModal();
    }

    function preencherCardsSetorSelecionado(selecionado = '') {
      const options = [`<option value="">Sem vínculo com card</option>`];
      cardsSetor.forEach((c) => {
        options.push(`<option value="${c.id}">${labelCardDoSetor(c)}</option>`);
      });
      refs.card.innerHTML = options.join('');
      if (selecionado && cardsSetor.some((c) => c.id === selecionado)) refs.card.value = selecionado;
    }

    async function preencherTipos(cardId = '') {
      const tipos = MAPA_TIPOS[refs.setor.value] || [];
      refs.tipo.innerHTML = tipos.map((t) => `<option value="${t}">${t}</option>`).join('');
      await carregarCardsSetor(refs.setor.value);
      preencherCardsSetorSelecionado(cardId);
      renderOpcoes();
    }

    function renderOpcoes() {
      const setor = refs.setor.value;
      const tipo = refs.tipo.value;
      const blocos = [];

      if (setor === 'impressao') {
        blocos.push(`<label><input type="checkbox" id="opt-comprar-midia"> Solicitar compra de mídia</label>`);
        blocos.push(`<label><input type="checkbox" id="opt-urgente"> Urgente</label>`);
      }
      if (setor === 'serralheria') {
        blocos.push(`<label><input type="checkbox" id="opt-corte"> Necessita corte</label>`);
        blocos.push(`<input id="opt-medida" placeholder="Tamanho(s): ex 120x80 / 120x120" />`);
        blocos.push(`<label><input type="radio" name="destino-corte" value="local" checked> Corte local</label>`);
        blocos.push(`<label><input type="radio" name="destino-corte" value="externo"> Encaminhar para corte externo</label>`);
        blocos.push(`<input id="opt-local-externo" placeholder="Local externo (se aplicável)" />`);
      }
      if (setor === 'orcamento') {
        blocos.push(`<label><input type="checkbox" id="opt-cliente-contato"> Cliente precisa de contato</label>`);
        blocos.push(`<label><input type="checkbox" id="opt-aprovacao"> Aguardando aprovação</label>`);
      }

      refs.opts.innerHTML = `<div style="font-size:12px;color:#a3a3a3;margin-bottom:8px;">Opções rápidas para: <b>${tipo || 'card'}</b></div>${blocos.join('<br>')}`;
    }

    async function criarLista() {
      const nome = prompt('Nome da nova lista:');
      if (!nome || !nome.trim()) return;
      const listasAtivas = obterListasAtivas();
      await addDoc(collection(db, 'painel_tarefas_listas'), {
        ownerEmail: me.email,
        nome: nome.trim(),
        slug: gerarSlugLista(nome),
        ordem: listasAtivas.length,
        seguindo: false,
        arquivada: false,
        automacoes: {},
        created_at: serverTimestamp(),
        updated_at: serverTimestamp()
      });
    }

    async function garantirListaInicial() {
      if (criandoListaInicial || obterListasAtivas().length) return;
      criandoListaInicial = true;
      try {
        await addDoc(collection(db, 'painel_tarefas_listas'), {
          ownerEmail: me.email,
          nome: NOME_LISTA_INICIAL,
          slug: gerarSlugLista(NOME_LISTA_INICIAL),
          ordem: 0,
          seguindo: false,
          arquivada: false,
          automacoes: {},
          created_at: serverTimestamp(),
          updated_at: serverTimestamp()
        });
      } finally {
        criandoListaInicial = false;
      }
    }

    async function atualizarListaPainel(listaId, payload = {}) {
      if (!listaId) return;
      await updateDoc(doc(db, 'painel_tarefas_listas', listaId), {
        ...payload,
        updated_at: serverTimestamp()
      });
    }

    async function copiarLista(lista) {
      if (!lista) return;
      const nome = prompt('Nome da cópia da lista:', `${lista.nome} (cópia)`);
      if (!nome || !nome.trim()) return;
      const listasAtivas = obterListasAtivas();
      await addDoc(collection(db, 'painel_tarefas_listas'), {
        ownerEmail: me.email,
        nome: nome.trim(),
        slug: gerarSlugLista(nome),
        ordem: listasAtivas.length,
        seguindo: false,
        arquivada: false,
        automacoes: { ...(lista.automacoes || {}) },
        created_at: serverTimestamp(),
        updated_at: serverTimestamp()
      });
    }

    async function renomearLista(lista) {
      if (!lista) return;
      const nome = prompt('Novo nome da lista:', lista.nome || '');
      if (!nome || !nome.trim()) return;
      await atualizarListaPainel(lista.id, { nome: nome.trim() });
    }

    async function moverLista(lista) {
      if (!lista) return;
      const listasAtivas = obterListasAtivas();
      const atual = listasAtivas.findIndex((item) => item.id === lista.id);
      if (atual < 0) return;
      const destinoTexto = prompt(`Mover "${lista.nome}" para qual posição? (1 até ${listasAtivas.length})`, String(atual + 1));
      if (!destinoTexto) return;
      const destino = Math.min(Math.max(Number(destinoTexto) || 1, 1), listasAtivas.length) - 1;
      const reordenadas = [...listasAtivas];
      const [removida] = reordenadas.splice(atual, 1);
      reordenadas.splice(destino, 0, removida);
      await Promise.all(reordenadas.map((item, index) => atualizarListaPainel(item.id, { ordem: index + 1 })));
    }

    async function moverCartoesDaLista(lista) {
      if (!lista) return;
      const opcoes = obterListasAtivas().filter((item) => item.id !== lista.id);
      if (!opcoes.length) {
        alert('Crie outra lista antes de mover os cartões.');
        return;
      }
      const texto = opcoes.map((item, index) => `${index + 1}. ${item.nome}`).join('\n');
      const resposta = prompt(`Mover todos os cartões de "${lista.nome}" para qual lista?\n${texto}`, '1');
      if (!resposta) return;
      const alvo = opcoes[(Number(resposta) || 1) - 1];
      if (!alvo) return alert('Lista de destino inválida.');
      const tarefasDaLista = tarefasRecebidas.filter((tarefa) => getTaskListId(tarefa) === lista.id);
      await Promise.all(tarefasDaLista.map((tarefa) => updateDoc(doc(db, 'tarefas', tarefa.id), { listaId: alvo.id, updated_at: serverTimestamp() })));
    }

    async function alternarSeguirLista(lista) {
      if (!lista) return;
      await atualizarListaPainel(lista.id, { seguindo: !lista.seguindo });
    }

    async function salvarAutomacoesLista() {
      if (!listaModalAtual) return;
      const regra = {
        gatilho: refs.autoRuleTrigger.value || '',
        acao: refs.autoRuleAction.value || '',
        listaDestinoId: refs.autoRuleTarget.value || ''
      };
      if (regra.acao === 'mover_lista' && !regra.listaDestinoId) {
        return alert('Selecione a lista de destino da regra.');
      }
      await atualizarListaPainel(listaModalAtual.id, {
        automacoes: {
          aoAdicionar: refs.autoOnAdd.value || '',
          diaria: refs.autoDailySort.value || '',
          semanal: refs.autoWeeklySort.value || '',
          regra
        }
      });
      fecharModalLista();
    }

    async function arquivarLista(lista) {
      if (!lista) return;
      const listaDestino = obterListasAtivas().find((item) => item.id !== lista.id);
      if (!listaDestino) {
        alert('Crie outra lista antes de arquivar esta.');
        return;
      }
      const ok = confirm(`Arquivar a lista "${lista.nome}"? Os cartões irão para "${listaDestino.nome}".`);
      if (!ok) return;
      const tarefasDaLista = tarefasRecebidas.filter((tarefa) => getTaskListId(tarefa) === lista.id);
      await Promise.all([
        ...tarefasDaLista.map((tarefa) => updateDoc(doc(db, 'tarefas', tarefa.id), { listaId: listaDestino.id, updated_at: serverTimestamp() })),
        atualizarListaPainel(lista.id, { arquivada: true })
      ]);
      fecharModalLista();
    }

    async function arquivarCartoesDaLista(lista) {
      if (!lista) return;
      const listaDestino = obterListasAtivas().find((item) => item.id !== lista.id);
      if (!listaDestino) {
        alert('Crie outra lista antes de mover os cartões.');
        return;
      }
      const ok = confirm(`Mover todos os cartões da lista "${lista.nome}" para "${listaDestino.nome}"?`);
      if (!ok) return;
      const tarefasDaLista = tarefasRecebidas.filter((tarefa) => getTaskListId(tarefa) === lista.id);
      await Promise.all(tarefasDaLista.map((tarefa) => updateDoc(doc(db, 'tarefas', tarefa.id), { listaId: listaDestino.id, updated_at: serverTimestamp() })));
      fecharModalLista();
    }

    async function carregarUsuarios() {
      const q = query(collection(db, 'access_requests'), where('status', '==', 'approved'));
      const snap = await getDocs(q);
      usuarios = [];
      snap.forEach((d) => {
        const item = d.data();
        if (item?.blocked) return;
        if (!item?.email) return;
        usuarios.push({ nome: item.nome || item.email, email: item.email.toLowerCase() });
      });
      usuarios.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
      refs.user.innerHTML = usuarios.map((u) => `<option value="${u.email}">${u.nome} (${u.email})</option>`).join('');
    }

    async function carregarCardsSetor(setor) {
      cardsSetor = [];
      try {
        if (setor === 'orcamento') {
          const snap = await getDocs(query(collection(db, 'orcamentos'), orderBy('numero_solicitacao', 'desc')));
          snap.forEach((d) => {
            const it = d.data() || {};
            if (it.arquivado) return;
            const numero = String(it.numero_solicitacao || '').padStart(4, '0');
            cardsSetor.push({
              id: d.id,
              setor,
              cliente: it.cliente || '',
              numeroDisplay: `${it.prefixo || 'OR'}-${numero}`
            });
          });
          return;
        }

        if (setor === 'impressao' || setor === 'serralheria') {
          const snap = await getDocs(query(collection(db, 'estoque'), where('setor', '==', setor)));
          snap.forEach((d) => {
            if (d.id === 'TINTAS_SISTEMA') return;
            const it = d.data() || {};
            cardsSetor.push({
              id: d.id,
              setor,
              nome: it.nome || '',
              categoria: it.categoria || ''
            });
          });
        }
      } catch (err) {
        console.error('Erro ao carregar cards do setor:', err);
      }
    }

    async function abrirModal(pre = {}) {
      tarefaEmEdicaoId = pre.id || null;
      const modalLabels = cardsTarefas.getTaskModalLabels(!!tarefaEmEdicaoId);
      refs.modalTitle.textContent = modalLabels.title;
      refs.saveTask.textContent = modalLabels.saveLabel;
      if (!obterListasAtivas().length) await garantirListaInicial();
      refs.setor.value = pre.setor || 'impressao';
      await preencherTipos(pre.cardId || '');
      if (pre.tipo) refs.tipo.value = pre.tipo;
      refs.resumo.value = pre.resumo || '';
      refs.desc.value = pre.desc || '';
      if (pre.destinatarioEmail) refs.user.value = pre.destinatarioEmail.toLowerCase();
      if (pre.cardId && refs.card.value !== pre.cardId) refs.card.value = '';
      preencherSelectListas(pre.listaId || '');
      renderOpcoes();
      cardsTarefas.preencherExtrasFormulario(pre.extras || {});
      refs.modal.style.display = 'flex';
    }

    function fecharModal() {
      refs.modal.style.display = 'none';
      tarefaEmEdicaoId = null;
      const modalLabels = cardsTarefas.getTaskModalLabels(false);
      refs.modalTitle.textContent = modalLabels.title;
      refs.saveTask.textContent = modalLabels.saveLabel;
    }

    async function salvarTarefa() {
      const toEmail = refs.user.value;
      const destino = usuarios.find((u) => u.email === toEmail);
      const cardAlvo = cardsSetor.find((c) => c.id === refs.card.value);
      const tarefaAtual = tarefaEmEdicaoId ? tarefasRecebidas.find((item) => item.id === tarefaEmEdicaoId) : null;
      if (!destino) return alert('Selecione um usuário válido.');
      if (!refs.resumo.value.trim()) return alert('Preencha o resumo da tarefa.');
      if (!refs.lista.value) return alert('Crie pelo menos uma lista antes de salvar a tarefa.');

      const payload = {
        setor: refs.setor.value,
        tipo: refs.tipo.value,
        resumo: refs.resumo.value.trim(),
        descricao: refs.desc.value.trim(),
        extras: cardsTarefas.coletarExtras(),
        listaId: refs.lista.value,
        status: tarefaAtual?.status || 'pendente',
        destinatarioEmail: destino.email,
        destinatarioNome: destino.nome,
        solicitanteEmail: tarefaAtual?.solicitanteEmail || me.email,
        solicitanteNome: tarefaAtual?.solicitanteNome || me.nome,
        cardAlvo: cardAlvo ? {
          id: cardAlvo.id,
          setor: cardAlvo.setor,
          label: labelCardDoSetor(cardAlvo),
          link: montarLinkCard(cardAlvo.setor, cardAlvo.id)
        } : null,
        updated_at: serverTimestamp(),
      };

      if (tarefaEmEdicaoId) {
        await updateDoc(doc(db, 'tarefas', tarefaEmEdicaoId), payload);
      } else {
        await addDoc(collection(db, 'tarefas'), {
          ...payload,
          created_at: serverTimestamp(),
          concluida_em: null,
          concluida_por: null
        });
      }
      fecharModal();
    }

    async function concluirTarefa(id) {
      const tarefa = tarefasRecebidas.find((item) => item.id === id);
      const lista = tarefa ? obterListaPorId(getTaskListId(tarefa)) : null;
      const regra = lista?.automacoes?.regra || {};
      const payload = {
        status: 'concluida',
        concluida_em: serverTimestamp(),
        concluida_por: me.email,
        updated_at: serverTimestamp()
      };
      if (regra.gatilho === 'ao_concluir' && regra.acao === 'mover_lista' && regra.listaDestinoId) {
        payload.listaId = regra.listaDestinoId;
      }
      await updateDoc(doc(db, 'tarefas', id), {
        ...payload
      });
    }

    async function excluirConcluidas() {
      const ok = confirm('Deseja excluir todas as tarefas concluídas deste painel?');
      if (!ok) return;
      const qDone = query(collection(db, 'tarefas'), where('destinatarioEmail', '==', me.email), where('status', '==', 'concluida'));
      const snap = await getDocs(qDone);
      if (snap.empty) return alert('Não há tarefas concluídas para excluir.');
      await Promise.all(snap.docs.map((d) => deleteDoc(doc(db, 'tarefas', d.id))));
      alert(`${snap.size} tarefa(s) concluída(s) excluída(s).`);
    }

    async function excluirTarefa(id) {
      const ok = confirm('Deseja excluir esta tarefa?');
      if (!ok) return;
      await deleteDoc(doc(db, 'tarefas', id));
    }

    async function moverTarefaParaLista(tarefaId, listaDestinoId) {
      const destinoId = String(listaDestinoId || '').trim() || obterListasAtivas()[0]?.id || '';
      const tarefa = tarefasRecebidas.find((item) => item.id === tarefaId);
      if (!tarefa || !destinoId) return;
      const origemId = getTaskListId(tarefa);
      if (origemId === destinoId) return;
      await updateDoc(doc(db, 'tarefas', tarefaId), {
        listaId: destinoId,
        updated_at: serverTimestamp()
      });
    }

    async function alternarSinalizacaoTarefa(tarefaId) {
      const tarefa = tarefasRecebidas.find((item) => item.id === tarefaId);
      if (!tarefa) return;
      const atual = String(tarefa.sinalizacao || '');
      const indiceAtual = Math.max(CICLO_SINALIZACAO.indexOf(atual), 0);
      const proximo = CICLO_SINALIZACAO[(indiceAtual + 1) % CICLO_SINALIZACAO.length];
      await updateDoc(doc(db, 'tarefas', tarefaId), {
        sinalizacao: proximo,
        updated_at: serverTimestamp()
      });
    }

    const cardsTarefas = createCardsTarefasModule({
      refs,
      escapeHtml,
      labelSetor,
      resolverLinkTarefa,
      getTaskById: (taskId) => tarefasRecebidas.find((item) => item.id === taskId) || null,
      onEditTask: (tarefa) => abrirModal({
        id: tarefa.id,
        setor: tarefa.setor,
        tipo: tarefa.tipo,
        destinatarioEmail: tarefa.destinatarioEmail,
        resumo: tarefa.resumo,
        desc: tarefa.descricao,
        cardId: tarefa?.cardAlvo?.id || '',
        listaId: getTaskListId(tarefa),
        extras: tarefa.extras || {}
      }),
      onToggleIndicator: alternarSinalizacaoTarefa,
      onConcluirTask: concluirTarefa,
      onDeleteTask: excluirTarefa
    });

    function renderTarefas(list) {
      const visiveis = list.filter((tarefa) => tarefa.status !== 'arquivada');
      refs.status.textContent = `Você possui ${visiveis.filter((t) => t.status === 'pendente').length} tarefa(s) pendente(s).`;
      const listas = obterListasAtivas();
      if (!listas.length) {
        refs.taskList.innerHTML = '<div class="empty">Nenhuma lista disponível. Use “Adicionar lista” para começar.</div>';
        return;
      }
      refs.taskList.innerHTML = [
        ...listas.map((lista) => {
          const tarefasDaLista = ordenarTarefasDaLista(lista, visiveis.filter((tarefa) => getTaskListId(tarefa) === lista.id));
          return `
            <section class="list-column ${lista.seguindo ? 'following' : ''}" data-lista="${lista.id}">
              <div class="list-header">
                <div>
                  <div class="list-title">${escapeHtml(lista.nome)}</div>
                  <div class="list-sub">${tarefasDaLista.length} cartão(ões) ${lista.seguindo ? '• seguindo' : ''}</div>
                </div>
                <button class="list-menu-btn" data-list-actions="${lista.id}">⋯</button>
              </div>
              <div class="list-body" data-list-dropzone="${lista.id}">
                ${tarefasDaLista.length ? tarefasDaLista.map(cardsTarefas.renderCardTarefa).join('') : '<div class="list-empty">Nenhum cartão nesta lista.</div>'}
              </div>
              <button class="btn list-add-card" data-add-card-list="${lista.id}">➕ Adicionar cartão</button>
            </section>
          `;
        }),
        `<div class="add-list-card"><button id="btn-add-list-inline">＋ Adicionar outra lista</button></div>`
      ].join('');

      refs.taskList.querySelectorAll('[data-list-actions]').forEach((btn) => {
        btn.addEventListener('click', () => abrirModalLista(btn.dataset.listActions));
      });
      refs.taskList.querySelectorAll('[data-add-card-list]').forEach((btn) => {
        btn.addEventListener('click', () => abrirModal({ listaId: btn.dataset.addCardList }));
      });
      cardsTarefas.bindCardInteractions(refs.taskList);
      refs.taskList.querySelectorAll('[data-task-id]').forEach((card) => {
        card.addEventListener('dragstart', (event) => {
          if (event.target?.closest?.('[data-edit-task], [data-toggle-indicator]')) {
            event.preventDefault();
            return;
          }
          tarefaArrastandoId = card.dataset.taskId || '';
          card.classList.add('dragging');
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', tarefaArrastandoId);
          }
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          tarefaArrastandoId = '';
          refs.taskList.querySelectorAll('[data-list-dropzone]').forEach((zone) => zone.classList.remove('drop-target'));
        });
      });
      refs.taskList.querySelectorAll('[data-list-dropzone]').forEach((zone) => {
        zone.addEventListener('dragover', (event) => {
          if (!tarefaArrastandoId) return;
          event.preventDefault();
          if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
          zone.classList.add('drop-target');
        });
        zone.addEventListener('dragleave', (event) => {
          if (!zone.contains(event.relatedTarget)) zone.classList.remove('drop-target');
        });
        zone.addEventListener('drop', async (event) => {
          event.preventDefault();
          zone.classList.remove('drop-target');
          const tarefaId = event.dataTransfer?.getData('text/plain') || tarefaArrastandoId;
          const listaDestinoId = zone.dataset.listDropzone || obterListasAtivas()[0]?.id || '';
          if (!tarefaId) return;
          try {
            await moverTarefaParaLista(tarefaId, listaDestinoId);
          } catch (err) {
            console.error('Erro ao mover tarefa entre listas:', err);
            alert('Não foi possível mover o cartão para esta lista.');
          }
        });
      });
      document.getElementById('btn-add-list-inline')?.addEventListener('click', criarLista);
    }

    function renderSolicitacoes(list) {
      if (!list.length) {
        refs.reqList.innerHTML = '<div class="empty">Você ainda não solicitou tarefas.</div>';
        return;
      }
      refs.reqList.innerHTML = list.map((t) => `
        <div class="req-item">
          <div><b>${escapeHtml(t.resumo || t.tipo || 'Sem resumo')}</b></div>
          <div style="font-size:12px;color:#cbd5e1;">Para: ${escapeHtml(t.destinatarioNome || t.destinatarioEmail || '-')}</div>
          <div class="st ${t.status === 'concluida' ? 'c' : 'p'}">${t.status === 'concluida' ? 'Concluída' : 'Pendente'}</div>
          ${resolverLinkTarefa(t) ? `<a class="btn" style="margin-top:6px;display:inline-block;" href="${resolverLinkTarefa(t)}" target="_blank" rel="noopener">📍 Ir ao card</a>` : ''}
          <button class="btn" style="margin-top:6px;" data-del-req="${t.id}">✖</button>
        </div>
      `).join('');
      refs.reqList.querySelectorAll('[data-del-req]').forEach((btn) => {
        btn.addEventListener('click', () => excluirTarefa(btn.dataset.delReq));
      });
    }

    function ordenarPorDataDesc(lista = []) {
      return [...lista].sort((a, b) => {
        const aMs = a?.created_at?.toMillis?.() || 0;
        const bMs = b?.created_at?.toMillis?.() || 0;
        return bMs - aMs;
      });
    }

    function monitorar() {
      const colTarefas = collection(db, 'tarefas');
      const qListas = query(collection(db, 'painel_tarefas_listas'), where('ownerEmail', '==', me.email));

      onSnapshot(qListas, (snap) => {
        listasPainel = snap.docs.map((d) => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (Number(a.ordem) || 0) - (Number(b.ordem) || 0));
        if (!listasPainel.length) {
          garantirListaInicial();
        }
        preencherSelectListas();
        if (listaModalAtual) {
          listaModalAtual = listasPainel.find((item) => item.id === listaModalAtual.id) || null;
          if (listaModalAtual) preencherAutomacoesListaModal(listaModalAtual);
          else fecharModalLista();
        }
        renderTarefas(tarefasRecebidas);
      }, (err) => {
        console.error('Erro ao monitorar listas do painel:', err);
      });

      const assinarMinhas = (usarOrderBy = true) => {
        const qMinhas = usarOrderBy
          ? query(colTarefas, where('destinatarioEmail', '==', me.email), orderBy('created_at', 'desc'))
          : query(colTarefas, where('destinatarioEmail', '==', me.email));

        onSnapshot(qMinhas, (snap) => {
          const lista = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          const ordenada = usarOrderBy ? lista : ordenarPorDataDesc(lista);
          tarefasRecebidas = ordenada;
          const novoPend = ordenada.filter((t) => t.status === 'pendente').length;
          if (pendingCount && novoPend > pendingCount && Notification.permission === 'granted') {
            new Notification('Nova tarefa recebida', { body: `Você recebeu ${novoPend - pendingCount} nova(s) tarefa(s).` });
          }
          pendingCount = novoPend;
          renderTarefas(ordenada);
        }, (err) => {
          console.error('Erro ao monitorar tarefas recebidas:', err);
          if (usarOrderBy) {
            assinarMinhas(false);
            return;
          }
          refs.status.textContent = 'Não foi possível carregar suas tarefas.';
        });
      };

      const assinarSolicitadas = (usarOrderBy = true) => {
        const qFeitas = usarOrderBy
          ? query(colTarefas, where('solicitanteEmail', '==', me.email), orderBy('created_at', 'desc'))
          : query(colTarefas, where('solicitanteEmail', '==', me.email));

        onSnapshot(qFeitas, (snap) => {
          const lista = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          const ordenada = usarOrderBy ? lista : ordenarPorDataDesc(lista);
          renderSolicitacoes(ordenada);
        }, (err) => {
          console.error('Erro ao monitorar tarefas solicitadas:', err);
          if (usarOrderBy) assinarSolicitadas(false);
        });
      };

      assinarMinhas(true);
      assinarSolicitadas(true);
    }

    document.getElementById('btn-delete-done').addEventListener('click', excluirConcluidas);
    document.getElementById('btn-cancel').addEventListener('click', fecharModal);
    document.getElementById('btn-save').addEventListener('click', salvarTarefa);
    document.getElementById('btn-new-task').addEventListener('click', () => abrirModal());
    document.getElementById('btn-add-list').addEventListener('click', criarLista);
    refs.setor.addEventListener('change', async () => preencherTipos());
    refs.tipo.addEventListener('change', renderOpcoes);
    document.getElementById('btn-close-list-modal').addEventListener('click', fecharModalLista);
    document.getElementById('list-modal-title').addEventListener('click', () => renomearLista(listaModalAtual));
    document.getElementById('act-add-card').addEventListener('click', () => {
      const listaId = listaModalAtual?.id || obterListasAtivas()[0]?.id || '';
      fecharModalLista();
      abrirModal({ listaId });
    });
    document.getElementById('act-rename-list').addEventListener('click', () => renomearLista(listaModalAtual));
    document.getElementById('act-copy-list').addEventListener('click', () => copiarLista(listaModalAtual));
    document.getElementById('act-move-list').addEventListener('click', () => moverLista(listaModalAtual));
    document.getElementById('act-move-cards').addEventListener('click', () => moverCartoesDaLista(listaModalAtual));
    document.getElementById('act-follow-list').addEventListener('click', () => alternarSeguirLista(listaModalAtual));
    document.getElementById('btn-save-list-automation').addEventListener('click', salvarAutomacoesLista);
    document.getElementById('act-archive-list').addEventListener('click', () => arquivarLista(listaModalAtual));
    document.getElementById('act-archive-cards').addEventListener('click', () => arquivarCartoesDaLista(listaModalAtual));

    const sidebar = document.getElementById('sidebar');
    const toggleSide = () => sidebar.classList.toggle('open');
    const closeSide = () => sidebar.classList.remove('open');
    document.getElementById('btn-side').addEventListener('click', toggleSide);
    document.getElementById('btn-close-side').addEventListener('click', closeSide);
    document.getElementById('btn-close-side-quick').addEventListener('click', closeSide);

    document.getElementById('btn-notify').addEventListener('click', async () => {
      if (!('Notification' in window)) return alert('Seu navegador não suporta notificações.');
      const p = await Notification.requestPermission();
      alert(p === 'granted' ? 'Notificações ativadas.' : 'Notificações não permitidas.');
    });

    await carregarUsuarios();
    await preencherTipos();
    monitorar();

    const params = new URLSearchParams(window.location.search);
    if (params.get('action') === 'nova') {
      await abrirModal({
        setor: params.get('setor') || 'impressao',
        cardId: params.get('cardId') || '',
        resumo: params.get('resumo') || '',
        desc: params.get('desc') || ''
      });
    }
  </script>
</body>
</html>
