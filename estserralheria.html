<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Serralheria - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           [ CORE ] - VARIÁVEIS E ESTILOS GERAIS
           ========================================================================== */
        :root {
            --orange: #ff6b00;
            --dark-bg: #0a0a0a;
            --card-bg: #121212;
            --input-bg: #1a1a1a;
            --text-gray: #a0a0a0;
            --white: #ffffff;
            --red-cancel: #ff3b3b;
            --green-new: #22c55e;
            --blue-used: #3b82f6;
        }
        @keyframes piscarAlerta { 0% { color: #ff0000; } 50% { color: #ffffff; } 100% { color: #ff0000; } }
        .texto-pisca { animation: piscarAlerta 0.8s infinite; font-weight: 900; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--white); overflow-x: hidden; padding-bottom: 50px; }
        
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark-bg); color: var(--white); margin: 0; padding: 0; overflow-x: hidden; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; appearance: textfield; }

        .btn-voltar-home { position: absolute; top: 20px; left: 20px; background: #1a1a1a; color: var(--text-gray); border: 1px solid #333; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; transition: all 0.2s; z-index: 2000; display: flex; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-voltar-home:hover { background: #333; color: white; transform: translateY(-2px); border-color: #555; }

        /* Layout Kanban Geral */
        #main-layout { padding: 20px; padding-top: 70px; display: block; }
        .header-est { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 15px; }
        h1 { margin: 0; color: var(--orange); font-size: 24px; text-transform: uppercase; font-weight: 900; }
        
        .kanban-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; align-items: flex-start; }
        .kanban-col { background: #161616; border-radius: 10px; padding: 15px; min-width: 320px; width: 320px; border: 1px solid #222; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .kanban-header { padding: 12px; font-weight: 900; font-size: 13px; border-radius: 6px; margin-bottom: 15px; color: #000; background: var(--orange); text-transform: uppercase; text-align: center; }
        .grid-est { display: flex; flex-direction: column; gap: 12px; min-height: 50px; }
        
        /* Cards Chapa */
        .card-prod { background: var(--card-bg); border-radius: 10px; padding: 15px; position: relative; border-left: 5px solid var(--orange); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-del-card { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #555; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-del-card:hover { color: var(--red-cancel); }
        .prod-cat { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; color: #ccc; margin-bottom: 8px; display: inline-block; }
        .prod-name { font-size: 18px; font-weight: 800; color: white; margin-bottom: 5px; line-height: 1.1; }
        .prod-dims { font-size: 14px; color: var(--orange); font-weight: bold; margin-bottom: 5px; display: block; }
        .prod-details { font-size: 11px; color: var(--text-gray); display: block; margin-bottom: 10px;}
        .badge-status { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .btn-adj { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.2s;}
        .btn-adj:hover { background: var(--blue-used); }
        
        .fab-add { position: fixed; bottom: 20px; right: 20px; width: 65px; height: 65px; background: var(--orange); color: white; border-radius: 50%; border: none; font-size: 35px; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 107, 0, 0.5); cursor: pointer; z-index: 100; transition: transform 0.2s; display: flex; align-items: center; justify-content: center;}
        .fab-add:hover { transform: scale(1.1); }

        /* Estilos dos Modais */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: var(--card-bg); width: 95%; max-width: 500px; max-height: 90vh; padding: 25px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.6); overflow-y: auto; position: relative; }
        .btn-voltar-top { position: absolute; top: 20px; right: 20px; background: #333; /* Cinza escuro padrão que você já usa */
    color: var(--white);
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Montserrat', sans-serif;
    text-transform: uppercase;
}
        .btn-voltar-top:hover {
    background: var(--red-cancel); /* O vermelho de alerta que você definiu no :root */
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255, 59, 59, 0.3);
}
        .header-row { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding-right: 90px; }
        .title-material { font-size: 30px; font-weight: 900; margin: 0; color: #fff; line-height: 1; }
        .btn-status-toggle { padding: 6px 12px; border-radius: 6px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; }
        .status-novo { background-color: var(--green-new); color: white; }
        .status-usado { background-color: var(--blue-used); color: white; }

        .label-standard { display: block; font-size: 13px; color: var(--orange); font-weight: bold; }
        .sub-label-right { display: block; font-size: 12px; color: var(--text-gray); margin-bottom: 4px; text-align: right; width: 100%; }
        .btn-icon-action { background: #222; color: var(--orange); border: 1px solid #444; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-weight: bold;}
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #333; border-radius: 8px; color: white; outline: none; font-size: 14px; font-family: inherit; box-sizing: border-box;}
        textarea { resize: vertical; min-height: 100px; }
        .input-suffix-wrapper { position: relative; display: flex; align-items: center; }
        .input-suffix-wrapper::after { content: "cm"; position: absolute; right: 12px; color: var(--text-gray); font-size: 12px; pointer-events: none; }
        .form-row { display: flex; gap: 12px; margin-bottom: 15px; width: 100%;}
        .align-bottom { align-items: flex-end; }
        .field-group { flex: 1; min-width: 0; }
        .btn-salvar { width: 100%; background: var(--orange); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: 900; margin-top: 20px; cursor: pointer; font-size: 16px; text-transform: uppercase; font-family: inherit;}
        .icon-refresh { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        /* ==========================================================================
           [ VISUAL DE CORTES ] - RÉGUAS E CANVAS
           ========================================================================== */
        #div-visual-corte { margin-top: 15px; padding: 20px; background: #000; border-radius: 8px; border: 1px solid #333; display: none; flex-direction: column; align-items: center; }
        .canvas-title { font-size: 10px; color: var(--orange); text-transform: uppercase; font-weight: bold; margin-bottom: 40px; letter-spacing: 1px; text-align: center; width: 100%; }
        .chapa-container { width: 100%; height: 180px; background: #080808; position: relative; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        #corte-wrapper { position: relative; display: flex; align-items: center; justify-content: center; }
        #corte-fill { background: var(--orange); border: 1px solid var(--white); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; font-weight: bold; text-align: center; padding: 5px; }
        
        .cota-label { position: absolute; color: var(--orange); font-size: 11px; font-weight: bold; white-space: nowrap; }
        .cota-w-box { position: absolute; top: -35px; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .linha-cota-w { height: 1px; background-color: var(--orange); width: 100%; margin-top: 2px; position: relative; }
        .linha-cota-w::before, .linha-cota-w::after { content: ''; position: absolute; top: -4px; width: 1px; height: 9px; background-color: var(--orange); }
        .linha-cota-w::before { left: 0; } .linha-cota-w::after { right: 0; }
        
        .cota-h-box { position: absolute; left: -55px; top: 0; height: 100%; display: flex; flex-direction: row; align-items: center; }
        .linha-cota-h { width: 1px; background-color: var(--orange); height: 100%; margin-right: 5px; position: relative; }
        .linha-cota-h::before, .linha-cota-h::after { content: ''; position: absolute; left: -4px; width: 9px; height: 1px; background-color: var(--orange); }
        .linha-cota-h::before { top: 0; } .linha-cota-h::after { bottom: 0; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-voltar-home">⬅ VOLTAR AO PAINEL PRINCIPAL</a>

    <div id="main-layout">
        <div class="header-est">
            <div><h1 id="page-title">🛠️ Estoque Serralheria</h1></div>
        </div>

                "background:#444; color:white;">Outros Materiais / MDF</div>

        <button class="fab-add" onclick="abrirModalProd()">+</button>

    <div id="modal-prod" class="modal-overlay">

            <div class="header-row">

            </div>
            
            <div class="form-row align-bottom">

                    <div id="cat-container">

                    </div>
                </div>
                <div id="div-acabamento" style="flex: 1.5;">

                    </div>

                        <option value="brilho">Brilho</option>
                        <option value="fosco">Fosco</option>
                    </select>
                </div>
            </div>

            <div class="form-row" id="div-esp-cor">
                <div class="field-group">
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px; height: 32px;">
                        <label id="label-espessura" class="label-standard" style="margin:0;">Espessura</label>
                        <button class="btn-icon-action" id="btn-toggle-esp" onclick="ativarNovaEspessura()">+</button>
                    </div>
                    <div id="esp-container"><select id="prod-espessura"><option value="">Selecione</option></select></div>
                </div>
                <div class="field-group">
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px; height: 32px;">
                        <label id="label-cor" class="label-standard" style="margin:0;">Cor</label>
                        <button class="btn-icon-action" id="btn-toggle-cor" onclick="ativarNovaCor()">+</button>
                    </div>
                    <div id="cor-container">
                        <select id="prod-cor"></select>
                    </div>
                </div>
            </div>

            <div id="div-dims" style="display:none; background:#1a1a1a; padding:15px; border-radius:8px; margin-top:5px; border: 1px solid #333;">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <label class="label-standard" style="margin-top:0;">Dimensões da Chapa (cm)</label>
                    <button id="btn-refresh-dims" class="btn-icon-action" onclick="alternarMedidaPadrao()" title="Navegar Medidas Padrões">
                        <svg class="icon-refresh" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" stroke-linecap="round" stroke-linejoin="round"></path></svg>

                    </div>
                    <div class="field-group">

                    </div>
                </div>

                <div id="div-visual-corte">

                            <div class="cota-h-box"><div class="linha-cota-h"></div><span class="cota-label" id="txt-cota-menor" style="writing-mode: vertical-lr; transform: rotate(180deg);">0cm</span></div>

            <button class="btn-salvar" id="btn-salvar-final" onclick="salvarProduto()">SALVAR NO ESTOQUE</button>

                    <input type="number" id="corte-h" placeholder="Altura (A)" oninput="atualizarPreviewCorte()">

                <div id="div-visual-modal-corte" style="margin-top: 15px; padding: 15px; background: #000; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; align-items: center;">
                    <div class="canvas-title" style="margin-bottom: 20px;">PREVISÃO DO CORTE</div>
                    <div class="chapa-container" style="height: 180px;">
    <div id="corte-wrapper-modal" style="position: relative; display: flex; align-items: center; justify-content: center;">

            </div>
        </div>
    </div>
</div>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">

    <script type="module">
        import { db, ROTAS } from "./config.js";
        import { collection, addDoc, doc, updateDoc, deleteDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Variáveis de Estado
        window.setorAtual = 'serralheria'; // Fixo para este arquivo
        window.materialStatus = "Novo";
        window.isNewCategory = false;
        window.indiceMedidaPadrao = 0;
        let produtos = [];
        let categoriasDinamicas = [];
        let coresDinamicas = [];

// 🔵 ================= SIMULADOR DE CORTE =================

let pecasSimuladas = [];
let escalaSimulador = 1; // 1cm = 3px

window.abrirSimuladorCorte = () => {

    if (!pecaParaCorte) return;

    const cw = parseFloat(document.getElementById('corte-w').value) || 0;
    const ch = parseFloat(document.getElementById('corte-h').value) || 0;

    if (cw <= 0 || ch <= 0) {
        alert("Informe medidas válidas antes de aplicar o corte.");
        return;
    }

    document.getElementById('modal-simulador').style.display = 'flex';

    renderizarSimuladorBase();

    adicionarPecaSimulada(cw, ch);
};

function renderizarSimuladorBase() {
    const area = document.getElementById('area-grid');
    const containerSimulador = area.parentElement; // Pega o div que segura o grid
    area.innerHTML = '';
    area.style.position = "relative";
    area.style.margin = "auto"; // Centraliza a chapa

    let w = pecaParaCorte.dimW;
    let h = pecaParaCorte.dimH;

    // Regra da Artesynal: maior sempre horizontal
    if (h > w) [w, h] = [h, w];

    // --- LÓGICA DE ESCALA DINÂMICA ---
    // Definimos o tamanho máximo que o simulador pode ter na tela (ex: 80% da largura do modal)
    const larguraMaximaDisponivel = containerSimulador.clientWidth - 40; 
    const alturaMaximaDisponivel = 500; // Altura fixa para não esticar demais

    // Calcula qual escala faz a chapa caber perfeitamente
    const escalaW = larguraMaximaDisponivel / w;
    const escalaH = alturaMaximaDisponivel / h;
    
    // Usa a menor escala para garantir que caiba tanto na largura quanto na altura
    window.escalaSimulador = Math.min(escalaW, escalaH);

    const larguraPx = w * window.escalaSimulador;
    const alturaPx = h * window.escalaSimulador;

    area.style.width = larguraPx + "px";
    area.style.height = alturaPx + "px";

    // Ajuste do Grid Milimetrado para a nova escala
    area.style.backgroundImage = `
        linear-gradient(to right, rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(to right, rgba(255,255,255,0.3) 2px, transparent 2px),
        linear-gradient(to bottom, rgba(255,255,255,0.3) 2px, transparent 2px)
    `;

    area.style.backgroundSize = `
        ${5 * window.escalaSimulador}px ${5 * window.escalaSimulador}px,
        ${5 * window.escalaSimulador}px ${5 * window.escalaSimulador}px,
        ${10 * window.escalaSimulador}px ${10 * window.escalaSimulador}px,
        ${10 * window.escalaSimulador}px ${10 * window.escalaSimulador}px
    `;
}

function adicionarPecaSimulada(w, h) {
    const area = document.getElementById('area-grid');
    const peca = document.createElement('div');
    
    // Usa a escala dinâmica window.escalaSimulador calculada na base
    const pW = w * window.escalaSimulador;
    const pH = h * window.escalaSimulador;

    peca.className = "peca-simulada";
    peca.style.position = "absolute";
    peca.style.width = pW + "px";
    peca.style.height = pH + "px";
    peca.style.background = "rgba(255,59,59,0.8)";
    peca.style.border = "1px solid #fff";
    peca.style.cursor = "move";
    peca.style.display = "flex";
    peca.style.alignItems = "center";
    peca.style.justifyContent = "center";
    peca.style.color = "#fff";
    peca.style.fontSize = (pW < 40) ? "9px" : "11px"; // Ajusta fonte se a peça for pequena
    peca.style.fontWeight = "bold";
    peca.innerText = `${w}x${h}`;

    peca.style.left = "5px";
    peca.style.top = "5px";

    tornarArrastavel(peca);
    area.appendChild(peca);
    adicionarNaLista(w, h, peca);
}

function adicionarNaLista(w, h, elementoVisual) {

    const lista = document.getElementById('lista-cortes');

    const item = document.createElement('div');
    item.style.background = "#1a1a1a";
    item.style.padding = "6px";
    item.style.borderRadius = "6px";
    item.style.display = "flex";
    item.style.justifyContent = "space-between";
    item.style.alignItems = "center";

    item.innerHTML = `
        <span>${w}x${h}</span>
        <button style="background:red;color:white;border:none;border-radius:4px;cursor:pointer;">X</button>
    `;

    item.querySelector("button").onclick = () => {
        elementoVisual.remove();
        item.remove();
    };

    lista.appendChild(item);
}

function tornarArrastavel(elemento) {
    let offsetX, offsetY;

    elemento.onmousedown = function(e) {
        const area = document.getElementById('area-grid');
        
        // Limites da chapa original em pixels
        const limiteMaxX = area.clientWidth - elemento.offsetWidth;
        const limiteMaxY = area.clientHeight - elemento.offsetHeight;

        offsetX = e.clientX - elemento.offsetLeft;
        offsetY = e.clientY - elemento.offsetTop;

        document.onmousemove = function(e) {
            let novoX = e.clientX - offsetX;
            let novoY = e.clientY - offsetY;

            // 🛡️ TRAVA: Impede de sair da chapa (0 até limite máximo)
            if (novoX < 0) novoX = 0;
            if (novoY < 0) novoY = 0;
            if (novoX > limiteMaxX) novoX = limiteMaxX;
            if (novoY > limiteMaxY) novoY = limiteMaxY;

            elemento.style.left = novoX + "px";
            elemento.style.top = novoY + "px";
            
            // Atualiza a cor para dar feedback visual de movimento
            elemento.style.background = "rgba(59, 130, 246, 0.9)"; // Azul ao mover
        };

        document.onmouseup = function() {
            document.onmousemove = null;
            document.onmouseup = null;
            elemento.style.background = "rgba(255,59,59,0.8)"; // Volta ao vermelho/laranja
        };
    };
}
        window.abrirModalCorte = (id) => {
            pecaParaCorte = produtos.find(x => x.id === id);
            document.getElementById('corte-nome-peca').innerText = `${pecaParaCorte.categoria} ${pecaParaCorte.espessura || ''} | ${pecaParaCorte.cor || ''}`;
            document.getElementById('corte-dimensoes-atuais').innerText = `${pecaParaCorte.dimW} x ${pecaParaCorte.dimH} cm`;
            document.getElementById('corte-w').value = '';
            document.getElementById('corte-h').value = '';
            document.getElementById('modal-corte').style.display = 'flex';
            window.atualizarPreviewCorte();
        };
        
        // 👀 ✂️ Início Preview Corte 🔽//


        window.atualizarPreviewCorte = () => {

    if (!pecaParaCorte) return;

    let wOriginal = pecaParaCorte.dimW;
    let hOriginal = pecaParaCorte.dimH;

    // 🔥 AJUSTE DEFINITIVO:
    // sempre tratar maior como largura
    if (hOriginal > wOriginal) {
        [wOriginal, hOriginal] = [hOriginal, wOriginal];
    }

    const wCorte = parseFloat(document.getElementById('corte-w').value) || 0;
    const hCorte = parseFloat(document.getElementById('corte-h').value) || 0;

    // 🚨 validação correta agora
    if (wCorte > wOriginal || hCorte > hOriginal) {
        alert(`A medida digitada (${wCorte} x ${hCorte}) 
é maior que a chapa original (${wOriginal} x ${hOriginal})`);
        document.getElementById('corte-w').value = '';
        document.getElementById('corte-h').value = '';
        return;
    }

    const bgOriginal = document.getElementById('corte-original-bg');
    const boxCorte = document.getElementById('corte-pedaco-box');

    const ratio = hOriginal / wOriginal;
    const basePx = 150;

    const finalW = basePx;
    const finalH = basePx * ratio;

    bgOriginal.style.width = finalW + 'px';
    bgOriginal.style.height = finalH + 'px';

    document.getElementById('txt-cota-w-original').innerText = wOriginal + 'cm';
    document.getElementById('txt-cota-h-original').innerText = hOriginal + 'cm';

    if (wCorte > 0 && hCorte > 0) {

        const percentW = wCorte / wOriginal;
        const percentH = hCorte / hOriginal;

        boxCorte.style.display = 'flex';
        boxCorte.style.width = (finalW * percentW) + 'px';
        boxCorte.style.height = (finalH * percentH) + 'px';
        boxCorte.innerText = `${wCorte}x${hCorte}`;

        bgOriginal.style.background = '#333';

    } else {
        boxCorte.style.display = 'none';
        bgOriginal.style.background = 'var(--orange)';
    }
};

        // 👀 ✂️ Final Preview Corte 🔼//

        // 📏 ✂️ Início Executar Corte 🔽//

        window.executarCorte = async () => {

    if (!pecaParaCorte) return;

    const btn = document.getElementById('btn-executar-corte');

    let wOriginal = pecaParaCorte.dimW;
    let hOriginal = pecaParaCorte.dimH;

    // 🔥 MESMA REGRA AQUI
    if (hOriginal > wOriginal) {
        [wOriginal, hOriginal] = [hOriginal, wOriginal];
    }

    const cw = parseFloat(document.getElementById('corte-w').value) || 0;
    const ch = parseFloat(document.getElementById('corte-h').value) || 0;

    if (cw <= 0 || ch <= 0)
        return alert("Informe as medidas válidas para o corte!");

    if (cw > wOriginal || ch > hOriginal)
        return alert(`O corte (${cw} x ${ch} cm) não pode ser maior que a peça original (${wOriginal} x ${hOriginal} cm)!`);

    btn.disabled = true;
    btn.innerText = "CORTANDO...";

    try {

        const sobraW = wOriginal - cw;
        const sobraH = hOriginal - ch;

        const nomeBase = pecaParaCorte.nome || pecaParaCorte.categoria;

        await updateDoc(doc(db, "estoque", pecaParaCorte.id), {
            dimW: sobraW > 0 ? sobraW : wOriginal,
            dimH: sobraH > 0 ? sobraH : hOriginal,
            status: "Usado",
            nome: nomeBase.includes("(Sobra)") ? nomeBase : nomeBase + " (Sobra)"
        });

        const novaPeca = { ...pecaParaCorte };
        delete novaPeca.id;

        novaPeca.dimW = cw;
        novaPeca.dimH = ch;
        novaPeca.status = "Usado";
        novaPeca.data_criacao = serverTimestamp();
        novaPeca.nome = nomeBase.replace(" (Sobra)", "") + " (Corte)";

        await addDoc(collection(db, "estoque"), novaPeca);

        alert("Corte realizado! O estoque foi atualizado.");
        window.fecharModal('modal-corte');

    } catch (e) {
        console.error(e);
        alert("Erro ao executar o corte.");
    } finally {
        btn.disabled = false;
        btn.innerText = "✂️ CONFIRMAR CORTE";
    }
};
