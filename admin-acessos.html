<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Aprovação de Acessos</title>
  <style>
    body{font-family:Arial,sans-serif;background:#1f2937;color:#fff;margin:0;padding:20px}
    table{width:100%;border-collapse:collapse;background:#334155}
    th,td{padding:10px;border-bottom:1px solid #475569;text-align:left}
    button,select{padding:6px 9px;border:none;border-radius:6px}
    .ok{background:#16a34a;color:#fff}.no{background:#dc2626;color:#fff}.blk{background:#f59e0b;color:#111}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    a{color:#93c5fd}
  </style>
</head>
<body>
  <div class="top">
    <h1>Painel de verificação de acessos</h1>
    <a href="index.html">Voltar ao painel</a>
  </div>
  <div id="lista"></div>

  <script type="module">
    import { db } from './config.js';
    import { protegerPagina } from './auth.js';
    import { collection, getDocs, doc, updateDoc, orderBy, query, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    await protegerPagina({ paginaAtual: 'admin-acessos.html', exigirAdmin: true });

    async function carregar() {
      const snap = await getDocs(query(collection(db, 'access_requests'), orderBy('created_at', 'desc')));
      const rows = [];
      snap.forEach((d) => rows.push({ id: d.id, ...d.data() }));

      const html = [`<table><thead><tr><th>Nome</th><th>E-mail</th><th>Categoria</th><th>Status</th><th>Ações</th></tr></thead><tbody>`];
      for (const r of rows) {
        html.push(`<tr>
          <td>${r.nome || ''}</td>
          <td>${r.email || ''}</td>
          <td>
            <select onchange="window.mudarCategoria('${r.id}', this.value)">
              <option value="producao" ${r.categoria === 'producao' ? 'selected' : ''}>Produção</option>
              <option value="instalacao" ${r.categoria === 'instalacao' ? 'selected' : ''}>Instalação</option>
              <option value="administracao" ${r.categoria === 'administracao' ? 'selected' : ''}>Administração</option>
            </select>
          </td>
          <td>${r.blocked ? 'bloqueado' : (r.status || 'pending')}</td>
          <td>
            <button class="ok" onclick="window.atualizar('${r.id}','approved',false)">Autorizar</button>
            <button class="no" onclick="window.atualizar('${r.id}','rejected',false)">Negar</button>
            <button class="blk" onclick="window.atualizar('${r.id}','approved',true)">Bloquear</button>
          </td>
        </tr>`);
      }
      html.push('</tbody></table>');
      document.getElementById('lista').innerHTML = html.join('');
    }

    window.atualizar = async (id, status, blocked) => {
      await updateDoc(doc(db, 'access_requests', id), { status, blocked, updated_at: serverTimestamp() });
      carregar();
    };

    window.mudarCategoria = async (id, categoria) => {
      await updateDoc(doc(db, 'access_requests', id), { categoria, updated_at: serverTimestamp() });
    };

    carregar();
  </script>
</body>
</html>
