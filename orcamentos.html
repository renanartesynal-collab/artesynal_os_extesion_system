<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamentos - Artesynal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           VARIÁVEIS E BASE
        ========================================= */
        :root { 
            --bg-dark: #333; --panel-bg: #222; --card-bg: #2c3e50; 
            --yellow: #f1c40f; --blue: #00aeef; --green: #00a651; --red: #ed1c24; 
        }
        body { 
            font-family: 'Mitra LT', 'Montserrat', sans-serif; margin: 0; padding: 20px; 
            background-color: var(--bg-dark); color: white; height: 100vh; 
            display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden;
        }

        /* =========================================
           HEADER GERAL
        ========================================= */
        .header-orc { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-bottom: 2px solid #555; padding-bottom: 15px; flex-shrink: 0;
        }
        h1 { margin: 0; color: var(--yellow); font-size: 24px; text-transform: uppercase; }
        .header-actions { display: flex; gap: 10px; align-items: center;}
        
        .btn-acao-topo { 
            text-decoration: none; color: white; border: none; cursor: pointer;
            padding: 8px 15px; border-radius: 5px; font-size: 12px; font-weight: bold; font-family: 'Montserrat', sans-serif;
        }
        .btn-voltar { background: #555; }
        .btn-abrir-arq { background: var(--blue); }

        /* =========================================
           SIDEBAR DE ARQUIVADOS
        ========================================= */
        #sidebar-arquivados {
            position: fixed; top: 0; right: -350px; width: 300px; height: 100vh; 
            background: #1a1a1a; box-shadow: -5px 0 20px rgba(0,0,0,0.8); z-index: 2000;
            transition: right 0.3s ease; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        #sidebar-arquivados.open { right: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px;}
        .sidebar-header h2 { margin: 0; font-size: 16px; color: var(--yellow); text-transform: uppercase;}
        .btn-fechar-arq { background: none; border: none; color: white; font-size: 20px; cursor: pointer;}
        
        .lista-arquivados { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px;}
        .lista-arquivados::-webkit-scrollbar { width: 4px; }
        .lista-arquivados::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
        
        .item-arquivado {
            display: flex; justify-content: space-between; align-items: center; 
            background: #2c2c2c; padding: 12px; border-radius: 6px; border-left: 3px solid #555;
        }
        .item-arq-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
        .item-arq-empresa { font-weight: 800; font-size: 16px; color: #f2f2f2; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-arq-num { font-weight: 700; font-size: 11px; color: #9ca3af; letter-spacing: 0.4px; }
        .item-arq-tools button { 
            border: none; border-radius: 3px; cursor: pointer; padding: 5px; 
            font-size: 12px; margin-left: 5px; background: rgba(255,255,255,0.1); transition: 0.2s;
        }
        .item-arq-tools button:hover { background: rgba(255,255,255,0.3); }

        /* =========================================
           QUADRO KANBAN
        ========================================= */
        .kanban-board { 
            display: flex; gap: 20px; flex-grow: 1; overflow-x: auto; padding-bottom: 20px; align-items: flex-start;
        }
        .kanban-board::-webkit-scrollbar { height: 10px; }
        .kanban-board::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }

        .kanban-col {
            background: var(--panel-bg); border-radius: 10px; padding: 10px;
            display: flex; flex-direction: column; min-width: 320px; width: 320px;
            max-height: 100%; border: 1px solid #444; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .kanban-header {
            text-align: center; padding: 12px; font-weight: 900; font-size: 14px;
            border-radius: 6px; margin-bottom: 15px; color: white; text-transform: uppercase;
            letter-spacing: 1px; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .hdr-pendente { background: var(--red); }
        .hdr-enviado { background: var(--blue); }
        .hdr-finalizado { background: var(--green); }

        .kanban-cards-container {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
            min-height: 150px; padding-right: 5px;
        }
        .kanban-cards-container::-webkit-scrollbar { width: 6px; }
        .kanban-cards-container::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }

        /* =========================================
           CARDS DE ORÇAMENTO
        ========================================= */
        .card-orc { 
            background: var(--card-bg); border-radius: 8px; padding: 15px; position: relative; 
            border-left: 5px solid var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            cursor: grab; transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-orc:active { cursor: grabbing; transform: scale(0.98); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .card-orc.dragged { opacity: 0.5; }
        
        .card-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;}
        
        .prefix-group { display: flex; align-items: center; background: #111; border-radius: 5px; overflow: hidden; border: 1px solid #444;}
        .btn-prefix { border: none; background: transparent; color: #777; font-size: 10px; font-weight: 900; padding: 4px 6px; cursor: pointer; transition: 0.2s; }
        .btn-prefix.active { background: var(--yellow); color: #000; }
        
        .orc-num { font-size: 12px; color: white; font-weight: 900; padding: 0 8px; letter-spacing: 1px; cursor: pointer; transition: color 0.2s;}
        .orc-num:hover { color: var(--blue); }
        
        .card-tools { display: flex; gap: 5px; }
        .btn-mini-tool { background: transparent; border: 1px solid #555; border-radius: 4px; color: white; cursor: pointer; padding: 3px 6px; font-size: 11px; transition: 0.2s; }
        .btn-mini-tool:hover { background: #555; }
        .btn-del:hover { background: var(--red); border-color: var(--red); }

        .select-status-mobile {
            background: #111; color: white; border: 1px solid #555; border-radius: 4px;
            font-size: 10px; padding: 2px 5px; font-weight: bold; cursor: pointer;
            font-family: 'Mitra LT', 'Montserrat', sans-serif; position: absolute; right: 15px; top: 40px;
        }

        .orc-tipo { font-size: 24px; font-weight: 900; color: white; margin-bottom: 4px; line-height: 1.1; padding-right: 90px; text-transform: none; }
        .orc-subtipo { display: inline-block; font-size: 10px; color: #dbe7ff; background: rgba(0,0,0,0.3); padding: 3px 6px; border-radius: 4px; margin-bottom: 6px; }
        .orc-empresa-cliente { font-size: 11px; color: var(--yellow); font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
        .actions-open { margin-top: 10px; }
        .btn-open-card {
            width: 100%; border: none; border-radius: 6px; padding: 8px 10px; cursor: pointer;
            background: #4b5563; color: #fff; font-weight: 800; font-size: 12px; text-transform: uppercase;
            font-family: 'Mitra LT', 'Montserrat', sans-serif;
        }
        .btn-open-card:hover { opacity: 0.9; }

        /* =========================================
           FAB (BOTÃO FLUTUANTE)
        ========================================= */
        .fab-add {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px; background: var(--yellow); color: #2c3e50;
            border-radius: 50%; border: none; font-size: 30px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        /* =========================================
           ESTADO DE CARREGAMENTO E ERRO
        ========================================= */
        #loading { 
            text-align: center; color: #999; margin-top: 50px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .loading-spinner {
            width: 40px; height: 40px; border: 4px solid #555;
            border-top-color: var(--yellow); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { font-size: 14px; color: #aaa; }

        .erro-box {
            background: rgba(237, 28, 36, 0.15); border: 1px solid var(--red);
            border-radius: 8px; padding: 20px; max-width: 500px; text-align: center;
        }
        .erro-box h3 { color: var(--red); margin: 0 0 10px; }
        .erro-box p { color: #ccc; font-size: 13px; margin: 0 0 10px; }
        .erro-box code { background: #111; padding: 8px 12px; border-radius: 4px; font-size: 11px; color: #f1c40f; display: block; text-align: left; word-break: break-all; margin-top: 10px; }
        .btn-retry {
            background: var(--yellow); color: #000; border: none; border-radius: 5px;
            padding: 10px 20px; font-weight: 900; cursor: pointer; margin-top: 10px;
            font-family: 'Montserrat', sans-serif; font-size: 13px;
        }
        .btn-retry:hover { opacity: 0.85; }

        .aviso-vazio {
            color: #777; font-size: 12px; text-align: center; padding: 20px 0;
        }

        @media (max-width: 600px) {
            .header-orc { flex-direction: column; align-items: flex-start; gap: 10px; }
            .header-actions { width: 100%; justify-content: space-between; }
            .kanban-col { min-width: 85vw; } 
        }
    </style>
</head>
<body>

    <div id="sidebar-arquivados">
        <div class="sidebar-header">
            <h2>Arquivados</h2>
            <button class="btn-fechar-arq" onclick="window.toggleSidebar()">✖</button>
        </div>
        <div class="lista-arquivados" id="container-arquivados"></div>
    </div>

    <div class="header-orc">
        <h1>Orçamentos e O.S.</h1>
        <div class="header-actions">
            <button class="btn-acao-topo btn-abrir-arq" onclick="window.toggleSidebar()">📁 ARQUIVADOS</button>
            <a href="#" id="link-voltar" class="btn-acao-topo btn-voltar">⬅ VOLTAR AO PAINEL</a>
        </div>
    </div>

    <div id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">A carregar o quadro Kanban...</div>
    </div>
    
    <div class="kanban-board" id="kanban-board" style="display: none;">
        <div class="kanban-col">
            <div class="kanban-header hdr-pendente">Pendente</div>
            <div class="kanban-cards-container" id="col-pendente" ondrop="drop(event, 'pendente')" ondragover="allowDrop(event)"></div>
        </div>
        <div class="kanban-col">
            <div class="kanban-header hdr-enviado">Enviado</div>
            <div class="kanban-cards-container" id="col-enviado" ondrop="drop(event, 'enviado')" ondragover="allowDrop(event)"></div>
        </div>
        <div class="kanban-col">
            <div class="kanban-header hdr-finalizado">Finalizado</div>
            <div class="kanban-cards-container" id="col-finalizado" ondrop="drop(event, 'finalizado')" ondragover="allowDrop(event)"></div>
        </div>
    </div>

    <button class="fab-add" onclick="novaSolicitacao()">+</button>

    <script type="module">
        import { db, ROTAS } from "./config.js";
        import { collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const CACHE_KEY = 'cache_orcamentos_kanban';

        document.getElementById('link-voltar').href = ROTAS.painel;

        // ==========================================
        // UTILITÁRIOS DE UI
        // ==========================================
        function mostrarLoading(msg = 'A carregar o quadro Kanban...') {
            const el = document.getElementById('loading');
            el.innerHTML = `<div class="loading-spinner"></div><div class="loading-text">${msg}</div>`;
            el.style.display = 'flex';
            document.getElementById('kanban-board').style.display = 'none';
        }

        function mostrarErro(mensagem, detalhe = '') {
            const el = document.getElementById('loading');
            el.innerHTML = `
                <div class="erro-box">
                    <h3>⚠️ Erro ao carregar</h3>
                    <p>${mensagem}</p>
                    ${detalhe ? `<code>${detalhe}</code>` : ''}
                    <br>
                    <button class="btn-retry" onclick="window._recarregar()">🔄 Tentar Novamente</button>
                </div>
            `;
            el.style.display = 'flex';
            document.getElementById('kanban-board').style.display = 'none';
        }

        function mostrarKanban() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('kanban-board').style.display = 'flex';
        }

        // ==========================================
        // MONTAGEM DOS CARDS
        // ==========================================
        function montarHtmlCards(listaDocs) {
            const cardsPendente = [];
            const cardsEnviado = [];
            const cardsFinalizado = [];
            const cardsArquivados = [];

            listaDocs.forEach((item) => {
                const data = item.data;
                const id = item.id;
                const prefixo = data.prefixo || 'OR';
                const numeroPuro = data.numero_solicitacao || 0;
                const num = String(numeroPuro).padStart(4, '0');
                const numDisplay = `${prefixo}-${num}`;
                const isArquivado = data.arquivado || false;

                if (isArquivado) {
                    const empresa = data.empresa || data.cliente || 'Sem Empresa';
                    const empresaTitle = String(empresa).replace(/"/g, '&quot;');
                    cardsArquivados.push(`
                        <div class="item-arquivado">
                            <div class="item-arq-info">
                                <span class="item-arq-empresa" title="${empresaTitle}">${empresa}</span>
                                <span class="item-arq-num">${numDisplay}</span>
                            </div>
                            <div class="item-arq-tools">
                                <button onclick="window.arquivarCard('${id}', false)" title="Desarquivar para o Kanban">⬆️</button>
                                <button class="btn-del" onclick="window.deletarCard('${id}')" title="Excluir Definitivamente">🗑️</button>
                            </div>
                        </div>
                    `);
                    return;
                }

                const statusAtual = data.status || 'pendente';
                const selectStatus = `
                    <select class="select-status-mobile" onchange="mudarStatusViaSelect('${id}', this.value)">
                        <option value="pendente" ${statusAtual === 'pendente' ? 'selected' : ''}>Pendente</option>
                        <option value="enviado" ${statusAtual === 'enviado' ? 'selected' : ''}>Enviado</option>
                        <option value="finalizado" ${statusAtual === 'finalizado' ? 'selected' : ''}>Finalizado</option>
                    </select>
                `;

                let bordaCor = "var(--red)";
                if (statusAtual === 'enviado') bordaCor = "var(--blue)";
                if (statusAtual === 'finalizado') bordaCor = "var(--green)";

                const html = `
                    <div class="card-orc" id="card-${id}" draggable="true" ondragstart="drag(event, '${id}')" style="border-left-color: ${bordaCor};">
                        <div class="card-top-row">
                            <div class="prefix-group">
                                <button class="btn-prefix ${prefixo === 'OR' ? 'active' : ''}" onclick="window.mudarPrefixo('${id}', 'OR')">OR</button>
                                <button class="btn-prefix ${prefixo === 'OS' ? 'active' : ''}" onclick="window.mudarPrefixo('${id}', 'OS')">OS</button>
                                <span class="orc-num" title="Clique para editar o número" onclick="window.editarNumero('${id}', '${numeroPuro}')">${num}</span>
                            </div>
                            <div class="card-tools">
                                <button class="btn-mini-tool" onclick="window.arquivarCard('${id}', true)" title="Arquivar Solicitação">📁</button>
                                <button class="btn-mini-tool btn-del" onclick="window.deletarCard('${id}')" title="Excluir Solicitação">🗑️</button>
                            </div>
                        </div>
                        ${selectStatus}
                        <div class="orc-tipo">${data.servico_titulo || 'Sem título'}</div>
                        <div class="orc-subtipo">${data.tipo_servico_material || 'Serviço'}</div>
                        <div class="orc-empresa-cliente">${data.empresa || 'Sem Empresa'} - ${data.cliente || 'Sem Cliente'}</div>
                        <div class="actions-open">
                            <button class="btn-open-card" onclick="window.abrirGuia('${id}', 'view')">ABRIR</button>
                        </div>
                    </div>
                `;

                if (statusAtual === 'pendente') cardsPendente.push(html);
                else if (statusAtual === 'enviado') cardsEnviado.push(html);
                else if (statusAtual === 'finalizado') cardsFinalizado.push(html);
            });

            return { cardsPendente, cardsEnviado, cardsFinalizado, cardsArquivados };
        }

        function renderizarListas(renderizado) {
            const colPendente = document.getElementById('col-pendente');
            const colEnviado = document.getElementById('col-enviado');
            const colFinalizado = document.getElementById('col-finalizado');
            const containerArquivados = document.getElementById('container-arquivados');

            colPendente.innerHTML = renderizado.cardsPendente.length
                ? renderizado.cardsPendente.join('')
                : '<div class="aviso-vazio">Vazio</div>';

            colEnviado.innerHTML = renderizado.cardsEnviado.length
                ? renderizado.cardsEnviado.join('')
                : '<div class="aviso-vazio">Vazio</div>';

            colFinalizado.innerHTML = renderizado.cardsFinalizado.length
                ? renderizado.cardsFinalizado.join('')
                : '<div class="aviso-vazio">Vazio</div>';

            containerArquivados.innerHTML = renderizado.cardsArquivados.length
                ? renderizado.cardsArquivados.join('')
                : '<div class="aviso-vazio">Nenhum item arquivado</div>';
        }

        // ==========================================
        // CARREGAMENTO PRINCIPAL — SEM DEPENDÊNCIA DE CACHE
        // ==========================================
        async function carregarDoFirebase(tentativa = 1) {
            console.log(`[Kanban] Tentativa ${tentativa} de carregar do Firebase...`);

            try {
                // Timeout de segurança: se o Firebase demorar mais de 15s, considera erro
                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('Timeout: Firebase demorou mais de 15 segundos.')), 15000)
                );

                const snapshotPromise = getDocs(collection(db, "orcamentos"));
                const snapshot = await Promise.race([snapshotPromise, timeoutPromise]);

                console.log(`[Kanban] Firebase retornou ${snapshot.size} documento(s).`);

                const listaDocs = snapshot.docs.map((docSnap) => ({
                    id: docSnap.id,
                    data: docSnap.data()
                }));

                // Ordena do mais recente para o mais antigo
                listaDocs.sort((a, b) => (b.data.numero_solicitacao || 0) - (a.data.numero_solicitacao || 0));

                // Atualiza cache somente se veio com dados reais
                if (listaDocs.length > 0) {
                    try {
                        localStorage.setItem(CACHE_KEY, JSON.stringify(
                            listaDocs.map((item) => ({
                                id: item.id,
                                data: {
                                    numero_solicitacao: item.data.numero_solicitacao || 0,
                                    status: item.data.status || 'pendente',
                                    arquivado: item.data.arquivado || false,
                                    prefixo: item.data.prefixo || 'OR',
                                    cliente: item.data.cliente || '',
                                    empresa: item.data.empresa || '',
                                    tipo_servico_material: item.data.tipo_servico_material || '',
                                    servico_titulo: item.data.servico_titulo || ''
                                }
                            }))
                        ));
                        console.log('[Kanban] Cache atualizado com sucesso.');
                    } catch (cacheErr) {
                        // Cache cheio ou bloqueado — não é fatal
                        console.warn('[Kanban] Não foi possível salvar o cache:', cacheErr);
                    }
                } else {
                    // Firebase retornou vazio — limpa cache para não mostrar dados antigos
                    console.warn('[Kanban] Firebase retornou 0 documentos. Limpando cache local.');
                    localStorage.removeItem(CACHE_KEY);
                }

                const renderizado = montarHtmlCards(listaDocs);
                renderizarListas(renderizado);
                mostrarKanban();

            } catch (error) {
                console.error(`[Kanban] Erro na tentativa ${tentativa}:`, error);

                // Tenta mais uma vez automaticamente antes de mostrar erro ao usuário
                if (tentativa < 2) {
                    console.log('[Kanban] Aguardando 3s e tentando novamente...');
                    mostrarLoading('Falha na conexão. Tentando novamente...');
                    await new Promise(res => setTimeout(res, 3000));
                    return carregarDoFirebase(tentativa + 1);
                }

                // Após 2 tentativas falhas, tenta mostrar o cache se existir
                const cacheBruto = localStorage.getItem(CACHE_KEY);
                if (cacheBruto) {
                    try {
                        const cache = JSON.parse(cacheBruto);
                        if (Array.isArray(cache) && cache.length > 0) {
                            console.warn('[Kanban] Usando cache local como fallback.');
                            const renderizado = montarHtmlCards(cache);
                            renderizarListas(renderizado);
                            mostrarKanban();

                            // Avisa o usuário que está vendo dados antigos
                            const aviso = document.createElement('div');
                            aviso.style.cssText = 'position:fixed;bottom:90px;right:20px;background:#f1c40f;color:#000;padding:10px 15px;border-radius:8px;font-size:12px;font-weight:bold;z-index:999;max-width:220px;';
                            aviso.innerHTML = '⚠️ Dados do cache local (sem conexão com Firebase)';
                            document.body.appendChild(aviso);
                            setTimeout(() => aviso.remove(), 6000);
                            return;
                        }
                    } catch (e) {
                        localStorage.removeItem(CACHE_KEY);
                    }
                }

                // Sem cache e sem Firebase — mostra erro com detalhe técnico
                mostrarErro(
                    'Não foi possível conectar ao Firebase após 2 tentativas. Verifique sua conexão com a internet e as regras do Firestore.',
                    `${error.code ? error.code + ': ' : ''}${error.message}`
                );
            }
        }

        // Função exposta para o botão "Tentar Novamente"
        window._recarregar = () => {
            mostrarLoading('Recarregando...');
            carregarDoFirebase(1);
        };

        // ==========================================
        // GERENCIAMENTO DOS CARDS
        // ==========================================
        window.mudarPrefixo = async (id, novoPrefixo) => {
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.querySelectorAll('.btn-prefix').forEach(btn => {
                    btn.classList.toggle('active', btn.innerText === novoPrefixo);
                });
            }
            try {
                await updateDoc(doc(db, "orcamentos", id), { prefixo: novoPrefixo });
            } catch (e) {
                console.error("Erro ao mudar prefixo", e);
                alert("Erro ao alterar prefixo no banco de dados.");
            }
        };

        window.editarNumero = async (id, numeroAtual) => {
            const novoNumStr = prompt("Digite o novo número (apenas números):", numeroAtual);
            if (novoNumStr === null) return;

            const novoNum = parseInt(novoNumStr);
            if (isNaN(novoNum)) {
                alert("Por favor, digite um número válido!");
                return;
            }

            const numFormatado = String(novoNum).padStart(4, '0');
            const card = document.getElementById(`card-${id}`);
            if (card) {
                const numSpan = card.querySelector('.orc-num');
                numSpan.innerText = numFormatado;
                numSpan.setAttribute('onclick', `window.editarNumero('${id}', '${novoNum}')`);
            }

            try {
                await updateDoc(doc(db, "orcamentos", id), { numero_solicitacao: novoNum });
            } catch (e) {
                console.error("Erro ao editar número:", e);
                alert("Erro ao salvar o novo número.");
            }
        };

        window.arquivarCard = async (id, statusBol) => {
            try {
                await updateDoc(doc(db, "orcamentos", id), { arquivado: statusBol });
                mostrarLoading('Atualizando...');
                carregarDoFirebase(1);
                if (statusBol) alert("Card arquivado com sucesso!");
            } catch (e) {
                console.error("Erro ao arquivar", e);
                alert("Erro ao arquivar. Tente novamente.");
            }
        };

        window.deletarCard = async (id) => {
            if (!confirm("⚠️ ATENÇÃO!\nTem certeza que deseja DELETAR PERMANENTEMENTE este item? Isso não pode ser desfeito.")) return;
            try {
                await deleteDoc(doc(db, "orcamentos", id));
                mostrarLoading('Atualizando...');
                carregarDoFirebase(1);
            } catch (e) {
                console.error("Erro ao deletar", e);
                alert("Erro ao tentar excluir.");
            }
        };

        // ==========================================
        // SIDEBAR
        // ==========================================
        window.toggleSidebar = () => {
            document.getElementById('sidebar-arquivados').classList.toggle('open');
        };

        // ==========================================
        // DRAG AND DROP
        // ==========================================
        window.allowDrop = (ev) => { ev.preventDefault(); };

        window.drag = (ev, id) => {
            ev.dataTransfer.setData("text_id", id);
            setTimeout(() => {
                const el = document.getElementById(`card-${id}`);
                if (el) el.classList.add('dragged');
            }, 0);
        };

        window.drop = async (ev, novoStatus) => {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("text_id");
            if (!id) return;

            const card = document.getElementById(`card-${id}`);
            if (!card) return;
            card.classList.remove('dragged');

            const colDestino = document.getElementById(`col-${novoStatus}`);
            colDestino.appendChild(card);

            // Remove "Vazio" se existir
            const avVazio = colDestino.querySelector('.aviso-vazio');
            if (avVazio) avVazio.remove();

            let bordaCor = "var(--red)";
            if (novoStatus === 'enviado') bordaCor = "var(--blue)";
            if (novoStatus === 'finalizado') bordaCor = "var(--green)";
            card.style.borderLeftColor = bordaCor;
            card.querySelector('.select-status-mobile').value = novoStatus;

            try {
                await updateDoc(doc(db, "orcamentos", id), { status: novoStatus });
            } catch (e) {
                console.error(e);
                alert("Erro ao guardar alteração no banco.");
            }
        };

        document.addEventListener('dragend', (e) => {
            if (e.target.classList) e.target.classList.remove('dragged');
        });

        // ==========================================
        // SELECT MOBILE
        // ==========================================
        window.mudarStatusViaSelect = async (id, novoStatus) => {
            const card = document.getElementById(`card-${id}`);
            if (!card) return;

            const colDestino = document.getElementById(`col-${novoStatus}`);
            colDestino.appendChild(card);

            const avVazio = colDestino.querySelector('.aviso-vazio');
            if (avVazio) avVazio.remove();

            let bordaCor = "var(--red)";
            if (novoStatus === 'enviado') bordaCor = "var(--blue)";
            if (novoStatus === 'finalizado') bordaCor = "var(--green)";
            card.style.borderLeftColor = bordaCor;

            try {
                await updateDoc(doc(db, "orcamentos", id), { status: novoStatus });
            } catch (e) {
                console.error(e);
            }
        };

        // ==========================================
        // NAVEGAÇÃO
        // ==========================================
        window.novaSolicitacao = () => { window.open(ROTAS.solicitacao, '_blank'); };
        window.abrirGuia = (id, modo) => { window.open(`${ROTAS.solicitacao}?id=${id}&mode=${modo}&_ts=${Date.now()}`, '_blank'); };

        window.gerarLink = (id, numDisplay) => {
            let baseUrl = window.location.href;
            baseUrl = baseUrl.substring(0, baseUrl.lastIndexOf('/'));
            const urlFinal = `${baseUrl}/${ROTAS.solicitacao}?id=${id}&mode=view&_ts=${Date.now()}`;
            navigator.clipboard.writeText(`Solicitação ${numDisplay}: ${urlFinal}`).then(() => {
                alert("Link copiado!\n\n" + urlFinal);
            });
        };

        // ==========================================
        // INICIALIZAÇÃO
        // ==========================================
        carregarDoFirebase(1);
    </script>

    <script type="module">
        import { protegerPagina } from './auth.js';
        await protegerPagina({ paginaAtual: 'orcamentos.html' });
    </script>
    <script src="./task-shortcut.js"></script>
</body>
</html>
